document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{"pages":{"planning_dashboard/planning_dashboard":"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>noixzy — Planning Dashboard<\u002Ftitle>\n  <style>/* planning_dashboard.css\n * Dark, clean planning tool for the noixzy generative lab.\n * Reskinned to match the noixzy // sdf raymarch look:\n * warm near-black, monospace, ember-orange accent, sharp corners, lowercase.\n * Plain CSS — no frameworks.\n */\n\n:root {\n  --bg:        #100c09;   /* warm near-black */\n  --bg-2:      #16110c;\n  --panel:     #000000;   /* flat black control panels */\n  --panel-2:   #1a140e;\n  --border:    #2a211a;\n  --border-2:  #3a2e23;\n  --text:      #e9e2d8;\n  --muted:     #9a8d7d;\n  --muted-2:   #6b5f51;\n\n  --accent:    #e8722c;   /* ember orange */\n  --accent-2:  #ff8a3d;\n  --accent-dim:#7a3f17;\n\n  /* priority */\n  --p-now:     #e8722c;   /* ember */\n  --p-next:    #e0a93b;   /* amber */\n  --p-later:   #8a8f9a;   /* cool grey */\n  --p-archive: #5b5247;\n\n  /* type — warm-leaning, all readable on black */\n  --t-shader:     #e8722c;\n  --t-blender:    #ff8a3d;\n  --t-ui:         #c79bff;\n  --t-installment:#5ec8ff;\n  --t-asset:      #e0a93b;\n  --t-research:   #9a8d7d;\n  --t-prompt:     #ff7ab8;\n  --t-system:     #79e07a;\n\n  --radius: 3px;\n  --shadow: 0 6px 24px rgba(0,0,0,0.6);\n  --mono: ui-monospace, \"SF Mono\", \"JetBrains Mono\", \"Fira Code\", \"Berkeley Mono\", Menlo, Consolas, monospace;\n  --sans: var(--mono);\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  height: 100%;\n}\n\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: var(--mono);\n  font-size: 13px;\n  line-height: 1.5;\n  letter-spacing: 0.2px;\n  -webkit-font-smoothing: antialiased;\n  display: flex;\n  flex-direction: column;\n  height: 100vh;\n  overflow: hidden;\n}\n\n/* ---------- Top bar ---------- */\n.topbar {\n  display: flex;\n  align-items: center;\n  gap: 20px;\n  padding: 12px 20px;\n  background: var(--bg-2);\n  border-bottom: 1px solid var(--border);\n  flex: none;\n}\n.brand { display: flex; align-items: baseline; gap: 10px; }\n.brand-mark {\n  font-family: var(--mono);\n  font-size: 16px;\n  font-weight: 700;\n  letter-spacing: 0.5px;\n  color: var(--accent);\n}\n.brand-mark::after { content: \" //\"; color: var(--accent-dim); }\n.brand-sub {\n  font-size: 13px;\n  color: var(--muted);\n  letter-spacing: 0.5px;\n  text-transform: lowercase;\n}\n\n.view-toggle {\n  display: inline-flex;\n  background: var(--panel);\n  border: 1px solid var(--border-2);\n  border-radius: var(--radius);\n  padding: 2px;\n  gap: 2px;\n}\n.vt-btn {\n  border: none;\n  background: transparent;\n  color: var(--muted);\n  font: inherit;\n  font-size: 12px;\n  text-transform: lowercase;\n  padding: 5px 16px;\n  border-radius: 2px;\n  cursor: pointer;\n}\n.vt-btn.active { background: var(--accent); color: #140a04; font-weight: 700; }\n.vt-btn:hover:not(.active) { color: var(--text); }\n\n.topbar-actions {\n  margin-left: auto;\n  display: flex;\n  gap: 8px;\n  flex-wrap: wrap;\n}\n\n/* ---------- Buttons ---------- */\n.btn {\n  border: 1px solid var(--border-2);\n  background: var(--panel);\n  color: var(--text);\n  font: inherit;\n  font-size: 12px;\n  text-transform: lowercase;\n  padding: 7px 13px;\n  border-radius: var(--radius);\n  cursor: pointer;\n  transition: background .12s, border-color .12s, color .12s;\n  white-space: nowrap;\n}\n.btn:hover { border-color: var(--accent); color: var(--accent); }\n.btn:active { transform: translateY(1px); }\n.btn-sm { padding: 5px 10px; font-size: 11px; }\n.btn-primary {\n  background: var(--accent);\n  border-color: var(--accent);\n  color: #140a04;\n  font-weight: 700;\n}\n.btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); color: #140a04; }\n.btn-ghost { background: transparent; border-color: transparent; color: var(--muted); }\n.btn-ghost:hover { background: var(--panel); color: var(--accent); border-color: transparent; }\n.btn-danger { color: var(--p-now); border-color: transparent; background: transparent; }\n.btn-danger:hover { background: rgba(232,114,44,0.14); color: var(--accent-2); }\n\n/* ---------- Import drawer ---------- */\n.import-drawer {\n  background: var(--bg-2);\n  border-bottom: 1px solid var(--border);\n  padding: 16px 20px 18px;\n  flex: none;\n}\n.import-head h2 { margin: 0 0 4px; font-size: 13px; text-transform: lowercase; color: var(--accent); }\n.import-head p { margin: 0 0 12px; color: var(--muted); font-size: 12px; }\n.import-head strong { color: var(--text); }\n.import-body { display: flex; flex-direction: column; gap: 10px; }\n#importText {\n  width: 100%;\n  min-height: 150px;\n  resize: vertical;\n  background: var(--panel);\n  color: var(--text);\n  border: 1px solid var(--border-2);\n  border-radius: var(--radius);\n  padding: 12px 14px;\n  font-family: var(--mono);\n  font-size: 12.5px;\n  line-height: 1.6;\n}\n#importText:focus { outline: none; border-color: var(--accent); }\n.import-controls {\n  display: flex;\n  align-items: flex-end;\n  gap: 14px;\n  flex-wrap: wrap;\n}\n.import-controls label { font-size: 11px; color: var(--muted); text-transform: lowercase; display: flex; flex-direction: column; gap: 5px; }\n.import-controls label.chk { flex-direction: row; align-items: center; gap: 7px; }\n.import-hint { font-size: 12px; color: var(--accent); }\n\n.import-controls select {\n  background: var(--panel);\n  color: var(--text);\n  border: 1px solid var(--border-2);\n  border-radius: var(--radius);\n  padding: 7px 10px;\n  font-family: var(--mono);\n  font-size: 12px;\n}\n.import-controls select:focus { outline: none; border-color: var(--accent); }\n.import-controls input[type=\"checkbox\"] { accent-color: var(--accent); }\n\n/* ---------- Filter bar ---------- */\n.filterbar {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  padding: 10px 20px;\n  background: var(--bg-2);\n  border-bottom: 1px solid var(--border);\n  flex: none;\n  flex-wrap: wrap;\n}\n.filter-group { display: flex; align-items: center; gap: 9px; }\n.filter-label {\n  font-size: 10px;\n  text-transform: lowercase;\n  letter-spacing: 1px;\n  color: var(--muted-2);\n}\n.chips { display: flex; gap: 6px; flex-wrap: wrap; }\n.filter-spacer { flex: 1; }\n.count { font-size: 11px; color: var(--muted); font-family: var(--mono); }\n\n/* filter chip + tag chips share base */\n.chip {\n  border: 1px solid var(--border-2);\n  background: var(--panel);\n  color: var(--muted);\n  font-family: var(--mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.5px;\n  padding: 4px 10px;\n  border-radius: 2px;\n  cursor: pointer;\n  user-select: none;\n  transition: all .12s;\n}\n.chip:hover { color: var(--text); border-color: var(--muted-2); }\n.chip.active { color: #140a04; }\n.chip[data-on=\"priority-now\"].active    { background: var(--p-now);    border-color: var(--p-now); }\n.chip[data-on=\"priority-next\"].active   { background: var(--p-next);   border-color: var(--p-next); }\n.chip[data-on=\"priority-later\"].active  { background: var(--p-later);  border-color: var(--p-later); color: #140a04; }\n.chip[data-on=\"priority-archive\"].active{ background: var(--p-archive);border-color: var(--p-archive); color: var(--text); }\n.chip[data-kind=\"type\"].active { background: var(--accent); border-color: var(--accent); }\n\n/* ---------- Views ---------- */\n.view { flex: 1; min-height: 0; position: relative; }\n\n/* Graph view */\n.view-graph { overflow: auto; background:\n  radial-gradient(circle at 1px 1px, rgba(232,114,44,0.05) 1px, transparent 0) 0 0 / 30px 30px,\n  var(--bg);\n}\n.graph-canvas { position: relative; width: 2400px; height: 1600px; }\n.graph-edges { position: absolute; top: 0; left: 0; width: 2400px; height: 1600px; pointer-events: none; z-index: 1; }\n.graph-edges line { stroke: var(--border-2); stroke-width: 1.5; }\n.graph-edges .edge-arrow { fill: var(--muted-2); }\n\n.graph-empty {\n  position: absolute;\n  top: 40%;\n  left: 50%;\n  transform: translate(-50%, -50%);\n  color: var(--muted);\n  font-size: 13px;\n  text-align: center;\n  text-transform: lowercase;\n}\n\n/* Node card */\n.node {\n  position: absolute;\n  width: 250px;\n  background: var(--panel);\n  border: 1px solid var(--border-2);\n  border-left: 3px solid var(--muted-2);\n  border-radius: var(--radius);\n  box-shadow: var(--shadow);\n  z-index: 2;\n  cursor: grab;\n  overflow: hidden;\n}\n.node.dragging { cursor: grabbing; z-index: 5; box-shadow: 0 14px 44px rgba(0,0,0,0.7); border-color: var(--accent); }\n.node[data-priority=\"now\"]     { border-left-color: var(--p-now); }\n.node[data-priority=\"next\"]    { border-left-color: var(--p-next); }\n.node[data-priority=\"later\"]   { border-left-color: var(--p-later); }\n.node[data-priority=\"archive\"] { border-left-color: var(--p-archive); opacity: 0.6; }\n\n.node-head {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 9px 11px 7px;\n}\n.node-title {\n  font-size: 13px;\n  font-weight: 700;\n  line-height: 1.35;\n  flex: 1;\n  word-break: break-word;\n}\n.node-body { padding: 0 11px 10px; }\n.node-desc {\n  font-size: 11.5px;\n  color: var(--muted);\n  margin: 0 0 9px;\n  display: -webkit-box;\n  -webkit-line-clamp: 3;\n  -webkit-box-orient: vertical;\n  overflow: hidden;\n}\n.node-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }\n.node-edit {\n  border: none;\n  background: transparent;\n  color: var(--muted-2);\n  cursor: pointer;\n  font-size: 13px;\n  padding: 2px 5px;\n  border-radius: 2px;\n  line-height: 1;\n}\n.node-edit:hover { background: var(--panel-2); color: var(--accent); }\n\n/* tag (priority + type badges on cards) */\n.tag {\n  font-family: var(--mono);\n  font-size: 9.5px;\n  font-weight: 600;\n  letter-spacing: 0.6px;\n  padding: 2px 7px;\n  border-radius: 2px;\n  border: 1px solid transparent;\n}\n.tag-p-now     { background: rgba(232,114,44,0.16); color: var(--p-now);    border-color: rgba(232,114,44,0.45); }\n.tag-p-next    { background: rgba(224,169,59,0.14);  color: var(--p-next);   border-color: rgba(224,169,59,0.4); }\n.tag-p-later   { background: rgba(138,143,154,0.14); color: var(--p-later);  border-color: rgba(138,143,154,0.35); }\n.tag-p-archive { background: rgba(91,82,71,0.2);     color: var(--p-archive);border-color: rgba(91,82,71,0.5); }\n\n.tag-type { background: var(--panel-2); border-color: var(--border-2); }\n.tag-type[data-type=\"shader\"]     { color: var(--t-shader); }\n.tag-type[data-type=\"blender\"]    { color: var(--t-blender); }\n.tag-type[data-type=\"ui\"]         { color: var(--t-ui); }\n.tag-type[data-type=\"installment\"]{ color: var(--t-installment); }\n.tag-type[data-type=\"asset\"]      { color: var(--t-asset); }\n.tag-type[data-type=\"research\"]   { color: var(--t-research); }\n.tag-type[data-type=\"prompt\"]     { color: var(--t-prompt); }\n.tag-type[data-type=\"system\"]     { color: var(--t-system); }\n\n.dep-count {\n  font-family: var(--mono);\n  font-size: 9.5px;\n  color: var(--muted-2);\n  margin-left: auto;\n}\n\n/* ---------- List view ---------- */\n.view-list { overflow: auto; }\n.list-container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }\n.cat-group { margin-bottom: 30px; }\n.cat-head {\n  display: flex;\n  align-items: baseline;\n  gap: 10px;\n  margin: 0 0 12px;\n  padding-bottom: 8px;\n  border-bottom: 1px solid var(--border);\n}\n.cat-head h2 { margin: 0; font-size: 13px; letter-spacing: 0.5px; text-transform: lowercase; color: var(--accent); }\n.cat-head .cat-count { font-family: var(--mono); font-size: 11px; color: var(--muted-2); }\n\n.list-row {\n  display: grid;\n  grid-template-columns: 1fr auto auto auto;\n  gap: 14px;\n  align-items: center;\n  padding: 11px 14px;\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  margin-bottom: 7px;\n  cursor: pointer;\n  transition: border-color .12s, background .12s;\n}\n.list-row:hover { border-color: var(--accent-dim); background: var(--panel-2); }\n.lr-main { min-width: 0; }\n.lr-title { font-size: 13px; font-weight: 700; }\n.lr-desc {\n  font-size: 11.5px;\n  color: var(--muted);\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n.lr-deps { font-family: var(--mono); font-size: 10.5px; color: var(--muted-2); white-space: nowrap; }\n\n.list-empty { color: var(--muted); text-align: center; padding: 60px 0; text-transform: lowercase; }\n\n/* ---------- Editor modal ---------- */\n.editor-backdrop {\n  position: fixed;\n  inset: 0;\n  background: rgba(8,5,3,0.72);\n  backdrop-filter: blur(3px);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  z-index: 100;\n  padding: 24px;\n}\n.editor {\n  width: 560px;\n  max-width: 100%;\n  max-height: 90vh;\n  overflow: auto;\n  background: var(--bg-2);\n  border: 1px solid var(--border-2);\n  border-radius: var(--radius);\n  box-shadow: var(--shadow);\n  padding: 20px 22px 18px;\n}\n.editor-head { display: flex; align-items: center; margin-bottom: 14px; }\n.editor-head h3 { margin: 0; font-size: 14px; flex: 1; text-transform: lowercase; color: var(--accent); }\n.fld { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: var(--muted); text-transform: lowercase; margin-bottom: 13px; }\n.fld input[type=\"text\"], .fld textarea, .fld select {\n  background: var(--panel);\n  color: var(--text);\n  border: 1px solid var(--border-2);\n  border-radius: var(--radius);\n  padding: 9px 11px;\n  font-family: var(--mono);\n  font-size: 13px;\n  text-transform: none;\n}\n.fld textarea { resize: vertical; line-height: 1.5; }\n.fld input:focus, .fld textarea:focus, .fld select:focus { outline: none; border-color: var(--accent); }\n.fld-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }\n\n.deps-list { display: flex; flex-direction: column; gap: 5px; max-height: 170px; overflow: auto; padding: 6px; background: var(--panel); border: 1px solid var(--border-2); border-radius: var(--radius); }\n.dep-opt { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); text-transform: none; padding: 3px 4px; border-radius: 2px; cursor: pointer; }\n.dep-opt:hover { background: var(--panel-2); }\n.dep-opt input { accent-color: var(--accent); }\n.deps-empty { color: var(--muted-2); font-size: 11px; padding: 4px; }\n\n.editor-foot { display: flex; align-items: center; gap: 10px; margin-top: 6px; }\n.editor-foot .spacer { flex: 1; }\n\n/* scrollbars */\n::-webkit-scrollbar { width: 11px; height: 11px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; border: 3px solid var(--bg); }\n::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }\n<\u002Fstyle>\n  \n<\u002Fhead>\n<body>\n  <header class=\"topbar\">\n    <div class=\"brand\">\n      <span class=\"brand-mark\">noixzy<\u002Fspan>\n      <span class=\"brand-sub\">Planning Dashboard<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"view-toggle\" id=\"viewToggle\">\n      <button class=\"vt-btn active\" data-view=\"graph\">Graph<\u002Fbutton>\n      <button class=\"vt-btn\" data-view=\"list\">List<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"topbar-actions\">\n      <button class=\"btn\" id=\"addIdeaBtn\">+ Idea<\u002Fbutton>\n      <button class=\"btn\" id=\"importToggleBtn\">Import<\u002Fbutton>\n      <button class=\"btn\" id=\"exportJsonBtn\">Export JSON<\u002Fbutton>\n      <button class=\"btn\" id=\"exportMdBtn\">Export Markdown<\u002Fbutton>\n      <button class=\"btn btn-ghost\" id=\"resetBtn\" title=\"Clear all and reload samples\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Import drawer -->\n  <section class=\"import-drawer\" id=\"importDrawer\" hidden=\"\">\n    <div class=\"import-head\">\n      <h2>Import ideas<\u002Fh2>\n      <p>Paste text from your <strong>ideas<\u002Fstrong> file or <strong>future installments<\u002Fstrong> file. Lines and bullets become cards; headings become categories.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"import-body\">\n      <textarea id=\"importText\" placeholder=\"# Modules\n- SDF raymarch core (now, shader)\n- Noise library (next)\n\n# Future installments\n- Installment 02: voronoi caverns (later, installment)\n...\"><\u002Ftextarea>\n      <div class=\"import-controls\">\n        <label>Default category\n          <select id=\"importCategory\">\n            <option value=\"module\">Modules<\u002Foption>\n            <option value=\"installment\">Installments<\u002Foption>\n            <option value=\"creative\">Creative directions<\u002Foption>\n            <option value=\"technical\">Technical tasks<\u002Foption>\n            <option value=\"genart\">Blender / shader / gen-art<\u002Foption>\n          <\u002Fselect>\n        <\u002Flabel>\n        <label class=\"chk\">\n          <input type=\"checkbox\" id=\"importReplace\">\n          Replace existing\n        <\u002Flabel>\n        <button class=\"btn btn-primary\" id=\"parseBtn\">Parse into cards<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"importCancelBtn\">Cancel<\u002Fbutton>\n        <span class=\"import-hint\" id=\"importHint\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Filter bar -->\n  <section class=\"filterbar\">\n    <div class=\"filter-group\">\n      <span class=\"filter-label\">Priority<\u002Fspan>\n      <div class=\"chips\" id=\"priorityFilters\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"filter-group\">\n      <span class=\"filter-label\">Type<\u002Fspan>\n      <div class=\"chips\" id=\"typeFilters\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"filter-spacer\"><\u002Fdiv>\n    <button class=\"btn btn-ghost btn-sm\" id=\"clearFiltersBtn\">Clear filters<\u002Fbutton>\n    <span class=\"count\" id=\"countLabel\"><\u002Fspan>\n  <\u002Fsection>\n\n  <!-- Graph view -->\n  <main class=\"view view-graph\" id=\"graphView\">\n    <svg class=\"graph-edges\" id=\"graphEdges\"><\u002Fsvg>\n    <div class=\"graph-canvas\" id=\"graphCanvas\"><\u002Fdiv>\n    <div class=\"graph-empty\" id=\"graphEmpty\" hidden=\"\">No ideas match. Add one, import text, or clear filters.<\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- List view -->\n  <main class=\"view view-list\" id=\"listView\" hidden=\"\">\n    <div class=\"list-container\" id=\"listContainer\"><\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- Card editor template -->\n  <template id=\"editorTemplate\">\n    <div class=\"editor-backdrop\">\n      <div class=\"editor\">\n        <div class=\"editor-head\">\n          <h3 id=\"editorTitle\">Edit idea<\u002Fh3>\n          <button class=\"btn btn-ghost btn-sm\" data-act=\"close\">Close<\u002Fbutton>\n        <\u002Fdiv>\n        <label class=\"fld\">Title\n          <input type=\"text\" data-fld=\"title\">\n        <\u002Flabel>\n        <label class=\"fld\">Description\n          <textarea data-fld=\"description\" rows=\"4\"><\u002Ftextarea>\n        <\u002Flabel>\n        <div class=\"fld-row\">\n          <label class=\"fld\">Category\n            <select data-fld=\"category\">\n              <option value=\"module\">Modules<\u002Foption>\n              <option value=\"installment\">Installments<\u002Foption>\n              <option value=\"creative\">Creative directions<\u002Foption>\n              <option value=\"technical\">Technical tasks<\u002Foption>\n              <option value=\"genart\">Blender / shader / gen-art<\u002Foption>\n            <\u002Fselect>\n          <\u002Flabel>\n          <label class=\"fld\">Priority\n            <select data-fld=\"priority\">\n              <option value=\"now\">NOW<\u002Foption>\n              <option value=\"next\">NEXT<\u002Foption>\n              <option value=\"later\">LATER<\u002Foption>\n              <option value=\"archive\">ARCHIVE<\u002Foption>\n            <\u002Fselect>\n          <\u002Flabel>\n          <label class=\"fld\">Type\n            <select data-fld=\"type\">\n              <option value=\"shader\">SHADER<\u002Foption>\n              <option value=\"blender\">BLENDER<\u002Foption>\n              <option value=\"ui\">UI<\u002Foption>\n              <option value=\"installment\">INSTALLMENT<\u002Foption>\n              <option value=\"asset\">ASSET<\u002Foption>\n              <option value=\"research\">RESEARCH<\u002Foption>\n              <option value=\"prompt\">PROMPT<\u002Foption>\n              <option value=\"system\">SYSTEM<\u002Foption>\n            <\u002Fselect>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <label class=\"fld\">Depends on\n          <div class=\"deps-list\" data-fld=\"deps\"><\u002Fdiv>\n        <\u002Flabel>\n        <div class=\"editor-foot\">\n          <button class=\"btn btn-danger btn-sm\" data-act=\"delete\">Delete idea<\u002Fbutton>\n          <div class=\"spacer\"><\u002Fdiv>\n          <button class=\"btn btn-primary\" data-act=\"save\">Save<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ftemplate>\n\n  <script src=\"20d54a56-4a12-47e5-af3c-2418643b734b\"><\u002Fscript>\n  <script src=\"35aba895-20dc-476b-81c8-c0d147589651\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"planning_dashboard/planning_dashboard"}
