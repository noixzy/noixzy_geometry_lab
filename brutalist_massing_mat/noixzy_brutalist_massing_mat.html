<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noixzy brutalist massing mat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #101010;
      --line: #2d2d2d;
      --text: #e7e2d8;
      --muted: #8f8a82;
      --accent: #c9b27c;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 292px;
      min-height: 100vh;
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.055), transparent 35%),
        linear-gradient(180deg, #0b0b0b 0%, #030303 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    aside {
      border-left: 1px solid var(--line);
      background: rgba(12, 12, 12, .96);
      padding: 14px;
      overflow: auto;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      min-height: 34px;
      border: 1px solid #383838;
      background: #171717;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      text-transform: lowercase;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .seed-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .seed-row span {
      font-size: 11px;
      color: var(--muted);
      text-transform: lowercase;
    }

    input[type="text"] {
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid var(--line);
      color: var(--text);
      font: inherit;
      font-size: 11px;
    }

    .control {
      margin-bottom: 16px;
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .control-head label {
      color: var(--muted);
      text-transform: lowercase;
    }

    .control-head .value {
      color: var(--text);
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      outline: none;
      appearance: none;
    }

    .physics-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 12px;
      padding: 9px 0;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      color: var(--muted);
      font-size: 11px;
      text-transform: lowercase;
    }

    .physics-toggle input { accent-color: var(--accent); }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      cursor: pointer;
    }
  </style>
  <style>
    /* shell embed: hide native UI, full-viewport canvas */
    body { display: block; }
    main { position: fixed; inset: 0; background: #000; }
    aside { display: none; visibility: hidden; pointer-events: none; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <main>
    <canvas id="view"></canvas>
  </main>

  <aside>
    <h1>noixzy brutalist massing mat</h1>
    <p class="sub">low-rise horizontal field, mat building, groundscraper, distributed mass, courtyard network</p>

    <div class="buttons">
      <button id="randomize">randomize</button>
      <button id="reset">reset</button>
      <button id="play">pause</button>
      <button id="export">export png</button>
    </div>

    <div class="seed-row">
      <span>seed</span>
      <input id="seed" type="text" value="noixzy-mat-001" spellcheck="false">
    </div>
    <div id="controls"></div>
    <label class="physics-toggle"><input id="experimental-physics" type="checkbox"> experimental physics</label>
  </aside>

  <script>
    const defaults = {
      gridSize: 14,
      fieldExtent: 90,
      barHeight: 22,
      courtSize: 38,
      density: 68,
      offsetJitter: 28,
      roofLevel: 42,
      connectivity: 55,
      rotation: 15
    };

    const controlDefs = [
      ["gridSize", "grid size", 8, 20, 1],
      ["fieldExtent", "field extent", 50, 120, 1],
      ["barHeight", "bar height", 10, 40, 1],
      ["courtSize", "court size", 20, 60, 1],
      ["density", "density", 30, 95, 1],
      ["offsetJitter", "offset jitter", 0, 60, 1],
      ["roofLevel", "roof level", 0, 80, 1],
      ["connectivity", "connectivity", 20, 90, 1],
      ["rotation", "rotation", -45, 45, 1]
    ];

    const PARAMS = controlDefs.map(([key, label, min, max, step]) => ({
      k: key,
      label,
      min,
      max,
      step,
      v: defaults[key],
      type: "range"
    }));
    const P = {};
    PARAMS.forEach(p => { P[p.k] = p.v; });

    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const controls = document.getElementById("controls");
    const seedInput = document.getElementById("seed");
    const playButton = document.getElementById("play");
    const values = {};
    let state = P;
    let running = true;
    let frame = 0;
    let width = 1;
    let height = 1;
    let dpr = 1;
    let experimentalPhysics = false;
    function randomBiasFor(label) {
      const k = String(label).toLowerCase();
      if (/palette|material|color|hue/.test(k)) return Math.random();
      if (/density|count|grid|cells|points|nodes|modules|bays|divisions|segments|cracks|repeats/.test(k)) return 0.38 + Math.random() * 0.62;
      if (/extrude|depth|height|stack|layer|relief|bump|displace|amplitude|thickness|width|size|scale|cantilever|perspective|slab|fin|mullion|erosion/.test(k)) return 0.28 + Math.random() * 0.72;
      if (/offset|jitter|noise|field|force|twist|warp|phase|bias|rotation|entropy|feedback|pressure|void|variation|fracture/.test(k)) return 0.12 + Math.random() * 0.76;
      if (/line|stroke|shadow/.test(k)) return 0.18 + Math.random() * 0.62;
      return 0.15 + Math.random() * 0.7;
    }
    function snapToStep(value, min, max, step) {
      const safeStep = Number(step) || 1;
      const snapped = Math.round(value / safeStep) * safeStep;
      return Math.max(Number(min), Math.min(Number(max), Number.isInteger(safeStep) ? Math.round(snapped) : Number(snapped.toFixed(3))));
    }
    function randomizeModuleControls() {
      controlDefs.forEach(([key, label, min, max, step]) => {
        const value = snapToStep(min + (max - min) * randomBiasFor(label || key), min, max, step);
        P[key] = value;
        const input = document.getElementById(key);
        if (input) input.value = value;
        if (values[key]) values[key].textContent = value;
      });
      experimentalPhysics = Math.random() > 0.55;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = experimentalPhysics;
      applyExperimentalPhysics();
    }
    function applyExperimentalPhysics() {
      const dx = experimentalPhysics ? Math.sin(frame * 0.017) * 4.5 : 0;
      const dy = experimentalPhysics ? Math.cos(frame * 0.013) * 3.5 : 0;
      const breathe = experimentalPhysics ? 1 + Math.sin(frame * 0.011) * 0.004 : 1;
      canvas.style.transformOrigin = "50% 50%";
      canvas.style.transform = experimentalPhysics ? `translate3d(${dx}px, ${dy}px, 0) scale(${breathe})` : "";
      canvas.style.filter = experimentalPhysics ? "contrast(1.06) saturate(1.08)" : "";
    }

    function hashString(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function randomSource(seed) {
      let t = hashString(seed) || 1;
      return function random() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function shade(hex, amount) {
      const n = parseInt(hex.slice(1), 16);
      const r = clamp((n >> 16) + amount, 0, 255);
      const g = clamp(((n >> 8) & 255) + amount, 0, 255);
      const b = clamp((n & 255) + amount, 0, 255);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function buildControls() {
      controls.innerHTML = "";
      controlDefs.forEach(([key, label, min, max, step]) => {
        const wrap = document.createElement("div");
        wrap.className = "control";
        wrap.innerHTML = `
          <div class="control-head">
            <label for="${key}">${label}</label>
            <span class="value" id="${key}Value">${P[key]}</span>
          </div>
          <input id="${key}" type="range" min="${min}" max="${max}" step="${step}" value="${P[key]}">
        `;
        controls.appendChild(wrap);
        values[key] = wrap.querySelector(".value");
        wrap.querySelector("input").addEventListener("input", event => {
          P[key] = Number(event.target.value);
          values[key].textContent = P[key];
          draw();
        });
      });
    }

    function resizeCanvas() {
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(260, Math.floor(rect.height));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function isoPoint(x, y, z, cfg) {
      const angle = (Math.PI / 4) + cfg.rotationRad;
      const ca = Math.cos(angle);
      const sa = Math.sin(angle);
      const rx = x * ca - y * sa;
      const ry = x * sa + y * ca;
      return {
        x: cfg.cx + rx * cfg.scale,
        y: cfg.cy + (ry * cfg.perspective - z) * cfg.scale
      };
    }

    function polygon(points, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    }

    function drawCell(cell, cfg) {
      const x0 = cell.x;
      const x1 = cell.x + cell.w;
      const y0 = cell.y;
      const y1 = cell.y + cell.d;
      const z0 = 0;
      const z1 = cell.h;
      const base = cell.color;
      const edge = "rgba(0,0,0,.6)";

      const p000 = isoPoint(x0, y0, z0, cfg);
      const p100 = isoPoint(x1, y0, z0, cfg);
      const p110 = isoPoint(x1, y1, z0, cfg);
      const p010 = isoPoint(x0, y1, z0, cfg);
      const p001 = isoPoint(x0, y0, z1, cfg);
      const p101 = isoPoint(x1, y0, z1, cfg);
      const p111 = isoPoint(x1, y1, z1, cfg);
      const p011 = isoPoint(x0, y1, z1, cfg);

      const shadowOffset = 18;
      polygon([
        { x: p000.x + shadowOffset, y: p000.y + shadowOffset * .48 },
        { x: p100.x + shadowOffset, y: p100.y + shadowOffset * .48 },
        { x: p110.x + shadowOffset, y: p110.y + shadowOffset * .48 },
        { x: p010.x + shadowOffset, y: p010.y + shadowOffset * .48 }
      ], `rgba(0,0,0,0.32)`);

      polygon([p100, p110, p111, p101], shade(base, -42), edge);
      polygon([p010, p110, p111, p011], shade(base, -64), edge);
      polygon([p001, p101, p111, p011], shade(base, 26), edge);

      if (cell.hasCourt) {
        const courtInset = cell.w * 0.32;
        const v0 = isoPoint(x0 + courtInset, y0 + courtInset, z1 + 0.02, cfg);
        const v1 = isoPoint(x1 - courtInset, y0 + courtInset, z1 + 0.02, cfg);
        const v2 = isoPoint(x1 - courtInset, y1 - courtInset, z1 + 0.02, cfg);
        const v3 = isoPoint(x0 + courtInset, y1 - courtInset, z1 + 0.02, cfg);
        polygon([v0, v1, v2, v3], "rgba(6,6,6,.92)", "rgba(180,175,165,.18)");
      }

      if (cell.showGrid) {
        ctx.strokeStyle = "rgba(80,78,75,.45)";
        ctx.lineWidth = 0.6;
        const divs = 3;
        for (let i = 1; i < divs; i++) {
          const t = i / divs;
          const l0 = isoPoint(lerp(x0, x1, t), y0, z1, cfg);
          const l1 = isoPoint(lerp(x0, x1, t), y1, z1, cfg);
          ctx.beginPath();
          ctx.moveTo(l0.x, l0.y);
          ctx.lineTo(l1.x, l1.y);
          ctx.stroke();

          const l2 = isoPoint(x0, lerp(y0, y1, t), z1, cfg);
          const l3 = isoPoint(x1, lerp(y0, y1, t), z1, cfg);
          ctx.beginPath();
          ctx.moveTo(l2.x, l2.y);
          ctx.lineTo(l3.x, l3.y);
          ctx.stroke();
        }
      }
    }

    function generateMatBuilding() {
      const random = randomSource(`${seedInput.value}|mat`);
      const cells = [];
      const palette = ["#87847f", "#9b9590", "#78796e", "#a8a29a", "#6e706d"];
      const gridSize = P.gridSize;
      const extentFactor = P.fieldExtent / 100;
      const heightFactor = P.barHeight / 100;
      const courtSizeFactor = P.courtSize / 100;
      const densityChance = P.density / 100;
      const jitterFactor = P.offsetJitter / 100;
      const roofLevelFactor = P.roofLevel / 100;
      const connectivityFactor = P.connectivity / 100;

      const cellSize = 1.2 + courtSizeFactor * 0.8;
      const gridExtent = Math.floor(gridSize * extentFactor);
      const occupied = new Set();

      for (let gx = -gridExtent; gx < gridExtent; gx++) {
        for (let gy = -gridExtent; gy < gridExtent; gy++) {
          const key = `${gx},${gy}`;
          if (occupied.has(key)) continue;
          if (random() > densityChance) continue;

          const spanW = random() < connectivityFactor ? (random() < 0.6 ? 1 : 2) : 1;
          const spanD = random() < connectivityFactor ? (random() < 0.6 ? 1 : 2) : 1;

          for (let sx = 0; sx < spanW; sx++) {
            for (let sy = 0; sy < spanD; sy++) {
              occupied.add(`${gx + sx},${gy + sy}`);
            }
          }

          const x = gx * cellSize + (random() - 0.5) * jitterFactor * cellSize;
          const y = gy * cellSize + (random() - 0.5) * jitterFactor * cellSize;
          const w = cellSize * spanW * 0.94;
          const d = cellSize * spanD * 0.94;
          const h = lerp(0.4, 1.0, random()) * heightFactor + roofLevelFactor * random() * 0.6;

          cells.push({
            x, y, w, d, h,
            color: palette[Math.floor(random() * palette.length)],
            hasCourt: (spanW > 1 || spanD > 1) && random() < 0.5,
            showGrid: random() > 0.35
          });
        }
      }

      return cells.sort((a, b) => (a.x + a.y + a.h) - (b.x + b.y + b.h));
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#0d0d0d");
      gradient.addColorStop(1, "#020202");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const cfg = {
        cx: width * 0.5,
        cy: height * 0.58,
        scale: Math.min(width, height) / 36,
        perspective: 0.5,
        rotationRad: (P.rotation + Math.sin(frame * 0.008) * (running ? 2 : 0)) * Math.PI / 180
      };

      generateMatBuilding().forEach(cell => drawCell(cell, cfg));
    }

    function tick() {
      if (running) {
        frame++;
        applyExperimentalPhysics();
        draw();
      }
      requestAnimationFrame(tick);
    }

    function randomSeed() {
      return `noixzy-mat-${Math.floor(Math.random() * 999999).toString(36)}`;
    }

    function resetAll() {
      experimentalPhysics = false;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = false;
      applyExperimentalPhysics();
      Object.assign(P, defaults);
      seedInput.value = "noixzy-mat-001";
      controlDefs.forEach(([key]) => {
        const input = document.getElementById(key);
        if (input) input.value = P[key];
        if (values[key]) values[key].textContent = P[key];
      });
      frame = 0;
      draw();
    }

    function exportPng() {
      draw();
      const link = document.createElement("a");
      link.download = `noixzy_brutalist_massing_mat_${seedInput.value || "seed"}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    const physicsToggle = document.getElementById("experimental-physics");
    if (physicsToggle) physicsToggle.addEventListener("change", () => {
      experimentalPhysics = physicsToggle.checked;
      applyExperimentalPhysics();
      draw();
    });

    seedInput.addEventListener("input", draw);
    playButton.addEventListener("click", () => {
      running = !running;
      playButton.textContent = running ? "pause" : "play";
      draw();
    });
    document.getElementById("randomize").addEventListener("click", () => {
      seedInput.value = randomSeed();
      randomizeModuleControls();
      draw();
    });
    document.getElementById("reset").addEventListener("click", resetAll);
    document.getElementById("export").addEventListener("click", exportPng);
    window.addEventListener("resize", resizeCanvas);

    buildControls();
    resizeCanvas();
    tick();

    // noixzy shell postMessage bridge
    window.addEventListener("message", e => {
      if (!e.data) return;
      if (e.data.type === "getParams") {
        const defs = PARAMS.map(p => ({
          k: p.k,
          label: p.label,
          min: p.min,
          max: p.max,
          step: p.step,
          v: P[p.k] ?? p.v,
          type: p.type || "range"
        }));
        window.parent.postMessage({ type: "params", data: defs }, "*");
      }
      if (e.data.type === "setParam") {
        const { key, value } = e.data;
        if (Object.prototype.hasOwnProperty.call(P, key)) {
          const def = PARAMS.find(p => p.k === key);
          const next = typeof value === "number" ? value : Number(value);
          P[key] = Number.isFinite(next) ? clamp(next, def.min, def.max) : value;
          const input = document.getElementById(key);
          if (input) input.value = P[key];
          if (values[key]) values[key].textContent = P[key];
          draw();
        }
      }
    });
  </script>
</body>
</html>
