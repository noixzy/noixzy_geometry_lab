<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noixzy brutalist massing megaform</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #101010;
      --line: #2d2d2d;
      --text: #e7e2d8;
      --muted: #8f8a82;
      --accent: #c9b27c;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 292px;
      min-height: 100vh;
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.055), transparent 35%),
        linear-gradient(180deg, #0b0b0b 0%, #030303 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    aside {
      border-left: 1px solid var(--line);
      background: rgba(12, 12, 12, .96);
      padding: 14px;
      overflow: auto;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      min-height: 34px;
      border: 1px solid #383838;
      background: #171717;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      text-transform: lowercase;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .seed-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .seed-row span {
      font-size: 11px;
      color: var(--muted);
      text-transform: lowercase;
    }

    input[type="text"] {
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid var(--line);
      color: var(--text);
      font: inherit;
      font-size: 11px;
    }

    .control {
      margin-bottom: 16px;
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .control-head label {
      color: var(--muted);
      text-transform: lowercase;
    }

    .control-head .value {
      color: var(--text);
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      outline: none;
      appearance: none;
    }

    .physics-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 12px;
      padding: 9px 0;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      color: var(--muted);
      font-size: 11px;
      text-transform: lowercase;
    }

    .physics-toggle input { accent-color: var(--accent); }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      cursor: pointer;
    }
  </style>
  <style>
    /* shell embed: hide native UI, full-viewport canvas */
    body { display: block; }
    main { position: fixed; inset: 0; background: #000; }
    aside { display: none; visibility: hidden; pointer-events: none; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <main>
    <canvas id="view"></canvas>
  </main>

  <aside>
    <h1>noixzy brutalist massing megaform</h1>
    <p class="sub">pyramidal mass, stepped ziggurat, terraced megastructure, monumental single form</p>

    <div class="buttons">
      <button id="randomize">randomize</button>
      <button id="reset">reset</button>
      <button id="play">pause</button>
      <button id="export">export png</button>
    </div>

    <div class="seed-row">
      <span>seed</span>
      <input id="seed" type="text" value="noixzy-mega-001" spellcheck="false">
    </div>
    <div id="controls"></div>
    <label class="physics-toggle"><input id="experimental-physics" type="checkbox"> experimental physics</label>
  </aside>

  <script>
    const defaults = {
      tiers: 14,
      baseWidth: 95,
      baseDepth: 85,
      taperRate: 78,
      tierHeight: 22,
      asymmetry: 15,
      incisions: 32,
      terraceDepth: 45,
      rotation: 28
    };

    const controlDefs = [
      ["tiers", "tiers", 1, 48, 1],
      ["baseWidth", "base width", 10, 300, 1],
      ["baseDepth", "base depth", 10, 280, 1],
      ["taperRate", "taper rate", 0, 190, 1],
      ["tierHeight", "tier height", 1, 80, 1],
      ["asymmetry", "asymmetry", 0, 100, 1],
      ["incisions", "incisions", 0, 120, 1],
      ["terraceDepth", "terrace depth", 0, 160, 1],
      ["rotation", "rotation", -90, 90, 1]
    ];

    const PARAMS = controlDefs.map(([key, label, min, max, step]) => ({
      k: key,
      label,
      min,
      max,
      step,
      v: defaults[key],
      type: "range"
    }));
    const P = {};
    PARAMS.forEach(p => { P[p.k] = p.v; });

    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const controls = document.getElementById("controls");
    const seedInput = document.getElementById("seed");
    const playButton = document.getElementById("play");
    const values = {};
    let state = P;
    let running = true;
    let frame = 0;
    let width = 1;
    let height = 1;
    let dpr = 1;
    let experimentalPhysics = false;
    function randomBiasFor(label) {
      const k = String(label).toLowerCase();
      if (/palette|material|color|hue/.test(k)) return Math.random();
      if (/density|count|grid|cells|points|nodes|modules|bays|divisions|segments|cracks|repeats/.test(k)) return 0.38 + Math.random() * 0.62;
      if (/extrude|depth|height|stack|layer|relief|bump|displace|amplitude|thickness|width|size|scale|cantilever|perspective|slab|fin|mullion|erosion/.test(k)) return 0.28 + Math.random() * 0.72;
      if (/offset|jitter|noise|field|force|twist|warp|phase|bias|rotation|entropy|feedback|pressure|void|variation|fracture/.test(k)) return 0.12 + Math.random() * 0.76;
      if (/line|stroke|shadow/.test(k)) return 0.18 + Math.random() * 0.62;
      return 0.15 + Math.random() * 0.7;
    }
    function snapToStep(value, min, max, step) {
      const safeStep = Number(step) || 1;
      const snapped = Math.round(value / safeStep) * safeStep;
      return Math.max(Number(min), Math.min(Number(max), Number.isInteger(safeStep) ? Math.round(snapped) : Number(snapped.toFixed(3))));
    }
    function randomizeModuleControls() {
      controlDefs.forEach(([key, label, min, max, step]) => {
        const value = snapToStep(min + (max - min) * randomBiasFor(label || key), min, max, step);
        P[key] = value;
        const input = document.getElementById(key);
        if (input) input.value = value;
        if (values[key]) values[key].textContent = value;
      });
      experimentalPhysics = Math.random() > 0.55;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = experimentalPhysics;
      applyExperimentalPhysics();
    }
    function applyExperimentalPhysics() {
      const dx = experimentalPhysics ? Math.sin(frame * 0.017) * 4.5 : 0;
      const dy = experimentalPhysics ? Math.cos(frame * 0.013) * 3.5 : 0;
      const breathe = experimentalPhysics ? 1 + Math.sin(frame * 0.011) * 0.004 : 1;
      canvas.style.transformOrigin = "50% 50%";
      canvas.style.transform = experimentalPhysics ? `translate3d(${dx}px, ${dy}px, 0) scale(${breathe})` : "";
      canvas.style.filter = experimentalPhysics ? "contrast(1.06) saturate(1.08)" : "";
    }

    function hashString(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function randomSource(seed) {
      let t = hashString(seed) || 1;
      return function random() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function shade(hex, amount) {
      const n = parseInt(hex.slice(1), 16);
      const r = clamp((n >> 16) + amount, 0, 255);
      const g = clamp(((n >> 8) & 255) + amount, 0, 255);
      const b = clamp((n & 255) + amount, 0, 255);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function buildControls() {
      controls.innerHTML = "";
      controlDefs.forEach(([key, label, min, max, step]) => {
        const wrap = document.createElement("div");
        wrap.className = "control";
        wrap.innerHTML = `
          <div class="control-head">
            <label for="${key}">${label}</label>
            <span class="value" id="${key}Value">${P[key]}</span>
          </div>
          <input id="${key}" type="range" min="${min}" max="${max}" step="${step}" value="${P[key]}">
        `;
        controls.appendChild(wrap);
        values[key] = wrap.querySelector(".value");
        wrap.querySelector("input").addEventListener("input", event => {
          P[key] = Number(event.target.value);
          values[key].textContent = P[key];
          draw();
        });
      });
    }

    function resizeCanvas() {
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(260, Math.floor(rect.height));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function isoPoint(x, y, z, cfg) {
      const angle = (Math.PI / 4) + cfg.rotationRad;
      const ca = Math.cos(angle);
      const sa = Math.sin(angle);
      const rx = x * ca - y * sa;
      const ry = x * sa + y * ca;
      return {
        x: cfg.cx + rx * cfg.scale,
        y: cfg.cy + (ry * cfg.perspective - z) * cfg.scale
      };
    }

    function polygon(points, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1.3;
        ctx.stroke();
      }
    }

    function drawTier(tier, cfg) {
      const x0 = tier.x;
      const x1 = tier.x + tier.w;
      const y0 = tier.y;
      const y1 = tier.y + tier.d;
      const z0 = tier.z;
      const z1 = tier.z + tier.h;
      const base = tier.color;
      const edge = "rgba(0,0,0,.65)";

      const p000 = isoPoint(x0, y0, z0, cfg);
      const p100 = isoPoint(x1, y0, z0, cfg);
      const p110 = isoPoint(x1, y1, z0, cfg);
      const p010 = isoPoint(x0, y1, z0, cfg);
      const p001 = isoPoint(x0, y0, z1, cfg);
      const p101 = isoPoint(x1, y0, z1, cfg);
      const p111 = isoPoint(x1, y1, z1, cfg);
      const p011 = isoPoint(x0, y1, z1, cfg);

      if (tier.index === 0) {
        const shadowOffset = 20;
        polygon([
          { x: p000.x + shadowOffset, y: p000.y + shadowOffset * .52 },
          { x: p100.x + shadowOffset, y: p100.y + shadowOffset * .52 },
          { x: p110.x + shadowOffset, y: p110.y + shadowOffset * .52 },
          { x: p010.x + shadowOffset, y: p010.y + shadowOffset * .52 }
        ], `rgba(0,0,0,0.4)`);
      }

      polygon([p100, p110, p111, p101], shade(base, -40), edge);
      polygon([p010, p110, p111, p011], shade(base, -62), edge);
      polygon([p001, p101, p111, p011], shade(base, 20), edge);

      if (tier.incisions && tier.incisions.length > 0) {
        tier.incisions.forEach(inc => {
          const ix = x0 + inc.x;
          const iy = y0 + inc.y;
          const iw = inc.w;
          const id = inc.d;
          const iz = z0 + inc.z;

          const i0 = isoPoint(ix, iy, iz, cfg);
          const i1 = isoPoint(ix + iw, iy, iz, cfg);
          const i2 = isoPoint(ix + iw, iy + id, iz, cfg);
          const i3 = isoPoint(ix, iy + id, iz, cfg);

          polygon([i0, i1, i2, i3], "rgba(6,6,6,.9)", "rgba(210,205,190,.12)");
        });
      }

      if (tier.terraced) {
        ctx.strokeStyle = "rgba(70,68,65,.7)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p001.x, p001.y);
        ctx.lineTo(p101.x, p101.y);
        ctx.lineTo(p111.x, p111.y);
        ctx.lineTo(p011.x, p011.y);
        ctx.closePath();
        ctx.stroke();
      }
    }

    function generateMegaform() {
      const random = randomSource(`${seedInput.value}|mega`);
      const tiers = [];
      const palette = ["#8a8680", "#9b9690", "#787b76", "#aba49a", "#6d6f6c"];
      const numTiers = P.tiers;
      const baseW = P.baseWidth / 10;
      const baseD = P.baseDepth / 10;
      const taperFactor = P.taperRate / 100;
      const tierH = P.tierHeight / 10;
      const asymFactor = P.asymmetry / 100;
      const incisionChance = P.incisions / 100;
      const terraceDepthFactor = P.terraceDepth / 100;

      let currentZ = 0;

      for (let i = 0; i < numTiers; i++) {
        const progress = i / numTiers;
        const taper = 1 - (progress * taperFactor);

        const w = baseW * taper;
        const d = baseD * taper;
        const h = tierH * (1 + (random() - 0.5) * 0.3);

        const asymX = (random() - 0.5) * asymFactor * w * 0.3;
        const asymY = (random() - 0.5) * asymFactor * d * 0.3;

        const x = -w / 2 + asymX;
        const y = -d / 2 + asymY;
        const z = currentZ;

        const incisions = [];
        if (random() < incisionChance && i > 1) {
          const numInc = Math.floor(random() * 2) + 1;
          for (let n = 0; n < numInc; n++) {
            incisions.push({
              x: w * (0.2 + random() * 0.3),
              y: d * (0.15 + random() * 0.4),
              w: w * (0.2 + random() * 0.25),
              d: d * (0.3 + random() * 0.4),
              z: h * 0.1,
              h: h * 0.8
            });
          }
        }

        tiers.push({
          x, y, z, w, d, h,
          color: palette[Math.floor(random() * palette.length)],
          incisions,
          terraced: random() < terraceDepthFactor,
          index: i
        });

        currentZ += h;
      }

      return tiers;
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#0c0c0c");
      gradient.addColorStop(1, "#020202");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const cfg = {
        cx: width * 0.5,
        cy: height * 0.72,
        scale: Math.min(width, height) / 32,
        perspective: 0.48,
        rotationRad: (P.rotation + Math.sin(frame * 0.007) * (running ? 2.2 : 0)) * Math.PI / 180
      };

      generateMegaform().forEach(tier => drawTier(tier, cfg));
    }

    function tick() {
      if (running) {
        frame++;
        applyExperimentalPhysics();
        draw();
      }
      requestAnimationFrame(tick);
    }

    function randomSeed() {
      return `noixzy-mega-${Math.floor(Math.random() * 999999).toString(36)}`;
    }

    function resetAll() {
      experimentalPhysics = false;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = false;
      applyExperimentalPhysics();
      Object.assign(P, defaults);
      seedInput.value = "noixzy-mega-001";
      controlDefs.forEach(([key]) => {
        const input = document.getElementById(key);
        if (input) input.value = P[key];
        if (values[key]) values[key].textContent = P[key];
      });
      frame = 0;
      draw();
    }

    function exportPng() {
      draw();
      const link = document.createElement("a");
      link.download = `noixzy_brutalist_massing_megaform_${seedInput.value || "seed"}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    const physicsToggle = document.getElementById("experimental-physics");
    if (physicsToggle) physicsToggle.addEventListener("change", () => {
      experimentalPhysics = physicsToggle.checked;
      applyExperimentalPhysics();
      draw();
    });

    seedInput.addEventListener("input", draw);
    playButton.addEventListener("click", () => {
      running = !running;
      playButton.textContent = running ? "pause" : "play";
      draw();
    });
    document.getElementById("randomize").addEventListener("click", () => {
      seedInput.value = randomSeed();
      randomizeModuleControls();
      draw();
    });
    document.getElementById("reset").addEventListener("click", resetAll);
    document.getElementById("export").addEventListener("click", exportPng);
    window.addEventListener("resize", resizeCanvas);

    buildControls();
    resizeCanvas();
    tick();

    // noixzy shell postMessage bridge
    window.addEventListener("message", e => {
      if (!e.data) return;
      if (e.data.type === "getParams") {
        const defs = PARAMS.map(p => ({
          k: p.k,
          label: p.label,
          min: p.min,
          max: p.max,
          step: p.step,
          v: P[p.k] ?? p.v,
          type: p.type || "range"
        }));
        window.parent.postMessage({ type: "params", data: defs }, "*");
      }
      if (e.data.type === "setParam") {
        const { key, value } = e.data;
        if (Object.prototype.hasOwnProperty.call(P, key)) {
          const def = PARAMS.find(p => p.k === key);
          const next = typeof value === "number" ? value : Number(value);
          P[key] = Number.isFinite(next) ? clamp(next, def.min, def.max) : value;
          const input = document.getElementById(key);
          if (input) input.value = P[key];
          if (values[key]) values[key].textContent = P[key];
          draw();
        }
      }
    });
  </script>
</body>
</html>
