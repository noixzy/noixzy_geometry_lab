<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // curl tendrils</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --ink:#e8e8ea; --accent:#48dfff; --dim:#8b969c; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; height:100vh; }
  .stage { position:relative; flex:1; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel { display:none; }
  .stageTools { display:none; }
  .stageThumbs { display:none; }
  .stageFavs { position:absolute; left:50%; bottom:64px; transform:translateX(-50%); z-index:22; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:8px; max-width:min(760px,68vw); pointer-events:auto; }
  .stageFavs:empty { display:none; }
  .stageFavs .chip { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.58); border:1px solid rgba(255,255,255,.16); border-radius:4px; padding:4px 6px; cursor:pointer; font-size:11px; }
  .stageFavs .chip:hover { border-color:var(--accent); color:var(--accent); }
  .stageFavs .sw { width:9px; height:9px; border-radius:2px; display:inline-block; }
  .stageFavs .x { opacity:.45; padding:0 2px; }
  .stageFavs .x:hover { opacity:1; color:var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div id="stage" class="stage">
    <div id="stageFavs" class="stageFavs"></div>
  </div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main() {
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_azimuth;
uniform float u_smooth;
uniform float u_spin;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;
uniform int   u_transparentBg;

// Capsule endpoints + radius computed in JS each frame.
// u_capA[k].xyz = segment start, .w = radius at start
// u_capB[k].xyz = segment end,   .w = radius at end (averaged for constant capsule)
// Reading uniform arrays with loop-variable index is valid GLSL ES 1.00.
uniform vec4 u_capA[32];
uniform vec4 u_capB[32];

// ── SDF ────────────────────────────────────────────────────────────────────

float sdCapsule(vec3 p, vec3 a, vec3 b, float r) {
  vec3 pa = p - a, ba = b - a;
  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
  return length(pa - ba * h) - r;
}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

float map(vec3 p) {
  float d  = 1e6;
  float sm = mix(0.02, 0.45, u_smooth);
  for(int k = 0; k < 32; k++) {
    float r = (u_capA[k].w + u_capB[k].w) * 0.5;
    if(r > 0.001) d = smin(d, sdCapsule(p, u_capA[k].xyz, u_capB[k].xyz, r), sm);
  }
  return d;
}

// ── lighting ───────────────────────────────────────────────────────────────

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.003, 0.0);
  return normalize(vec3(
    map(p + e.xyy) - map(p - e.xyy),
    map(p + e.yxy) - map(p - e.yxy),
    map(p + e.yyx) - map(p - e.yyx)
  ));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d = map(pos + nor * 0.10); occ += (0.10 - d) * 0.80;
  d = map(pos + nor * 0.28); occ += (0.28 - d) * 0.50;
  return clamp(1.0 - 1.8 * occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float a  = u_azimuth + u_time * u_spin * 0.28;
  vec3  ro = vec3(sin(a) * u_dist, u_elev, cos(a) * u_dist);
  vec3  fw = normalize(-ro);
  vec3  rt = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3  up = cross(fw, rt);
  vec3  rd = normalize(fw * 1.85 + rt * uv.x + up * uv.y);

  float tt  = 0.4;
  bool  hit = false;
  for(int i = 0; i < 52; i++) {
    float d = map(ro + rd * tt);
    if(d < 0.002) { hit = true; break; }
    if(tt > 20.0) break;
    tt += d * 0.60;
  }

  float y      = vUv.y * 0.5 + 0.5;
  vec3  bgBase = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3  bg     = mix(bgBase * 0.55, bgBase * 1.15, y);
  bg = mix(bg * 0.72, bg, smoothstep(1.5, 0.0, length(vUv * 0.9)));
  vec3 col = bg;

  if(hit) {
    vec3  p  = ro + rd * tt;
    vec3  n  = calcNormal(p);
    float ao = mix(1.0, calcAO(p, n), u_ao);

    vec3  ld   = normalize(vec3(0.5, 1.0, 0.5));
    float dif  = clamp(dot(n, ld) * 0.5 + 0.5, 0.0, 1.0);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 32.0);
    float fres = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 4.0);
    float sss  = pow(max(0.0, dot(-rd, ld)), 2.0) * 0.22;

    float luma    = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3  baseCol = mix(vec3(luma), u_formColor, u_formSat) * u_formValue;

    col  = baseCol * mix(0.38, 1.18, dif);
    col  = mix(col, u_hiColor * u_formValue, smoothstep(0.5, 0.9, dif) * 0.32 * u_rim);
    col += pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.8) * u_hiColor * 0.30 * u_rim;
    col += spec * u_hiColor * 0.22 * u_rim;
    col += fres * u_hiColor * 0.08 * u_rim;
    col += sss  * baseCol * 0.5;
    col *= ao;

    float fog = clamp((tt - 5.0) / 15.0, 0.0, 0.5);
    col = mix(col, bg, fog * 0.45);
  }

  col *= mix(0.70, 1.0, smoothstep(1.45, 0.15, length(vUv)));
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

<script>
const PIECE = "curl_tendrils";

const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];

const PARAMS = [
  {k:"count",  g:"paths",    label:"count",      min:2,  max:16,  step:1,    v:6},
  {k:"steps",  g:"paths",    label:"steps",      min:2,  max:16,  step:1,    v:5},
  {k:"spread", g:"paths",    label:"spread",     min:0,  max:1,   step:0.01, v:0.55},
  {k:"scale",  g:"field",    label:"scale",      min:0,  max:1,   step:0.01, v:0.42},
  {k:"curl",   g:"field",    label:"curl",       min:0,  max:1,   step:0.01, v:0.55},
  {k:"warp",   g:"field",    label:"warp",       min:0,  max:1,   step:0.01, v:0.25},
  {k:"radius", g:"form",     label:"radius",     min:0,  max:1,   step:0.01, v:0.45},
  {k:"taper",  g:"form",     label:"taper",      min:0,  max:1,   step:0.01, v:0.55},
  {k:"smooth", g:"form",     label:"smooth",     min:0,  max:1,   step:0.01, v:0.35},
  {k:"length", g:"form",     label:"length",     min:0,  max:1,   step:0.01, v:0.55},
  {k:"flow",   g:"motion",   label:"flow",       min:0,  max:1,   step:0.01, v:0.18},
  {k:"spin",   g:"motion",   label:"spin",       min:0,  max:1,   step:0.01, v:0.10},
  {k:"dist",   g:"camera",   label:"dist",       min:2,  max:10,  step:0.05, v:5.5},
  {k:"elev",   g:"camera",   label:"elev",       min:-2, max:2,   step:0.05, v:0.4},
  {k:"ao",     g:"material", label:"ambient occ",min:0,  max:1,   step:0.01, v:0.75},
  {k:"pal",    g:"material", label:"palette",    min:0,  max:11,  step:1,    v:1},
  {k:"bgVal",  g:"material", label:"bg value",   min:0,  max:2,   step:0.01, v:1.0},
  {k:"fmVal",  g:"material", label:"form value", min:0,  max:2,   step:0.01, v:1.0},
  {k:"fmSat",  g:"material", label:"form sat",   min:0,  max:2,   step:0.01, v:1.0},
  {k:"rim",    g:"material", label:"rim",        min:0,  max:1,   step:0.01, v:0.80},
  {k:"bgAlpha",g:"material", label:"bg alpha",   min:0,  max:1,   step:1,    v:0},
];

let P = {};
PARAMS.forEach(d => { P[d.k] = d.v; });

let _cs = { bg:"#071414", form:"#0f403a", hi:"#7fe0c2" }; // mineral default

let t0, paused = false, pauseT = 0, theShader, _pCanvas;
let transparentBg = false;
let _camAzimuth = 0, _drag = { active:false, x:0, y:0 };
let _velAz = 0, _velElev = 0;
const _DAMPING = 0.93;

const _FAV_KEY = "noixzy_" + PIECE + "_favs";
let _favs = [];

// ─── helpers ──────────────────────────────────────────────────────────────

function hexToRGB(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}
function clampV(v, a, b) { return Math.min(b, Math.max(a, v)); }
function _lrp(a, b, t)   { return a + (b - a) * t; }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx), 0, PALETTES.length - 1)];
  _cs.bg = pal[1]; _cs.form = pal[2]; _cs.hi = pal[3];
}

// ─── noise & field ────────────────────────────────────────────────────────
// Blob positions computed in JS each frame to avoid GLSL ES 1.00 dynamic
// global-array write restrictions (same pattern as blob_field).

function _hash2(px, py) {
  let x = ((px * 127.1) % 1 + 1) % 1;
  let y = ((py * 311.7) % 1 + 1) % 1;
  const d = x * (x + 19.19) + y * (y + 19.19);
  x = ((x + d) % 1 + 1) % 1;
  y = ((y + d) % 1 + 1) % 1;
  return ((x * y) % 1 + 1) % 1;
}

function _vnoise(px, py) {
  const ix = Math.floor(px), iy = Math.floor(py);
  const fx = px - ix, fy = py - iy;
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const a = _hash2(ix,   iy),   b = _hash2(ix+1, iy);
  const c = _hash2(ix,   iy+1), d = _hash2(ix+1, iy+1);
  return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
}

// 3D vector field via three independent 2D noise lookups with mixed axes.
// Not true curl noise but produces organic curving paths in 3D.
function _field3(x, y, z, t, sc) {
  return [
    _vnoise(x*sc + z*0.61 + t*0.13, y*sc + t*0.07      ) - 0.5,
    _vnoise(y*sc + x*0.78 + 1.73,   z*sc + t*0.11 + 5.2) - 0.5,
    _vnoise(z*sc + y*0.43 + 3.14,   x*sc + t*0.17 + 9.1) - 0.5,
  ];
}

// Returns Float32Array(512) = 64 capsule pairs × 2 vec4s each (A and B).
// Euler-integrates each path through the 3D noise field.
// Total capsules capped at 64 regardless of count×steps product.
function _buildPaths(t) {
  const count  = Math.round(clampV(P.count, 2, 16));
  const steps  = Math.round(clampV(P.steps, 2, Math.max(2, Math.floor(32 / count))));
  const spr    = _lrp(0.4, 2.2, P.spread);
  const sc     = _lrp(0.3, 2.5, P.scale);
  const segLen = _lrp(0.15, 1.8, P.length) / steps;
  const baseR  = _lrp(0.04, 0.28, P.radius);
  const tv     = t * _lrp(0.02, 0.40, P.flow);

  // capA and capB: Float32Arrays of 64×4 floats each
  const capA = new Float32Array(128); // 32 × vec4
  const capB = new Float32Array(128);
  let   cap  = 0;

  // Fibonacci sphere for even seed distribution
  const PHI = (1 + Math.sqrt(5)) / 2;

  for(let i = 0; i < count && cap < 32; i++) {
    const az  = Math.acos(1 - 2 * (i + 0.5) / count);
    const el  = 2 * Math.PI * i / PHI;
    let px = Math.sin(az) * Math.cos(el) * spr;
    let py = Math.sin(az) * Math.sin(el) * spr;
    let pz = Math.cos(az) * spr;

    // Outward direction from origin for curl=0 (straight tendrils)
    const sr  = Math.sqrt(px*px + py*py + pz*pz) + 1e-6;
    const ox  = px/sr, oy = py/sr, oz = pz/sr;

    // Per-path time offset keeps paths varied at same t
    const toff = _hash2(i * 0.137, i * 0.591 + 3.7) * 8.0;

    for(let s = 0; s < steps && cap < 32; s++) {
      const ax = px, ay = py, az_ = pz;

      // 3D field direction at current position
      const [vx, vy, vz] = _field3(px + toff, py + toff, pz + toff, tv, sc);
      const vl = Math.sqrt(vx*vx + vy*vy + vz*vz) + 1e-6;

      // Blend outward direction (curl=0) with field direction (curl=1)
      const c  = P.curl;
      const nx = _lrp(ox, vx/vl, c);
      const ny = _lrp(oy, vy/vl, c);
      const nz = _lrp(oz, vz/vl, c);
      const nl = Math.sqrt(nx*nx + ny*ny + nz*nz) + 1e-6;

      px += (nx/nl) * segLen;
      py += (ny/nl) * segLen;
      pz += (nz/nl) * segLen;

      // Taper: full radius at root (s=0), shrinks toward tip
      const tpr = Math.pow(Math.max(0, 1 - (s + 0.5) / steps), P.taper * 1.8 + 0.01);
      const r   = baseR * tpr;

      const b4 = cap * 4;
      capA[b4+0] = ax;  capA[b4+1] = ay;  capA[b4+2] = az_; capA[b4+3] = r;
      capB[b4+0] = px;  capB[b4+1] = py;  capB[b4+2] = pz;  capB[b4+3] = r * 0.85;
      cap++;
    }
  }
  return { capA, capB };
}

// ─── pause ────────────────────────────────────────────────────────────────

window.noixzyTogglePause = function() {
  paused = !paused;
  if (paused) { pauseT = millis(); noLoop(); }
  else        { t0 += millis() - pauseT; loop(); }
};

// ─── bridge ───────────────────────────────────────────────────────────────

function _noixzyPostShellParams() {
  const data = PARAMS.map(d => ({ ...d, v: P[d.k] ?? d.v }));
  try { window.parent.postMessage({ type:"params", data }, "*"); } catch(e) {}
}

function _noixzySetParam(key, value) {
  if (key === "pal") {
    P.pal = clampV(Math.round(value), 0, PALETTES.length - 1);
    applyPalette(P.pal);
    _noixzyPostShellParams();
    return;
  }
  if (key === "bgAlpha") {
    P.bgAlpha     = value ? 1 : 0;
    transparentBg = !!value;
    _noixzyPostShellParams();
    return;
  }
  const def = PARAMS.find(p => p.k === key);
  if (!def) return;
  P[key] = clampV(parseFloat(value), def.min, def.max);
  _noixzyPostShellParams();
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === "getParams") { _noixzyPostShellParams(); return; }
  if (d.type === "setParam")  { _noixzySetParam(d.key, d.value); return; }
});

// ─── favs ─────────────────────────────────────────────────────────────────

function _loadFavs() { try { _favs=JSON.parse(localStorage.getItem(_FAV_KEY)||"[]"); } catch(e) { _favs=[]; } _renderFavs(); }
function _saveFavs() { try { localStorage.setItem(_FAV_KEY, JSON.stringify(_favs)); } catch(e) {} }
function _pinFav()   { _favs.push({ P:{...P}, _cs:{..._cs} }); _saveFavs(); _renderFavs(); }

function _renderFavs() {
  const fp = document.getElementById("stageFavs"); if (!fp) return;
  fp.innerHTML = "";
  _favs.forEach((f, i) => {
    const chip = document.createElement("button"); chip.type="button"; chip.className="chip";
    const sw  = document.createElement("span"); sw.className="sw"; sw.style.background=(f._cs||{}).hi||"#fff";
    const lbl = document.createElement("b"); lbl.textContent="★ "+(i+1);
    const x   = document.createElement("span"); x.className="x"; x.textContent="×";
    chip.append(sw, lbl, x);
    chip.addEventListener("click", ev => {
      ev.preventDefault(); ev.stopPropagation();
      if (ev.target.classList.contains("x")) { _favs.splice(i,1); _saveFavs(); _renderFavs(); return; }
      if (f.P)   Object.assign(P, f.P);
      if (f._cs) Object.assign(_cs, f._cs);
      transparentBg = !!P.bgAlpha;
      _noixzyPostShellParams();
    });
    fp.appendChild(chip);
  });
}

// ─── orbit ────────────────────────────────────────────────────────────────

function _initOrbit(stg) {
  stg.addEventListener("pointerdown", e => {
    _drag = { active:true, x:e.clientX, y:e.clientY };
    _velAz = 0; _velElev = 0;
    stg.setPointerCapture(e.pointerId);
  }, {passive:true});

  stg.addEventListener("pointermove", e => {
    if (!_drag.active) return;
    _velAz   =  (e.clientX - _drag.x) * 0.012;
    _velElev = -(e.clientY - _drag.y) * 0.007;
    _camAzimuth += _velAz;
    P.elev = clampV(P.elev + _velElev, -2, 2);
    _drag.x = e.clientX; _drag.y = e.clientY;
    _noixzyPostShellParams();
  }, {passive:true});

  stg.addEventListener("pointerup", () => {
    _drag.active = false;
    _noixzyPostShellParams();
  });

  stg.addEventListener("wheel", e => {
    e.preventDefault();
    P.dist = clampV(P.dist + e.deltaY * 0.005, 2, 10);
    _noixzyPostShellParams();
  }, {passive:false});
}

// ─── p5 setup / draw ──────────────────────────────────────────────────────

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  _pCanvas = c.elt;
  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );
  t0 = millis();
  applyPalette(Math.round(P.pal));
  _initOrbit(stage);
  _loadFavs();
  buildNav();
  window.addEventListener("resize", () => resizeCanvas(stage.clientWidth, stage.clientHeight));
}

function draw() {
  if (paused) return;

  if (!_drag.active) {
    let damp = false;
    if (Math.abs(_velAz) > 0.0001) {
      _camAzimuth += _velAz; _velAz *= _DAMPING;
      if (Math.abs(_velAz) < 0.0001) _velAz = 0;
      damp = true;
    }
    if (Math.abs(_velElev) > 0.0001) {
      P.elev = clampV(P.elev + _velElev, -2, 2); _velElev *= _DAMPING;
      if (Math.abs(_velElev) < 0.0001) _velElev = 0;
      damp = true;
    }
    if (damp) _noixzyPostShellParams();
  }

  const t = (millis() - t0) / 1000.0;
  const { capA, capB } = _buildPaths(t);

  shader(theShader);
  theShader.setUniform("u_res",          [width, height]);
  theShader.setUniform("u_time",         t);
  theShader.setUniform("u_azimuth",      _camAzimuth);
  theShader.setUniform("u_smooth",       P.smooth);
  theShader.setUniform("u_spin",         P.spin);
  theShader.setUniform("u_dist",         P.dist);
  theShader.setUniform("u_elev",         P.elev);
  theShader.setUniform("u_ao",           P.ao);
  theShader.setUniform("u_bgColor",      hexToRGB(_cs.bg));
  theShader.setUniform("u_formColor",    hexToRGB(_cs.form));
  theShader.setUniform("u_hiColor",      hexToRGB(_cs.hi));
  theShader.setUniform("u_bgValue",      P.bgVal);
  theShader.setUniform("u_formSat",      P.fmSat);
  theShader.setUniform("u_formValue",    P.fmVal);
  theShader.setUniform("u_rim",          P.rim);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  theShader.setUniform("u_capA",         capA);
  theShader.setUniform("u_capB",         capB);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
}

// ─── nav ──────────────────────────────────────────────────────────────────

function buildNav() {
  fetch("../modules.manifest.json")
    .then(r => r.json())
    .then(manifest => {
      const modules = Array.isArray(manifest) ? manifest : (manifest.modules || Object.values(manifest));
      const strip = document.getElementById("moduleThumbStrip"); if (!strip) return;
      strip.innerHTML = "";
      modules.forEach(m => {
        const id    = typeof m==="string" ? m : m.id;
        const title = typeof m==="object" ? (m.title||id) : id;
        const a = document.createElement("a"); a.href="../"+id+"/noixzy_"+id+".html"; a.title=title;
        a.className = "navThumb" + (id===PIECE?" active":"");
        a.onclick = e => { e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
        const img = document.createElement("img"); img.src="../home/thumbs/"+id+".png"; img.alt=title;
        a.appendChild(img); strip.appendChild(a);
      });
      setTimeout(()=>{ const el=strip.querySelector(".active"); if(el)el.scrollIntoView({block:"center",inline:"nearest"}); },50);
    })
    .catch(()=>{});
}
</script>

<script src="../home/noixzy_ruler_overlay.js"></script>
</body>
</html>
