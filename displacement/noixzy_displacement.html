<script>
(function(){
  const rail = document.querySelector("[data-noixzy-home-rail]");
  if (!rail) return;

  function thumbPath(module) {
    const id = module.id || (module.file || "").split("/")[0];
    const raw = module.thumb || `home/thumbs/${id}.png`;
    return "../" + raw.replace(/^\.\//, "").replace(/^home\//, "home/");
  }

  function shellHref(module) {
    const id = module.id || (module.file || "").split("/")[0];
    return `../unified_shell.html?module=${encodeURIComponent(id)}`;
  }

  fetch("../modules.manifest.json", { cache:"no-store" })
    .then(r => r.json())
    .then(manifest => {
      const modules = (manifest.modules || []).filter(module => module.enabledInShell !== false);
      for (const module of modules) {
        const id = module.id || (module.file || "").split("/")[0];
        const title = module.title || id.replaceAll("_", " ");
        const a = document.createElement("a");
        a.className = "noixzyRailThumb";
        a.href = shellHref(module);
        a.title = title;
        a.innerHTML = `<img src="${thumbPath(module)}" alt="${title}" loading="lazy">`;
        rail.appendChild(a);
      }
    })
    .catch(() => {});
})();
</script>
