<script>

let W=820,H=820; const PIECE="grid_extrude";
function syncSeedUI(){
  const v=document.getElementById("vSeed");
  if(v) v.textContent=seed;
}

function _flashConsole(msg){ const el=document.getElementById("presetStatus"); if(el) el.textContent=msg; }
let seed=1, running=true, t0, pauseT=0, dirty=true;
let transparentBg=false;
let scene, glowBuf, vigTex, leaves=[];
let audioCtx,analyser,audioData,audioActive=false;
const ABANDS={bass:0,mid:0,high:0,presence:0};
const AMAP={bass:null,mid:null,high:null,presence:null};
const ADEPTH={bass:0.5,mid:0.5,high:0.5,presence:0.5};
let _audioSaved={};

const SYMMETRY_MODES=[
  {v:0, label:"none"},
  {v:1, label:"mirror X"},
  {v:3, label:"mirror Y"},
  {v:2, label:"quad mirror"},
  {v:4, label:"radial 4"},
  {v:6, label:"radial 6"},
];
function normalizeSymmetryMode(v){
  const n=Math.round(parseFloat(v));
  if(n===1) return 1;       // old 2-fold mirror favorite
  if(n===2) return 2;       // old 4-fold / quad favorite
  if(n===3) return 3;
  if(n===4) return 4;       // experimental radial 4
  if(n===6) return 6;       // experimental radial 6
  return 0;
}
function symmetryLabel(v){
  const mode=SYMMETRY_MODES.find(m=>m.v===normalizeSymmetryMode(v));
  return mode ? mode.label : "none";
}

// ---- parameter registry: the stacked layers ----
const PARAMS=[
  // SYSTEM — the generative grid itself (rebuilds geometry)
  {k:"depth",  g:"system", label:"depth",     min:0,max:1,step:.01,v:.88,sys:true},
  {k:"thr",    g:"system", label:"threshold", min:0,max:1,step:.01,v:.63,sys:true},
  {k:"jit",    g:"system", label:"jitter",    min:0,max:1,step:.01,v:.15,sys:true},
  {k:"gridRes",g:"system", label:"grid res",  min:2,max:128,step:1, v:16, sys:true},
  {k:"cellSize",g:"system",label:"cell size", min:2,max:160,step:2, v:20, sys:true},
  {k:"fill",   g:"system", label:"density",   min:0,max:1,step:.01,v:.60},
  {k:"pal",    g:"system", label:"palette",   min:0,max:9,step:1,  v:4},
  // ARCHITECTURAL DISPLACEMENT — hard-edged, rigid, no smoothing
  {k:"dispSteps",  g:"system",label:"disp steps",   min:2,max:8,step:1,  v:4},
  {k:"dispInset",  g:"system",label:"inset depth",  min:0,max:1,step:.01,v:.4},
  {k:"dispLateral",g:"system",label:"lateral push", min:0,max:1,step:.01,v:.3},
  {k:"dispPunch",  g:"system",label:"punch density",min:0,max:1,step:.01,v:.6},
  {k:"depthAxis",  g:"system",label:"depth axis",   min:0,max:3,step:1,  v:0},
  {k:"rotAxis",    g:"system",label:"rot axis",     min:0,max:2,step:1,  v:0},
  // EXTRUDE — flat cells -> 3D blocks
  {k:"height", g:"extrude",label:"height",    min:0,max:1,step:.01,v:.45},
  {k:"zdepth", g:"extrude",label:"z depth",  min:-3,max:3,step:.01,v:0},
  {k:"hvar",   g:"extrude",label:"variation", min:0,max:1,step:.01,v:.60},
  {k:"light",  g:"extrude",label:"light",     min:0,max:1,step:.01,v:.5},
  {k:"displace",g:"extrude",label:"displace", min:0,max:1,step:.01,v:0},
  // MATERIAL — surface shading
  {k:"metallic",g:"material",label:"metallic", min:0,max:1,step:.01,v:.0},
  {k:"rough",  g:"material",label:"roughness", min:0,max:1,step:.01,v:.5},
  {k:"sheen",  g:"material",label:"sheen",     min:0,max:1,step:.01,v:.0},
  {k:"alpha",  g:"material",label:"opacity",   min:.1,max:1,step:.01,v:1},
  // FRAME — composition / transform
  {k:"zoom",   g:"frame",  label:"zoom",      min:.2,max:4,step:.01,v:.9},
  {k:"rot",    g:"frame",  label:"rotate",    min:-2,max:2,step:.01,v:0},
  {k:"cx",     g:"frame",  label:"center X",  min:-2,max:2,step:.01,v:0},
  {k:"cy",     g:"frame",  label:"center Y",  min:-2,max:2,step:.01,v:0},
  {k:"mirror", g:"frame",  label:"symmetry mode", options:SYMMETRY_MODES, v:0},
  // LOOK — post / finishing

const P={}; PARAMS.forEach(p=>P[p.k]=p.v);
let _histUndo=[], _histRedo=[], _histBeforeSnap=null, _histApplying=false;
let extrudeOff=false;
function _histSnapshot(){
  const snap={__extrudeOff:extrudeOff};
  for(const k in P) snap[k]=P[k];
  return snap;
}
function _histSame(a,b){
  if(!a||!b) return false;
  const ak=Object.keys(a), bk=Object.keys(b);
  if(ak.length!==bk.length) return false;
  for(const k of ak){ if(a[k]!==b[k]) return false; }
  return true;
}
function _histPush(before){
  if(_histApplying) return;
  const after=_histSnapshot();
  if(!before || _histSame(before,after)) return;
  _histUndo.push(before);
  if(_histUndo.length>80) _histUndo.shift();
  _histRedo=[];
  _updateHistoryButtons();
}
function _histStart(){ if(!_histBeforeSnap) _histBeforeSnap=_histSnapshot(); }
function _histEnd(){ const b=_histBeforeSnap; _histBeforeSnap=null; _histPush(b); }
function _updateHistoryButtons(){
  const u=document.getElementById("btnUndo"), r=document.getElementById("btnRedo");
  if(u) u.disabled=!_histUndo.length;
  if(r) r.disabled=!_histRedo.length;
}
function _syncExtrudeOffButton(){
  const b=document.getElementById("extrudeOff");
  if(!b) return;
  b.innerHTML=extrudeOff ? "extrude<br>off ✓" : "extrude<br>off";
  b.classList.toggle("active",extrudeOff);
}
function _applyExtrudeOff(){
  if(!extrudeOff) return;
  if(P.height!==undefined) P.height=0;
  const h=document.getElementById("p_height");
  if(h) h.value=0;
  const hv=document.getElementById("v_height");
  if(hv) hv.textContent=formatParamValue(PARAMS.find(p=>p.k==="height"));
  dirty=true;
}
function _histApply(snap){
  if(!snap) return;
  _histApplying=true;
  if(snap.__extrudeOff!==undefined) extrudeOff=!!snap.__extrudeOff;
  for(const k in P){ if(snap[k]!==undefined) P[k]=snap[k]; }
  _applyExtrudeOff();
  syncParamControls();
  syncAccentFromPalette();
  _syncExtrudeOffButton();
  buildLeaves();
  dirty=true;
  _histApplying=false;
  _updateHistoryButtons();
}
function _histUndoStep(){
  if(!_histUndo.length) return;
  const cur=_histSnapshot();
  const prev=_histUndo.pop();
  _histRedo.push(cur);
  _histApply(prev);
}
function _histRedoStep(){
  if(!_histRedo.length) return;
  const cur=_histSnapshot();
  const next=_histRedo.pop();
  _histUndo.push(cur);
  _histApply(next);
}
function _toggleExtrudeOff(){
  const before=_histSnapshot();
  extrudeOff=!extrudeOff;
  _applyExtrudeOff();
  syncParamControls();
  _syncExtrudeOffButton();
  buildLeaves();
  dirty=true;
  _histPush(before);
}

    r.dataset.boundHistory="1";
    r.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();_histRedoStep();});
  }
  _updateHistoryButtons();
}

// ---- SYSTEM layer: recursive subdivision -> leaf cells ----
function buildLeaves(){
  randomSeed(seed); noiseSeed(seed);
  leaves=[];
  const maxD=Math.floor(map(P.depth,0,1,3,8));
  const res=Math.round(P.gridRes);
  const cw=W/res, ch=H/res;
  for(let gy=0;gy<res;gy++)
    for(let gx=0;gx<res;gx++)
      sub(gx*cw,gy*ch,cw,ch,0,maxD);
  dirty=true;
}
function sub(x,y,w,h,d,maxD){
  const s=map(P.thr,0,1,0.85,0.18);
  const n=noise(x*0.004,y*0.004,d*0.5);
  if(d<maxD && (d<1 || n>s) && w>P.cellSize && h>P.cellSize){
    const jt=map(P.jit,0,1,0.5,0.2);
    const fx=random(jt,1-jt), fy=random(jt,1-jt), mx=w*fx, my=h*fy;
    sub(x,y,mx,my,d+1,maxD); sub(x+mx,y,w-mx,my,d+1,maxD);
    sub(x,y+my,mx,h-my,d+1,maxD); sub(x+mx,y+my,w-mx,h-my,d+1,maxD);
  } else {
    leaves.push({x,y,w,h, hn:noise(x*0.01,y*0.01), ph:random(TWO_PI), r:random(), fl:random()});
  }
}

// ---- EXTRUDE + FRAME: draw 3D blocks into the scene buffer ----
function drawScene(time){
  const pal=PALETTES[P.pal].map(hx);
  scene.push();
  scene.clear(); if(!transparentBg) scene.background(pal[0][0],pal[0][1],pal[0][2]);
  scene.translate(W/2 + P.cx*W*0.5, H/2 - P.cy*H*0.5);
  scene.scale(P.zoom);
  const _rAng=P.rot*0.5;
  const _rAxis=Math.round(P.rotAxis||0);
  if(_rAxis===1) scene.shearX(_rAng); else if(_rAxis===2) scene.shearY(_rAng); else scene.rotate(_rAng);
  scene.translate(-W/2,-H/2);
  scene.noStroke();
  const lightF = 0.35 + P.light*0.5;
  // MATERIAL: gloss = sharp light/dark + white spec; rough = flat/matte
  const gloss = 1 - P.rough;
  const spec  = P.metallic * gloss;          // specular strength
  const a255  = P.alpha*255;                 // opacity
  const sLfac = lightF*0.62 * lerp(1.12, 0.82, gloss);   // gloss darkens sides (contrast)
  const sBfac = lightF*0.42 * lerp(1.18, 0.74, gloss);
  // dark "concrete" base so most blocks read dark; accents pop
  const dark=[lerp(pal[0][0],pal[2][0],0.17), lerp(pal[0][1],pal[2][1],0.17), lerp(pal[0][2],pal[2][2],0.17)];
  const drawLeaves=Math.abs(P.zdepth||0)>0.01 ? [...leaves].sort((a,b)=>(a.y+a.h*0.5)-(b.y+b.h*0.5)) : leaves;
  const numLayers = 1 + Math.floor(P.depth * 3);   // depth=0→1 layer, depth=1→4 layers
  for(let li = numLayers - 1; li >= 0; li--){       // back to front
    const layerA = a255 * (1 - li * 0.25);
    if(layerA <= 0) continue;
    const _layerStep = li * P.depth * 18;
    const _dAxis = Math.round(P.depthAxis||0);
    const layerXOff = (_dAxis===1||_dAxis===3) ? _layerStep : 0;   // X: horizontal, diagonal
    const layerYOff = (_dAxis===0||_dAxis===3) ? _layerStep : 0;   // Y: vertical, diagonal
    const layerScl  = _dAxis===2 ? 1 + li * P.depth * 0.06 : 1;   // Z: scale out from center
    const layerDim  = 1 - li * 0.08;
  for(const c of drawLeaves){
    if(c.fl > P.fill) continue;                // density: leave cells empty (negative space)
    const pulse = 1 + P.drift*0.35*Math.sin(time*1.2*P.speed + c.ph);
    const zdep=P.zdepth||0;
    const tf=Math.max(0,Math.min(1,(c.y+c.h*0.5)/H));
    const z=tf*2-1;
    // contour_field-style z staging
    const scl=(Math.abs(zdep)>0.01?1-z*0.36*zdep:1)*layerScl;
    const yOff=(Math.abs(zdep)>0.01?z*(H/2)*0.34*zdep:0) + layerYOff;
    const shadeZ=Math.abs(zdep)>0.01?1+z*0.24*zdep:1;
    // ARCHITECTURAL DISPLACEMENT — hard-edged, rigid, four modes
    // 1. Hard Step: quantize to discrete plateau levels
    const _dSteps=Math.max(2,Math.round(P.dispSteps||4));
    const _qhn=Math.floor(c.hn*_dSteps)/(_dSteps-1);
    // 2. Inset + Extrude: binary — below threshold insets hard, above extrudes hard
    const _insetCell=c.hn<0.38;
    const _insetF=_insetCell?(1-(P.dispInset||0)*0.88):(1+(P.dispInset||0)*0.32);
    const oh=P.height*70*lerp(1,_qhn*1.6,P.hvar)*_insetF*(P.drift>0?pulse:1)*(0.85+0.15*scl);
    // 3. Lateral Push: noise-selected cells shear cap sideways — hard, no falloff
    const _latAmt=(c.r>0.62)?((c.hn>0.5?1:-1)*(P.dispLateral||0)*32):0;
    const O=[oh+_latAmt,-oh];                  // iso lift + lateral shear
    const zp=(x,y)=>[W/2+(x-W/2)*scl+layerXOff, H/2+(y-H/2)*scl+yOff];
    const A=zp(c.x,c.y),B=zp(c.x+c.w,c.y),D=zp(c.x,c.y+c.h),C=zp(c.x+c.w,c.y+c.h);
    let base = c.r<0.14 ? pal[1] : (c.r<0.24 ? pal[2] : dark);
    base=[Math.min(255,base[0]*shadeZ*layerDim),Math.min(255,base[1]*shadeZ*layerDim),Math.min(255,base[2]*shadeZ*layerDim)];
    // cap = base + metallic white sheen + flat sheen lift
    const lift = spec*0.45 + P.sheen*0.25;
    const cap=[lerp(base[0],255,lift), lerp(base[1],255,lift), lerp(base[2],255,lift)];
    // trailing side faces (left + bottom), shaded
    let sc=shade(base, sLfac); scene.fill(sc[0],sc[1],sc[2], layerA);
    scene.quad(A[0],A[1], D[0],D[1], D[0]+O[0],D[1]+O[1], A[0]+O[0],A[1]+O[1]);   // left
    sc=shade(base, sBfac); scene.fill(sc[0],sc[1],sc[2], layerA);
    scene.quad(D[0],D[1], C[0],C[1], C[0]+O[0],C[1]+O[1], D[0]+O[0],D[1]+O[1]);   // bottom
    // lit cap
    scene.fill(cap[0],cap[1],cap[2], layerA);
    scene.quad(A[0]+O[0],A[1]+O[1], B[0]+O[0],B[1]+O[1], C[0]+O[0],C[1]+O[1], D[0]+O[0],D[1]+O[1]);
    // specular edge highlight along the leading cap edge (glossy metallic)
    if(spec>0.06){ scene.stroke(255,255,255, 230*spec*layerDim); scene.strokeWeight(1.4);
      scene.line(A[0]+O[0],A[1]+O[1], B[0]+O[0],B[1]+O[1]); scene.noStroke(); }
    // 4. Faceted Punch: secondary inner face extruded higher — dominant at defaults
    if((P.dispPunch||0)>0.01&&c.fl<P.dispPunch&&oh>4){
      const _pi=0.20,_pOh=oh*1.55,_pO=[_pOh+_latAmt,-_pOh];
      const _px=c.x+c.w*_pi,_py=c.y+c.h*_pi,_pw=c.w*(1-2*_pi),_ph=c.h*(1-2*_pi);
      const pA=zp(_px,_py),pB=zp(_px+_pw,_py),pD=zp(_px,_py+_ph),pC=zp(_px+_pw,_py+_ph);
      let _ps=shade(cap,sLfac*0.80); scene.fill(_ps[0],_ps[1],_ps[2],layerA);
      scene.quad(pA[0]+O[0],pA[1]+O[1],pD[0]+O[0],pD[1]+O[1],pD[0]+_pO[0],pD[1]+_pO[1],pA[0]+_pO[0],pA[1]+_pO[1]);
      _ps=shade(cap,sBfac*0.80); scene.fill(_ps[0],_ps[1],_ps[2],layerA);
      scene.quad(pD[0]+O[0],pD[1]+O[1],pC[0]+O[0],pC[1]+O[1],pC[0]+_pO[0],pC[1]+_pO[1],pD[0]+_pO[0],pD[1]+_pO[1]);
      const _pc=[Math.min(255,cap[0]*1.18),Math.min(255,cap[1]*1.18),Math.min(255,cap[2]*1.18)];
      scene.fill(_pc[0],_pc[1],_pc[2],layerA);
      scene.quad(pA[0]+_pO[0],pA[1]+_pO[1],pB[0]+_pO[0],pB[1]+_pO[1],pC[0]+_pO[0],pC[1]+_pO[1],pD[0]+_pO[0],pD[1]+_pO[1]);
    }
  }
  }
  scene.pop();
}

function draw(){
  const time = (running ? (millis()-t0)/1000 : pauseT);
  // motion / drift means redraw geometry each frame; otherwise only when dirty
  const animate = (P.speed>0 || P.drift>0 || audioActive);
  _audioApply();
  if(animate || dirty){ drawScene(time); dirty=false; }
  _audioRestore();

  const pal=PALETTES[P.pal].map(hx);
  if(transparentBg) clear(); else background(pal[0][0],pal[0][1],pal[0][2]);

  // LOOK: contrast via GPU canvas filter (wraps the scene composite)
  drawingContext.filter = P.contrast>0 ? `contrast(${(100+P.contrast*120)|0}%)` : "none";

  // FRAME: named symmetry modes, still backed by numeric P.mirror for old favorites.
  drawSymmetry(P.mirror);
  drawingContext.filter = "none";

  // LOOK: glow (cheap bloom from downscaled blur)
  if(P.glow>0.01){
    glowBuf.clear(); glowBuf.image(scene,0,0,glowBuf.width,glowBuf.height);
    glowBuf.filter(BLUR, 3);
    push(); blendMode(ADD); tint(255,110*P.glow); image(glowBuf,0,0,W,H); pop();
    blendMode(BLEND); noTint();
  }
  // LOOK: vignette (precomputed gradient overlay)
  if(P.vig>0.01){ push(); tint(255,255*P.vig); image(vigTex,0,0,W,H); pop(); noTint(); }

  select("#seedRead").html(seed);
}
function clipRect(x,y,w,h){
  drawingContext.beginPath(); drawingContext.rect(x,y,w,h); drawingContext.clip();
}
function clipWedge(cx,cy,angle){
  const radius = Math.sqrt(W*W + H*H) * 1.1;
  drawingContext.beginPath();
  drawingContext.moveTo(cx,cy);
  drawingContext.arc(cx,cy,radius,-angle/2,angle/2);
  drawingContext.closePath();
  drawingContext.clip();
}
function drawSymmetry(mode){
  const m=normalizeSymmetryMode(mode);
  if(m===0){ wimg(); return; }
  if(m===1){
    push(); clipRect(0,0,W/2,H); wimg(); pop();
    push(); clipRect(W/2,0,W/2,H); translate(W,0); scale(-1,1); wimg(); pop();
    return;
  }
  if(m===3){
    push(); clipRect(0,0,W,H/2); wimg(); pop();
    push(); clipRect(0,H/2,W,H/2); translate(0,H); scale(1,-1); wimg(); pop();
    return;
  }
  if(m===2){
    push(); clipRect(0,0,W/2,H/2); wimg(); pop();
    push(); clipRect(W/2,0,W/2,H/2); translate(W,0); scale(-1,1); wimg(); pop();
    push(); clipRect(0,H/2,W/2,H/2); translate(0,H); scale(1,-1); wimg(); pop();
    push(); clipRect(W/2,H/2,W/2,H/2); translate(W,H); scale(-1,-1); wimg(); pop();
    return;
  }
  if(m===4 || m===6){
    const count = m;
    const angle = TWO_PI / count;
    const cx = W/2, cy = H/2;
    push();
    clipWedge(cx,cy,angle);
    for(let i=0;i<count;i++){
      push();
      translate(cx,cy);
      rotate(angle*i);
      translate(-cx,-cy);
      wimg();
      pop();
    }
    pop();
    return;
  }
  wimg();
}
// DISPLACE: draw the scene buffer with a noise/wave row warp
function wimg(){
  if(P.displace>0.01){ const t=(running?(millis()-t0)/1000:pauseT), strips=64, amp=P.displace*44;
    for(let i=0;i<strips;i++){ const sy=Math.floor(i*H/strips), sh=Math.ceil(H/strips)+1;
      const dx=Math.sin(sy*0.012+t*0.6)*amp + (noise(sy*0.01,t*0.2)-0.5)*amp*1.4;
      image(scene,dx,sy,W,sh,0,sy,W,sh); } }
  else image(scene,0,0);
}

function normalizeParamValue(p, value){
  if(p.k==="mirror") return normalizeSymmetryMode(value);
  const v=parseFloat(value);
  return Number.isFinite(v) ? v : p.v;
}
function formatParamValue(p){
  if(p.k==="mirror") return symmetryLabel(P[p.k]);
  return (p.step>=1)?P[p.k]:(+P[p.k]).toFixed(2);
}
function normalizePastedP(src){
  if(src===undefined||src===null) return null;
  if(Array.isArray(src)){ const out={}; PARAMS.forEach((p,i)=>{ if(src[i]!==undefined) out[p.k]=src[i]; }); return out; }
  if(typeof src==="object") return src;
  return null;
}
function copyParams(){
  const txt=JSON.stringify({seed:seed,P:P,theme:activeTheme});
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>flash("copyP","copied ✓"),()=>{prompt("params JSON:",txt);flash("copyP","copied ✓");});
  }else{ prompt("params JSON:",txt); flash("copyP","copied ✓"); }
}
function pasteParams(){
  const fail=()=>flash("pasteP","✗ invalid");
  if(!(navigator.clipboard&&navigator.clipboard.readText)){ fail(); return; }
  navigator.clipboard.readText().then(txt=>{
    if(!txt){ fail(); return; }
    let data; try{ data=JSON.parse(txt); }catch(e){ fail(); return; }
    if(!data||typeof data!=="object"){ fail(); return; }
    const cfg={}; let touched=false;
    if(data.seed!==undefined){ const n=parseInt(data.seed,10); if(Number.isFinite(n)){ cfg.seed=n; touched=true; } }
    const nextP=normalizePastedP(data.P);
    if(nextP){ cfg.P=nextP; touched=true; }
    if(data.theme!==undefined) applyTheme(data.theme);
    if(!touched&&data.theme===undefined){ fail(); return; }
    if(touched) applyConfig(cfg);
    flash("pasteP","pasted ✓");
  },fail);
}

function randomizeParams(mode="all"){
  if(mode==="color"){ randomizeColor(); return; }
  const before=_histSnapshot();
  PARAMS.forEach(p=>{
    if(mode==="form" && p.k==="pal") return;
    if(mode==="form" && p.g==="material") return;
    if(mode==="form" && p.g==="look") return;
    if(mode==="form" && p.g==="motion") return;
    if(mode==="form" && p.g==="frame") return;
    if(extrudeOff && p.g==="extrude") return;
    if(p.options){
      const opts=p.options.map(o=>o.v);
      P[p.k]=opts[Math.floor(Math.random()*opts.length)];
    }else{
      const span=p.max-p.min;
      const raw=p.min+Math.random()*span;
      const step=parseFloat(p.step||0.01);
      P[p.k]=normalizeParamValue(p, Math.round(raw/step)*step);
    }
  });
  _applyExtrudeOff();
  syncParamControls();
  syncAccentFromPalette();
  buildLeaves();
  dirty=true;
  _histPush(before);
  _flashConsole(mode==="form" ? "random form" : "random all");
}

function _audioApply(){
  _audioSaved={};
  if(!audioActive||!analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N=audioData.length;
  const avg=(s,e)=>{let v=0;for(let i=s;i<e;i++)v+=audioData[i];return v/((e-s)*255);};
  ABANDS.bass=avg(0,4); ABANDS.mid=avg(4,20); ABANDS.high=avg(20,60); ABANDS.presence=avg(0,N);
  for(const band of ['bass','mid','high','presence']){
    const k=AMAP[band]; if(!k||P[k]===undefined) continue;
    _audioSaved[k]=P[k];
    const par=PARAMS.find(p=>p.k===k);
    const mn=par?par.min:0, mx=par?par.max:1;
    P[k]=Math.min(mx,Math.max(mn,P[k]+ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore(){ for(const k of Object.keys(_audioSaved)) P[k]=_audioSaved[k]; _audioSaved={}; }

const GRID_PRESET_STORAGE_KEY = "noixzy_grid_extrude_presets_v1";

function _gridPresetState(){
  return { seed:seed, P:JSON.parse(JSON.stringify(P)), theme:activeTheme };
}
function _gridReadPresets(){
  try { return JSON.parse(localStorage.getItem(GRID_PRESET_STORAGE_KEY)||"{}") || {}; }
  catch(e){ return {}; }
}
function _gridWritePresets(presets){
  localStorage.setItem(GRID_PRESET_STORAGE_KEY, JSON.stringify(presets));
}
function _gridRenderPresetSelect(){
  const sel=document.getElementById("localPreset");
  if(!sel) return;
  const presets=_gridReadPresets();
  const names=Object.keys(presets).sort((a,b)=>a.localeCompare(b));
  sel.innerHTML="";
  if(!names.length){
    const o=document.createElement("option");
    o.value="";
    o.textContent="no local presets";
    sel.appendChild(o);
    return;
  }
  names.forEach(name=>{
    const o=document.createElement("option");
    o.value=name;
    o.textContent=name;
    sel.appendChild(o);
  });
}
function _gridSavePreset(){

  presets[name]=_gridPresetState();
  _gridWritePresets(presets);
  _gridRenderPresetSelect();
  const sel=document.getElementById("localPreset");

function _gridLoadPreset(){

function _gridDeletePreset(){

}

function recordClip(dur=4){
  const btn=document.getElementById('rec')||document.getElementById('btnRec2');
  if(btn._recording) return;

  if(!canvas||!canvas.captureStream){btn.textContent='unsupported';setTimeout(()=>btn.textContent='rec',2000);return;}
  const mimeType=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(t=>MediaRecorder.isTypeSupported(t))||'';
  const stream=canvas.captureStream(30);
  const rec=new MediaRecorder(stream,mimeType?{mimeType}:{});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{
    btn._recording=false;
    const blob=new Blob(chunks,{type:mimeType||'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='noixzy_'+PIECE+'_'+seed+'.webm'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    btn.textContent='rec';
  };
  btn._recording=true;
  rec.start();
  let t=dur;
  btn.textContent='● '+t+'s';
  const iv=setInterval(()=>{
    t--;
    if(t>0){ btn.textContent='● '+t+'s'; }
    else { clearInterval(iv); btn.textContent='saving…'; rec.stop(); stream.getTracks().forEach(tr=>tr.stop()); }
  },1000);
}
const ALL_MODULES=[];
function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);
  const safeIdx=idx>=0?idx:0;
  const prev=ALL_MODULES[(safeIdx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(safeIdx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev"); if(np){ np.href="../"+prev.id+"/noixzy_"+prev.id+".html"; np.title=prev.title; }
  const nn=document.getElementById("navNext"); if(nn){ nn.href="../"+next.id+"/noixzy_"+next.id+".html"; nn.title=next.title; }

  const rail=document.getElementById("stageThumbs");
  if(rail){
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type=>{
      rail.addEventListener(type,e=>e.stopPropagation(),true);
    });
  }

  const strip=document.getElementById("moduleThumbStrip"); if(!strip) return;
  strip.innerHTML="";
  let railSelected=safeIdx;

  function selectThumb(i){
    const links=[...strip.querySelectorAll(".navThumb")];
    if(!links.length) return;
    railSelected=(i+links.length)%links.length;
    links.forEach(a=>a.classList.remove("selected"));
    links[railSelected].classList.add("selected");
    links[railSelected].scrollIntoView({block:"nearest",inline:"nearest",behavior:"smooth"});
  }

  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a"); a.href="../"+m.id+"/noixzy_"+m.id+".html"; a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    a.onclick=e=>{ e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
    const img=document.createElement("img"); img.src="../home/thumbs/"+m.id+".png"; img.alt=m.title;
    a.appendChild(img); strip.appendChild(a);
  });

  const up=document.getElementById("thumbUp");
  const dn=document.getElementById("thumbDown");
  if(up){ up.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected-1); }; }
  if(dn){ dn.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected+1); }; }

  setTimeout(()=>{ const el=strip.querySelector(".active"); if(el){ el.scrollIntoView({block:"center",inline:"nearest"}); } },50);
}
</script>
<script>
// ── noixzy shell postMessage bridge ──
window.addEventListener("message", e => {
  if (!e.data) return;
  if (e.data.type === "getParams") {
    const defs = PARAMS.map(p => ({
      k: p.k,
      label: p.label,
      min: p.min,
      max: p.max,
      step: p.step,
      v: P[p.k] ?? p.v,
      type: p.type || "range"
    }));
    defs.push({ k: "__extrudeOff", label: "extrude off", type: "bool", v: extrudeOff });
    window.parent.postMessage({ type: "params", data: defs }, "*");
  }
  if (e.data.type === "setParam") {
    const { key, value } = e.data;
    if (key === "__extrudeOff") {
      const prev = P.height;
      extrudeOff = !!value;
      _syncExtrudeOffButton();
      if (extrudeOff) {
        window.__savedHeight = prev;
        _applyExtrudeOff();
      } else {
        if (window.__savedHeight !== undefined) {
          P.height = window.__savedHeight;
          const h = document.getElementById("p_height");
          if (h) h.value = window.__savedHeight;
        }
        dirty = true;
      }
    } else if (P[key] !== undefined) {
      _histStart();
      P[key] = value;
      _histEnd();
      const pd = PARAMS.find(p => p.k === key);
      if (pd && pd.sys) buildLeaves();
      else dirty = true;
    }
  }
});
</script>
