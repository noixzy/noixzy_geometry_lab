<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_scale;
uniform float u_threshold;
uniform float u_phase;
uniform float u_spin;
uniform float u_azimuth;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform int   u_transparentBg; // 1 = transparent background, geometry remains opaque
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

float gyroid(vec3 q) {
  return sin(q.x)*cos(q.y) + sin(q.y)*cos(q.z) + sin(q.z)*cos(q.x);
}

float map(vec3 p) {
  float sc = mix(0.7, 4.2, u_scale);
  float ph = u_time * u_phase * 0.5;
  vec3 q = p * sc;
  float g = sin(q.x)*cos(q.y+ph) + sin(q.y)*cos(q.z+ph) + sin(q.z)*cos(q.x+ph);
  float shell = (abs(g) - u_threshold * 0.45) / sc;
  float sphere = length(p) - 2.1;
  return max(shell, sphere);
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d=map(pos+nor*0.05); occ+=(0.05-d)*1.0;
  d=map(pos+nor*0.12); occ+=(0.12-d)*0.8;
  d=map(pos+nor*0.22); occ+=(0.22-d)*0.6;
  d=map(pos+nor*0.36); occ+=(0.36-d)*0.4;
  return clamp(1.0 - 1.8*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float a = u_azimuth + u_time * u_spin * 0.38;
  float elev = u_elev + 0.22*sin(u_time * 0.13);
  vec3 ro = vec3(sin(a)*u_dist, elev, cos(a)*u_dist);
  vec3 ta = vec3(0.0);
  vec3 fw = normalize(ta - ro);
  vec3 rt = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3 up = cross(fw, rt);
  vec3 rd = normalize(fw*1.9 + rt*uv.x + up*uv.y);

  float tt = 0.8;
  bool hit = false;
  for(int i = 0; i < 100; i++) {
    float d = map(ro + rd * tt);
    if(d < 0.0008) { hit = true; break; }
    if(tt > 14.0) break;
    tt += d * 0.55;
  }

  float y = vUv.y * 0.5 + 0.5;
  vec3 bgBase = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3 bg = mix(bgBase * 0.62, bgBase * 1.08, y);
  float bvig = smoothstep(1.45, 0.0, length(vUv * 0.88));
  bg = mix(bg * 0.76, bg, bvig);
  vec3 col = bg;

  if(hit) {
    vec3 p = ro + rd * tt;
    vec3 n = calcNormal(p);
    float ao = mix(1.0, calcAO(p, n), u_ao);

    vec3 ld = normalize(vec3(0.65, 0.85, 0.5));
    float dif = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.8);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 28.0);
    float fres = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 4.5);

    float luma = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3 baseCol = mix(vec3(luma), u_formColor, u_formSat);
    baseCol *= u_formValue;

    col = baseCol * mix(0.48, 1.08, dif);
    col = mix(col, u_hiColor * u_formValue, smoothstep(0.55, 0.95, dif) * 0.4 * u_rim);
    col += rim  * u_hiColor * 0.32 * u_rim;
    col += spec * u_hiColor * 0.18 * u_rim;
    col += fres * u_hiColor * 0.08 * u_rim;
    col *= ao;

    float depthFog = clamp((tt - 3.0) / 11.0, 0.0, 0.55);
    col = mix(col, bg, depthFog * 0.5);
  }

  float vig = smoothstep(1.42, 0.18, length(vUv));
  col *= mix(0.76, 1.0, vig);
  col = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

function _audioApply(){
  _audioSaved={};
  if(!audioActive||!analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N=audioData.length;
  const avg=(s,e)=>{let v=0;for(let i=s;i<e;i++)v+=audioData[i];return v/((e-s)*255);};
  ABANDS.bass=avg(0,4);ABANDS.mid=avg(4,20);ABANDS.high=avg(20,60);ABANDS.presence=avg(0,N);
  for(const band of['bass','mid','high','presence']){
    const k=AMAP[band];if(!k||P[k]===undefined)continue;
    _audioSaved[k]=P[k];
    const par=_pAudioParams.find(p=>p.k===k);
    const mn=par?par.min:0,mx=par?par.max:1;
    P[k]=Math.min(mx,Math.max(mn,P[k]+ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}

  const starterSel = document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.name; starterSel.appendChild(o); });

  document.getElementById("btnSave")?.addEventListener("click", ()=>{
    saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`, "png");
  });
  document.getElementById("btnThumb")?.addEventListener("click", saveThumb);

  document.getElementById("btnPause")?.addEventListener("click", ()=>{
    paused = !paused;
    if(paused) pauseT = millis() - t0;
    else t0 = millis() - pauseT;
    document.getElementById("btnPause").textContent = paused ? "play" : "pause";
  });

  document.addEventListener("keydown", e=>{
    if(e.key === "h") document.getElementById("panel").classList.toggle("hidden");
    if(e.key === " "){ e.preventDefault(); document.getElementById("btnPause").click(); }
    if(e.key === "[") cycleTheme(-1);
    if(e.key === "]") cycleTheme(1);
    if(e.key === "s") document.getElementById("btnSave").click();
  });

  const saved = localStorage.getItem(THEMEKEY);
  if(saved && THEME_NAMES.includes(saved)) applyTheme(saved);
  else applyTheme("graphite");

  syncParamUI();
  syncColorUI();
  document.getElementById("vPal").textContent = `${document.getElementById("sPal").value} ${PALETTES[parseInt(document.getElementById("sPal").value)][0]}`;

  _buildAudioUI();
  _loadFavs();
  _initOrbit(stage);
  buildNav();

  // cycle theme
  document.getElementById("themePrev")?.addEventListener("click",()=>cycleTheme(-1));
  document.getElementById("themeNext")?.addEventListener("click",()=>cycleTheme(1));
  // reset
  document.getElementById("btnReset")?.addEventListener("click",()=>location.reload());
  // copy/paste state
  document.getElementById("btnCopy")?.addEventListener("click",()=>{
    const state=JSON.stringify({P:{...P},cs:{...cs}});
    navigator.clipboard?.writeText(state).then(()=>_flashConsole("copied"),()=>prompt("state:",state));
  });
  document.getElementById("btnPaste")?.addEventListener("click",async()=>{
    try{
      const raw=await navigator.clipboard.readText();
      const s=JSON.parse(raw);
      if(s.P) Object.assign(P,s.P);
      if(s.cs) Object.assign(cs,s.cs);
      syncParamUI&&syncParamUI(); syncColorUI&&syncColorUI();
      _flashConsole("pasted");
    }catch(e){ _flashConsole("paste failed"); }
  });
  // save 2x
  document.getElementById("btnSave2x")?.addEventListener("click",()=>{
    requestAnimationFrame(()=>{
      const src=_pCanvas||document.querySelector("canvas");
      if(!src) return;
      const out=document.createElement("canvas"); out.width=src.width*2; out.height=src.height*2;
      out.getContext("2d").drawImage(src,0,0,out.width,out.height);
      const a=document.createElement("a"); a.download=`noixzy_${PIECE}_${Math.floor(millis())}_2x.png`;
      a.href=out.toDataURL("image/png"); a.click();
    });
  });
  // video recording
  document.getElementById("btnRec")?.addEventListener("click",()=>{
    const btn=document.getElementById("btnRec");
    const src=document.querySelector("canvas"); if(!src) return;
    const seconds=parseInt(document.getElementById("recDur")?.value||"4",10)||4;
    const stream=src.captureStream(30);
    const chunks=[];
    const rec=new MediaRecorder(stream,{mimeType:"video/webm"});
    rec.ondataavailable=e=>{if(e.data&&e.data.size) chunks.push(e.data);};
    rec.onstop=()=>{
      const blob=new Blob(chunks,{type:"video/webm"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.download=`noixzy_${PIECE}_${Math.floor(millis())}_${seconds}s.webm`;
      a.href=url; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
      if(btn) btn.textContent="video";
    };
    rec.start();
    let remaining=seconds;
    if(btn) btn.textContent="● "+remaining+"s";
    const iv=setInterval(()=>{
      remaining--;
      if(remaining>0){
        if(btn) btn.textContent="● "+remaining+"s";
      } else {
        clearInterval(iv);
        if(btn) btn.textContent="saving…";
        if(rec.state==="recording") rec.stop();
      }
    },1000);
  });
  // starter cycle arrows
  document.getElementById("starterPrev")?.addEventListener("click",()=>{
    const sel=document.getElementById("starterPreset"); if(!sel||!STARTERS) return;
    const n=(parseInt(sel.value||"0")-1+STARTERS.length)%STARTERS.length;
    sel.value=n; loadStarter(STARTERS[n]); _flashConsole("loaded "+STARTERS[n].name);
  });
  document.getElementById("starterNext")?.addEventListener("click",()=>{
    const sel=document.getElementById("starterPreset"); if(!sel||!STARTERS) return;
    const n=(parseInt(sel.value||"0")+1)%STARTERS.length;
    sel.value=n; loadStarter(STARTERS[n]); _flashConsole("loaded "+STARTERS[n].name);
  });

  window.addEventListener("resize", ()=>{
    resizeCanvas(stage.clientWidth, stage.clientHeight);
  });
}

function draw() {
  if(paused) return;
  _audioApply();
  const t = (millis() - t0) / 1000.0;

  shader(theShader);
  theShader.setUniform("u_res",       [width, height]);
  theShader.setUniform("u_time",      t);
  theShader.setUniform("u_azimuth",   _camAzimuth);
  theShader.setUniform("u_scale",     P.scale);
  theShader.setUniform("u_threshold", P.thresh);
  theShader.setUniform("u_phase",     P.phase);
  theShader.setUniform("u_spin",      P.spin);
  theShader.setUniform("u_dist",      P.dist);
  theShader.setUniform("u_elev",      P.elev);
  theShader.setUniform("u_ao",        P.ao);
  theShader.setUniform("u_bgColor",   hexToRGB(cs.bg));
  theShader.setUniform("u_formColor", hexToRGB(cs.form));
  theShader.setUniform("u_hiColor",   hexToRGB(cs.hi));
  theShader.setUniform("u_bgValue",   cs.bgVal);
  theShader.setUniform("u_formSat",   cs.fSat);
  theShader.setUniform("u_formValue", cs.fVal);
  theShader.setUniform("u_rim",       cs.rim);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}

/* NOIXZY_HAND_AUTHORED_GRID_UI_START */
function _noixzyHandAuthoredGridUi(){
  const stage=document.getElementById("stage");
  if(stage && !document.getElementById("stageFavs")){
    const favs=document.createElement("div");
    favs.id="stageFavs";
    favs.className="stageFavs";
    stage.insertBefore(favs, stage.firstChild);
  }

  const tools=document.getElementById("stageTools");
  if(tools && !tools.dataset.noixzyGridOrdered){
    tools.dataset.noixzyGridOrdered="1";
    const groups = [
      ["btnPin","exportFavs","btnCopy","btnPaste"],
      ["btnAudio","clearFavs"],
      ["btnThumb","btnRec","recDur","btnSave","btnSave2x"]
    ];
    const made=[];
    groups.forEach(ids=>{
      const nodes=ids.map(id=>document.getElementById(id)).filter(Boolean);
      if(!nodes.length) return;
      const g=document.createElement("div");
      g.className="stageToolGroup";
      nodes.forEach(n=>g.appendChild(n));
      made.push(g);
    });
    if(made.length){
      tools.innerHTML="";
      made.forEach(g=>tools.appendChild(g));
    }
  }

  // Bubble-phase only. Do not use capture; capture killed SDF buttons.
  if(tools && !tools.dataset.noixzyBubbleStop){
    tools.dataset.noixzyBubbleStop="1";
    ["pointerdown","pointerup","mousedown","mouseup","touchstart","touchend","click","dblclick","wheel"].forEach(type=>{
      tools.addEventListener(type,e=>e.stopPropagation(), type==="wheel" ? {passive:false} : false);
    });
  }

  const rail=document.getElementById("stageThumbs");
  if(rail && !rail.dataset.noixzyWheelBound){
    rail.dataset.noixzyWheelBound="1";
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type=>{
      rail.addEventListener(type,e=>e.stopPropagation(),true);
    });
    rail.addEventListener("wheel",e=>{
      e.preventDefault();
      e.stopPropagation();
      const strip=document.getElementById("moduleThumbStrip");
      if(strip) strip.scrollTop += e.deltaY;
    },{capture:true,passive:false});
  }

  // Panel: keep theme first, then reset/pause, then starter/local presets, then params.
  // This moves existing nodes only, preserving native handlers.
  const panel=document.querySelector(".panel");
  if(panel && !panel.dataset.noixzyPanelOrdered){
    const consoleBtns=panel.querySelector(".consoleBtns");
    const presetBox=panel.querySelector(".presetBox");
    const presetStatus=document.getElementById("presetStatus");

    if(consoleBtns && presetBox && !presetBox.contains(consoleBtns)){
      let anchor=consoleBtns.nextSibling;
      if(presetStatus && presetStatus.parentElement===panel){
        panel.insertBefore(presetStatus, anchor);
        anchor=presetStatus.nextSibling;
      }
      panel.insertBefore(presetBox, anchor);
      panel.dataset.noixzyPanelOrdered="1";
    }
  }
}

window.addEventListener("load",()=>{
  setTimeout(()=>{ try{ _noixzyHandAuthoredGridUi(); }catch(e){ console.error(e); } },40);
  setTimeout(()=>{ try{ _noixzyHandAuthoredGridUi(); }catch(e){ console.error(e); } },250);
});

function _noixzyThemePaletteIndex(){
  let name = "";
  try{ if(typeof activeTheme !== "undefined") name = activeTheme; }catch(e){}
  const sel = document.getElementById("themeSelect");
  if(!name && sel) name = sel.value;
  let idx = -1;
  try{ idx = THEME_NAMES.indexOf(name); }catch(e){}
  if(idx < 0 && sel) {
    try{ idx = THEME_NAMES.indexOf(sel.value); }catch(e){}
  }
  if(idx < 0) idx = 0;
  return idx;
}

function _noixzySyncThemeChromeFormAndFavs(){
  let idx = _noixzyThemePaletteIndex();
  let pal = null;
  try{ pal = PALETTES[idx]; }catch(e){}
  if(!pal) return;

  const bg = pal[1];
  const form = pal[2];
  const hi = pal[3];

  const root = document.documentElement.style;
  root.setProperty("--bg", bg);
  root.setProperty("--panel", bg);
  root.setProperty("--accent", hi);
  root.setProperty("--ink", hi);
  root.setProperty("--dim", form);

  // Native form/color sync paths, depending on module family.
  try{ if(typeof syncColorUI === "function") syncColorUI(); }catch(e){}
  try{ if(typeof updateColorUI === "function") updateColorUI(); }catch(e){}

  const palSlider = document.getElementById("sPal");
  const palLabel = document.getElementById("vPal");
  if(palSlider) palSlider.value = idx;
  if(palLabel) palLabel.textContent = idx + " " + pal[0];

  // Fav chips should recolor immediately after theme/fav changes.
  try{ if(typeof renderFavs === "function") renderFavs(); }catch(e){}
  try{ if(typeof _renderFavs === "function") _renderFavs(); }catch(e){}
}

function _noixzyOrderTopRightPanelLikeGrid(){
  const panel = document.querySelector(".panel");
  if(!panel || panel.dataset.noixzyPanelThemeOrder === "1") return;

  const h1 = panel.querySelector("h1");
  const themeSelect = document.getElementById("themeSelect");
  const themeCycle = themeSelect ? themeSelect.closest(".cycleLine") : null;
  const consoleBtns = panel.querySelector(".consoleBtns");
  const presetBox = panel.querySelector(".presetBox");
  const presetStatus = document.getElementById("presetStatus");
  const firstParamRow = [...panel.querySelectorAll(".row")].find(row => !row.contains(themeSelect));

  if(!h1 || !themeCycle) return;

  let themeLabel = panel.querySelector('[data-noixzy-theme-label="1"]');
  if(!themeLabel){
    themeLabel = document.createElement("div");
    themeLabel.className = "consoleLabel";
    themeLabel.dataset.noixzyThemeLabel = "1";
    themeLabel.textContent = "theme";
  }

  let rule = panel.querySelector('[data-noixzy-theme-rule="1"]');
  if(!rule){
    rule = document.createElement("div");
    rule.className = "consoleRule";
    rule.dataset.noixzyThemeRule = "1";
  }

  panel.insertBefore(themeLabel, h1.nextSibling);
  panel.insertBefore(themeCycle, themeLabel.nextSibling);
  panel.insertBefore(rule, themeCycle.nextSibling);

  let anchor = rule.nextSibling;

  if(consoleBtns){
    panel.insertBefore(consoleBtns, anchor);
    anchor = consoleBtns.nextSibling;
  }

  if(presetBox){
    panel.insertBefore(presetBox, anchor);
    anchor = presetBox.nextSibling;
  }

  if(presetStatus){
    panel.insertBefore(presetStatus, anchor);
    anchor = presetStatus.nextSibling;
  }

  if(firstParamRow){
    panel.insertBefore(firstParamRow, anchor);
  }

  // Remove empty theme wrapper rows left behind after moving the cycleLine.
  [...panel.querySelectorAll(".row")].forEach(row=>{
    if(row.children.length === 0 || row.textContent.trim() === ""){
      row.remove();
    }
  });

  panel.dataset.noixzyPanelThemeOrder = "1";
}

function _noixzyEnsureStageFavHost(){
  const stage = document.getElementById("stage");
  if(stage && !document.getElementById("stageFavs")){
    const host = document.createElement("div");
    host.id = "stageFavs";
    host.className = "stageFavs";
    stage.insertBefore(host, stage.firstChild);
  }
}

function _noixzyWrapThemeApply(){
  if(window.__noixzyThemeApplyWrapped) return;
  if(typeof applyTheme !== "function") return;

  const nativeApplyTheme = applyTheme;
  applyTheme = function(name){
    const out = nativeApplyTheme.apply(this, arguments);
    setTimeout(()=>{
      try{ _noixzySyncThemeChromeFormAndFavs(); }catch(e){}
    },0);
    return out;
  };

  window.__noixzyThemeApplyWrapped = true;
}

function _noixzyPanelThemeFavBoot(){
  _noixzyEnsureStageFavHost();
  _noixzyOrderTopRightPanelLikeGrid();
  _noixzyWrapThemeApply();
  _noixzySyncThemeChromeFormAndFavs();
}

window.addEventListener("load",()=>{
  setTimeout(()=>{ try{ _noixzyPanelThemeFavBoot(); }catch(e){ console.error(e); } },40);
  setTimeout(()=>{ try{ _noixzyPanelThemeFavBoot(); }catch(e){ console.error(e); } },260);
});

/* NOIXZY_TOP_RIGHT_BUTTONS_ONLY_START */
function _noixzyEnsureTopRightButtons(){
  const panel = document.querySelector(".panel");
  if(!panel) return;

  const themeSelect = document.getElementById("themeSelect");
  const themeLine = themeSelect ? themeSelect.closest(".cycleLine") : null;

  let btnBox = panel.querySelector(".consoleBtns");
  if(!btnBox){
    btnBox = document.createElement("div");
    btnBox.className = "consoleBtns";
  }

  // Build only the top-right control buttons.
  // Existing reset/pause IDs are preserved. Existing metafluid random buttons are reused when present.
  const existingRandom =
    document.getElementById("btnRandom") ||
    document.getElementById("randomUnlocked");

  const existingForm =
    document.getElementById("btnRandomForm") ||
    document.getElementById("randomForm");

  const existingColor =
    document.getElementById("btnRndColor") ||
    document.getElementById("randomColor");

  const existingSeed = document.getElementById("btnNewSeed");
  const existingReset = document.getElementById("btnReset");
  const existingPause = document.getElementById("btnPause");

  const makeBtn = (id, html) => {
    let b = document.getElementById(id);
    if(!b){
      b = document.createElement("button");
      b.id = id;
      b.type = "button";
    }
    b.innerHTML = html;
    return b;
  };

  const bUndo   = makeBtn("btnUndo", "undo");
  const bRedo   = makeBtn("btnRedo", "redo");
  bUndo.classList.add("historyBtn");
  bRedo.classList.add("historyBtn");
  bUndo.title = "undo parameter change";
  bRedo.title = "redo parameter change";

  const bRandom = existingRandom || makeBtn("btnRandom", "all");
  const bForm   = existingForm   || makeBtn("btnRandomForm", "form");
  const bColor  = existingColor  || makeBtn("btnRndColor", "color");
  const bSeed   = existingSeed   || makeBtn("btnNewSeed", '<span class="seedLabel">seed</span>');
  const bReset  = existingReset  || makeBtn("btnReset", "reset");
  const bPause  = existingPause  || makeBtn("btnPause", "pause");

  // Normalize labels without breaking IDs.
  bRandom.innerHTML = "all";
  bForm.innerHTML = "form";
  bColor.innerHTML = "color";
  bSeed.innerHTML = '<span class="seedLabel">seed</span>';

  btnBox.innerHTML = "";
  const randomLabel = document.createElement("div");
  randomLabel.className = "randomMiniLabel";
  randomLabel.textContent = "RANDOM";

  const randomRow = document.createElement("div");
  randomRow.className = "consoleBtnRow";
  [bRandom,bForm,bColor].forEach(b => randomRow.appendChild(b));

  const historyRow = document.createElement("div");
  historyRow.className = "consoleBtnRow";
  [bRedo,bUndo,bSeed].forEach(b => historyRow.appendChild(b));

  const utilityRow = document.createElement("div");
  utilityRow.className = "consoleBtnRow";
  [bReset,bPause].forEach(b => utilityRow.appendChild(b));

  [randomLabel,randomRow,historyRow,utilityRow].forEach(n => btnBox.appendChild(n));

  if(themeLine){
    panel.insertBefore(btnBox, themeLine.nextSibling);
  } else {
    const h1 = panel.querySelector("h1");
    panel.insertBefore(btnBox, h1 ? h1.nextSibling : panel.firstChild);
  }

  // Generic fallback actions for modules that did not originally have random buttons.
  // Native reset/pause handlers stay attached because those nodes are moved, not replaced.
  const randRange = (el) => {
    const min = parseFloat(el.min || "0");
    const max = parseFloat(el.max || "1");
    const step = parseFloat(el.step || "0.01");
    let v = min + Math.random() * (max - min);
    if(Number.isFinite(step) && step > 0) v = Math.round(v / step) * step;
    el.value = String(Math.max(min, Math.min(max, v)));
    el.dispatchEvent(new Event("input", {bubbles:true}));
    el.dispatchEvent(new Event("change", {bubbles:true}));
  };

  const randomizeForm = () => {
    panel.querySelectorAll('input[type="range"]').forEach(el => {
      if(el.id === "sPal") return;
      randRange(el);
    });
  };

  const randomizeColor = () => {
    const colors = panel.querySelectorAll('input[type="color"]');
    if(colors.length){
      colors.forEach(el => {
        el.value = "#" + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,"0");
        el.dispatchEvent(new Event("input", {bubbles:true}));
        el.dispatchEvent(new Event("change", {bubbles:true}));
      });
    } else if(typeof cycleTheme === "function") {
      cycleTheme(1);
    }
  };

  if(!bRandom.dataset.noixzyTopButtonBound){
    bRandom.dataset.noixzyTopButtonBound = "1";
    bRandom.addEventListener("click", e => {
      e.preventDefault();
      randomizeForm();
      randomizeColor();
    });
  }

  if(!bForm.dataset.noixzyTopButtonBound){
    bForm.dataset.noixzyTopButtonBound = "1";
    bForm.addEventListener("click", e => {
      e.preventDefault();
      randomizeForm();
    });
  }

  if(!bColor.dataset.noixzyTopButtonBound){
    bColor.dataset.noixzyTopButtonBound = "1";
    bColor.addEventListener("click", e => {
      e.preventDefault();
      randomizeColor();
    });
  }

  if(!bSeed.dataset.noixzyTopButtonBound){
    bSeed.dataset.noixzyTopButtonBound = "1";
    bSeed.addEventListener("click", e => {
      e.preventDefault();
      const read = bSeed.querySelector(".seedRead") || document.getElementById("vSeed");
      const n = Math.floor(Math.random() * 999999);
      if(read) read.textContent = String(n);
      randomizeForm();
    });
  }
}

window.addEventListener("load", () => {
  setTimeout(() => { try{ _noixzyEnsureTopRightButtons(); }catch(e){ console.error(e); } }, 40);
  setTimeout(() => { try{ _noixzyEnsureTopRightButtons(); }catch(e){ console.error(e); } }, 250);
});

/* NOIXZY_RANDOM_SECTION_HISTORY_START */
(function(){
  if(window.__noixzyRandomSectionHistory) return;
  window.__noixzyRandomSectionHistory = true;

  const H = { undo:[], redo:[], before:null, applying:false };

  function snap(){
    const out = {};
    document.querySelectorAll('.panel input, .panel select').forEach(el=>{
      if(!el.id) return;
      if(el.type === "button" || el.type === "file") return;
      out[el.id] = el.type === "checkbox" ? !!el.checked : el.value;
    });
    return out;
  }

  function same(a,b){ return JSON.stringify(a) === JSON.stringify(b); }

  function buttons(){
    const u=document.getElementById("btnUndo");
    const r=document.getElementById("btnRedo");
    if(u) u.disabled = !H.undo.length;
    if(r) r.disabled = !H.redo.length;
  }

  function apply(x){
    if(!x) return;
    H.applying = true;
    Object.entries(x).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(!el) return;
      if(el.type === "checkbox") el.checked = !!val;
      else el.value = val;
      el.dispatchEvent(new Event("input",{bubbles:true}));
      el.dispatchEvent(new Event("change",{bubbles:true}));
    });
    H.applying = false;
    buttons();
  }

  function push(before){
    if(H.applying || !before) return;
    const after = snap();
    if(same(before, after)) return;
    H.undo.push(before);
    if(H.undo.length > 80) H.undo.shift();
    H.redo = [];
    buttons();
  }

  function start(){ if(!H.before) H.before = snap(); }
  function end(){ const b=H.before; H.before=null; push(b); }

  function undo(){
    if(!H.undo.length) return;
    const cur=snap();
    const prev=H.undo.pop();
    H.redo.push(cur);
    apply(prev);
  }

  function redo(){
    if(!H.redo.length) return;
    const cur=snap();
    const next=H.redo.pop();
    H.undo.push(cur);
    apply(next);
  }

  function bind(){
    document.querySelectorAll('.panel input, .panel select').forEach(el=>{
      if(el.dataset.noixzyRandomHist === "1") return;
      if(el.type === "button" || el.type === "file") return;
      el.dataset.noixzyRandomHist = "1";
      el.addEventListener("pointerdown", start);
      el.addEventListener("focus", start);
      el.addEventListener("change", end);
      el.addEventListener("pointerup", end);
    });

    ["btnRandom","btnRandomForm","btnRndColor","btnNewSeed","btnReset"].forEach(id=>{
      const b=document.getElementById(id);
      if(!b || b.dataset.noixzyRandomHistClick === "1") return;
      b.dataset.noixzyRandomHistClick = "1";
      b.addEventListener("click", ()=>{
        const before = snap();
        setTimeout(()=>push(before), 0);
      }, true);
    });

    const u=document.getElementById("btnUndo");
    const r=document.getElementById("btnRedo");

    if(u && u.dataset.noixzyRandomHist !== "1"){
      u.dataset.noixzyRandomHist = "1";
      u.addEventListener("click", e=>{ e.preventDefault(); e.stopPropagation(); undo(); });
    }
    if(r && r.dataset.noixzyRandomHist !== "1"){
      r.dataset.noixzyRandomHist = "1";
      r.addEventListener("click", e=>{ e.preventDefault(); e.stopPropagation(); redo(); });
    }

    buttons();
  }

  window.addEventListener("load", ()=>{
    setTimeout(bind,120);
    setTimeout(bind,420);
    setTimeout(bind,900);
  });
})();
/* NOIXZY_RANDOM_SECTION_HISTORY_END */


/* NOIXZY_BOTTOM_FAV_BUTTONS_ONLY_START */
function _noixzyEnsureBottomFavButtons(){
  const tools = document.getElementById("stageTools");
  if(!tools) return;

  const makeBtn = (id, text) => {
    let b = document.getElementById(id);
    if(!b){
      b = document.createElement("button");
      b.id = id;
      b.type = "button";
    }
    b.textContent = text;
    return b;
  };

  const pin   = document.getElementById("btnPin");
  const exp   = makeBtn("exportFavs", "export ★");
  const copy  = document.getElementById("btnCopy");
  const paste = document.getElementById("btnPaste");

  const audio = document.getElementById("btnAudio");
  const bgAlpha = makeBtn("btnTransparentBg", "bg alpha");
  const clear = makeBtn("clearFavs", "clear ★");

  const thumb = document.getElementById("btnThumb");
  const video = document.getElementById("btnRec");
  const dur   = document.getElementById("recDur") || document.getElementById("btnRecDur");
  const save  = document.getElementById("btnSave");
  const save2 = document.getElementById("btnSave2x");

  const groups = [
    [pin, exp, copy, paste],
    [clear],
    [thumb, video, dur, save, save2]
  ];

  tools.innerHTML = "";

  groups.forEach(nodes => {
    const live = nodes.filter(Boolean);
    if(!live.length) return;
    const g = document.createElement("div");
    g.className = "stageToolGroup";
    live.forEach(n => g.appendChild(n));
    tools.appendChild(g);
  });

  // Fallback export if this module did not already wire exportFavs natively.
  if(!exp.dataset.noixzyFallbackBound){
    exp.dataset.noixzyFallbackBound = "1";
    exp?.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();

      let payload = null;

      try{
        if(typeof favs !== "undefined") payload = favs;
      }catch(err){}

      try{
        if(!payload && typeof _favs !== "undefined") payload = _favs;
      }catch(err){}

      if(!payload){
        payload = [];
        document.querySelectorAll("#stageFavs .chip").forEach((chip,i)=>{
          payload.push({ index:i+1, text:chip.textContent.trim() });
        });
      }

      const txt = JSON.stringify(payload, null, 2);
      navigator.clipboard?.writeText(txt).then(()=>{
        exp.textContent = "copied ★";
        setTimeout(()=>exp.textContent = "export ★", 900);
      }).catch(()=>{
        prompt("copy favorites json", txt);
        exp.textContent = "export ★";
      });
    });
  }

  // Fallback clear if this module did not already wire clearFavs natively.
  if(!clear.dataset.noixzyFallbackBound){
    clear.dataset.noixzyFallbackBound = "1";
    clear?.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();

      if(!confirm("clear all favorites?")) return;

      let cleared = false;

      try{
        if(typeof favs !== "undefined" && Array.isArray(favs)){
          favs.length = 0;
          cleared = true;
          try{ if(typeof saveFavs === "function") saveFavs(); }catch(err){}
          try{ if(typeof renderFavs === "function") renderFavs(); }catch(err){}
        }
      }catch(err){}

      try{
        if(typeof _favs !== "undefined" && Array.isArray(_favs)){
          _favs.length = 0;
          cleared = true;
          try{ if(typeof _saveFavs === "function") _saveFavs(); }catch(err){}
          try{ if(typeof _renderFavs === "function") _renderFavs(); }catch(err){}
        }
      }catch(err){}

      const host = document.getElementById("stageFavs");
      if(host) host.innerHTML = "";

      clear.textContent = cleared ? "cleared ★" : "clear ★";
      setTimeout(()=>clear.textContent = "clear ★", 900);
    });
  }
}

window.addEventListener("load", () => {
  setTimeout(() => { try{ _noixzyEnsureBottomFavButtons(); }catch(e){ console.error(e); } }, 60);
  setTimeout(() => { try{ _noixzyEnsureBottomFavButtons(); }catch(e){ console.error(e); } }, 300);
});
/* NOIXZY_BOTTOM_FAV_BUTTONS_ONLY_END */

function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);
  const safeIdx=idx>=0?idx:0;
  const prev=ALL_MODULES[(safeIdx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(safeIdx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev"); if(np){ np.href="../"+prev.id+"/noixzy_"+prev.id+".html"; np.title=prev.title; }
  const nn=document.getElementById("navNext"); if(nn){ nn.href="../"+next.id+"/noixzy_"+next.id+".html"; nn.title=next.title; }

  const rail=document.getElementById("stageThumbs");
  if(rail){
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type=>{
      rail.addEventListener(type,e=>e.stopPropagation(),true);
    });
  }

  const strip=document.getElementById("moduleThumbStrip"); if(!strip) return;
  strip.innerHTML="";
  let railSelected=safeIdx;

  function selectThumb(i){
    const links=[...strip.querySelectorAll(".navThumb")];
    if(!links.length) return;
    railSelected=(i+links.length)%links.length;
    links.forEach(a=>a.classList.remove("selected"));
    links[railSelected].classList.add("selected");
    links[railSelected].scrollIntoView({block:"nearest",inline:"nearest",behavior:"smooth"});
  }

  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a"); a.href="../"+m.id+"/noixzy_"+m.id+".html"; a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    a.onclick=e=>{ e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
    const img=document.createElement("img"); img.src="../home/thumbs/"+m.id+".png"; img.alt=m.title;
    a.appendChild(img); strip.appendChild(a);
  });

  const up=document.getElementById("thumbUp");
  const dn=document.getElementById("thumbDown");
  if(up){ up.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected-1); }; }
  if(dn){ dn.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected+1); }; }

  setTimeout(()=>{ const el=strip.querySelector(".active"); if(el){ el.scrollIntoView({block:"center",inline:"nearest"}); } },50);
}
</script>
