<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>home</title>
<style>
  :root {
    --bg: #000;
    --ink: #f2f2ee;
    --dim: #8f8f8a;
    --line: rgba(255,255,255,.13);
    --panel: rgba(255,255,255,.045);
    --accent: #d8c06a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #000;
    color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    overflow-x: hidden;
  }

  body {
    padding-top: 24px;
  }

  .labHeader {
    width: min(1350px, calc(100vw - 96px));
    margin: 0 auto 18px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .labTitle {
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--dim);
    user-select: none;
    white-space: nowrap;
  }

  .labTitle strong {
    color: var(--ink);
    font-weight: 600;
  }

  .searchWrap {
    position: relative;
    flex: 0 0 220px;
  }

  .searchWrap input {
    width: 100%;
    padding: 6px 10px 6px 30px;
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 8px;
    color: var(--ink);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .06em;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }

  .searchWrap input::placeholder {
    color: var(--dim);
  }

  .searchWrap input:focus {
    border-color: rgba(216,192,106,.55);
    background: rgba(255,255,255,.08);
  }

  .searchWrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    opacity: .45;
    pointer-events: none;
  }

  .thumbRailWrap {
    position: relative;
    width: min(1350px, calc(100vw - 96px));
    margin: 0 auto 14px;
    padding: 8px;
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 14px;
    background: rgba(0,0,0,.28);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .thumbRail {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }

  .thumbRail::-webkit-scrollbar {
    display: none;
  }

  .railThumb {
    flex: 0 0 auto;
    width: 82px;
    height: 48px;
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 9px;
    overflow: hidden;
    background: #000;
    opacity: .72;
    transition: opacity .16s ease, transform .16s ease, border-color .16s ease;
  }

  .railThumb:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: rgba(216,192,106,.65);
  }

  .railThumb img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .logoBox {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(-50% - 5px));
    z-index: 30;
    width: 144px;
    height: 104px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 0;
    border-radius: 14px;
    pointer-events: auto;
  }

  .logoBox img {
    width: 68px;
    height: 68px;
    display: block;
    object-fit: contain;
    pointer-events: none;
  }

  main {
    width: min(1350px, calc(100vw - 96px));
    margin: 0 auto;
    padding: 0 0 56px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }

  .card {
    display: block;
    min-height: 160px;
    text-decoration: none;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel);
    overflow: hidden;
    transition: transform .16s ease, border-color .16s ease, background .16s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(216,192,106,.55);
    background: rgba(255,255,255,.07);
  }

  .card img {
    width: 100%;
    height: 118px;
    display: block;
    object-fit: cover;
    background: #000;
  }

  .meta {
    padding: 10px 11px 12px;
  }

  .title {
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sub {
    margin-top: 5px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: .08em;
  }

  .error {
    color: #ff7676;
    border: 1px solid rgba(255,118,118,.3);
    padding: 16px;
    border-radius: 14px;
    background: rgba(255,118,118,.08);
  }
</style>
</head>
<body>

  <header class="labHeader">
    <div class="labTitle"><strong>noixzy</strong>&thinsp;/&thinsp;geometry lab</div>
    <div class="searchWrap">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
        <line x1="9" y1="9" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="search" placeholder="search modules" autocomplete="off" spellcheck="false">
    </div>
  </header>

  <div class="thumbRailWrap">
    <a class="logoBox" href="home.html" aria-label="home">
      <img src="assets/waveform_logo.svg" alt="waveform logo">
    </a>
    <nav class="thumbRail" id="thumbRail" aria-label="module thumbnails"></nav>
  </div>

  <main>
    <section class="grid" id="grid"></section>
  </main>

  <script>
  (async function(){
    const grid = document.getElementById("grid");
    const rail  = document.getElementById("thumbRail");

    function thumbPath(module) {
      const id  = module.id || (module.file || "").split("/")[0];
      const raw = module.thumb || `home/thumbs/${id}.png`;
      return raw.replace(/^home\//, "");
    }

    function shellHref(module) {
      const id = module.id || (module.file || "").split("/")[0];
      return `../module_shell?module=${encodeURIComponent(id)}`;
    }

    try {
      const response = await fetch("../modules.manifest.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`manifest ${response.status}`);
      const manifest = await response.json();

      const modules = (manifest.modules || [])
        .filter(m => m.listedInHome === true);

      for (const module of modules) {
        const id    = module.id || (module.file || "").split("/")[0];
        const title = module.title || id.replaceAll("_", " ");
        const href  = shellHref(module);
        const thumb = thumbPath(module);

        const railA = document.createElement("a");
        railA.className = "railThumb";
        railA.href  = href;
        railA.title = title;
        railA.innerHTML = `<img src="${thumb}" alt="${title}" loading="lazy">`;
        rail.appendChild(railA);

        const card = document.createElement("a");
        card.className = "card";
        card.href = href;
        card.innerHTML = `
          <img src="${thumb}" alt="${title}" loading="lazy">
          <div class="meta">
            <div class="title">${title}</div>
            <div class="sub">geometry engine · shell route</div>
          </div>
        `;
        grid.appendChild(card);
      }

      // Search filtering
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", () => {
        const q = searchInput.value.trim().toLowerCase();
        const cards = grid.querySelectorAll(".card");
        cards.forEach(c => {
          const name = c.querySelector(".title")?.textContent.toLowerCase() || "";
          c.style.display = (!q || name.includes(q)) ? "" : "none";
        });
      });
    } catch (err) {
      grid.innerHTML = `<div class="error">Unable to load modules.manifest.json<br>${err.message}</div>`;
    }
  })();
  </script>

</body>
</html>
