<style>
  :root { --bg:#0e0e10; --ink:#e8e8ea; --accent:#48dfff; --dim:#8b969c; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }

  .stage { position:relative; flex:1; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }

  .stageTools button, .stageTools select { min-height:30px; background:rgba(0,0,0,0.50); color:var(--ink); border:1px solid rgba(255,255,255,0.16); padding:4px 8px; margin:0; border-radius:4px; font:inherit; cursor:pointer; white-space:nowrap; }
  .stageTools button:hover { border-color:var(--accent); color:var(--accent); }
  .stageTools select { width:auto; min-width:52px; }
  .stageThumbs { display:none; }
  .stageThumbs:hover { opacity:1; }
  .stageThumbs .label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:2px; }
  .thumbScrollBtn { border:1px solid rgba(72,223,255,0.3); background:rgba(0,0,0,.46); color:var(--accent); border-radius:5px; height:22px; cursor:pointer; padding:0; }
  .thumbRow { display:flex; flex-direction:column; gap:6px; max-height:min(500px,58vh); overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .thumbRow::-webkit-scrollbar { display:none; }
  .navThumb { flex:0 0 auto; opacity:.55; transition:opacity .15s; }
  .navThumb:hover, .navThumb.active { opacity:1; }
  .navThumb img { width:50px; height:38px; object-fit:cover; border-radius:4px; border:1px solid #2a2a2d; display:block; }
  .navThumb.active img { border-color:#fff; box-shadow:0 0 0 1px rgba(255,255,255,0.55); }
  .stageFavs { position:absolute; left:50%; bottom:64px; transform:translateX(-50%); z-index:22; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:8px; max-width:min(760px,68vw); pointer-events:auto; }
  .stageFavs:empty { display:none; }
  .stageFavs .chip { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.58); border:1px solid rgba(255,255,255,.16); border-radius:4px; padding:4px 6px; cursor:pointer; font-size:11px; }
  .stageFavs .chip:hover { border-color:var(--accent); color:var(--accent); }
  .stageFavs .sw { width:9px; height:9px; border-radius:2px; display:inline-block; }
  .stageFavs .x { opacity:.45; padding:0 2px; }
  .stageFavs .x:hover { opacity:1; color:var(--accent); }
  #audioPanel { display:none; position:absolute; bottom:58px; left:50%; transform:translateX(-50%); z-index:30; background:rgba(10,10,12,0.92); border:1px solid rgba(72,223,255,0.22); border-radius:8px; padding:10px 12px; min-width:260px; backdrop-filter:blur(10px); }
  #audioPanel select { background:#1a1a1d; color:var(--ink); border:1px solid #333; border-radius:4px; padding:2px 4px; font-size:11px; }
</style>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_power;
uniform float u_morph;
uniform float u_detail;
uniform float u_glow;
uniform float u_spin;
uniform float u_azimuth;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform int   u_transparentBg;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

vec2 DE(vec3 pos, float pw) {
  vec3  z    = pos;
  float dr   = 1.0;
  float r    = 0.0;
  float trap = 1e5;
  for(int i = 0; i < 12; i++) {
    r = length(z);
    if(r > 2.0) break;
    trap = min(trap, abs(length(z.xz) - 0.45));
    float theta = acos(clamp(z.z / r, -1.0, 1.0));
    float phi   = atan(z.y, z.x);
    dr  = pow(r, pw - 1.0) * pw * dr + 1.0;
    float zr = pow(r, pw);
    theta *= pw;
    phi   *= pw;
    z  = zr * vec3(sin(theta)*cos(phi), sin(theta)*sin(phi), cos(theta));
    z += pos;
  }
  return vec2(0.5 * log(r) * r / dr, clamp(1.0 - trap * 2.2, 0.0, 1.0));
}

vec3 calcNormal(vec3 p, float pw) {
  vec2 e = vec2(0.0006, 0.0);
  return normalize(vec3(
    DE(p+e.xyy,pw).x - DE(p-e.xyy,pw).x,
    DE(p+e.yxy,pw).x - DE(p-e.yxy,pw).x,
    DE(p+e.yyx,pw).x - DE(p-e.yyx,pw).x));
}

float calcAO(vec3 pos, vec3 nor, float pw) {
  float occ = 0.0, d;
  d = DE(pos+nor*0.06,pw).x; occ += (0.06-d)*1.0;
  d = DE(pos+nor*0.14,pw).x; occ += (0.14-d)*0.75;
  d = DE(pos+nor*0.24,pw).x; occ += (0.24-d)*0.55;
  d = DE(pos+nor*0.38,pw).x; occ += (0.38-d)*0.38;
  return clamp(1.0 - 1.8*occ, 0.0, 1.0);
}

void main() {
  float eps = mix(0.0015, 0.0003, u_detail);
  float pw  = mix(2.0, 10.0, u_power) + sin(u_time * 0.31) * u_morph * 2.5;
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;
  float a       = u_azimuth + u_time * u_spin * 0.28;
  float camDist = mix(2.15, 5.25, u_dist);
  float camElev = mix(-1.35, 1.85, u_elev);
  vec3 ro  = vec3(sin(a)*camDist, camElev, cos(a)*camDist);
  vec3 ta  = vec3(0.0);
  vec3 fw  = normalize(ta - ro);
  vec3 rt  = normalize(cross(vec3(0.0,1.0,0.0), fw));
  vec3 up  = cross(fw, rt);
  vec3 rd  = normalize(fw*1.85 + rt*uv.x + up*uv.y);
  float tt  = 0.5;
  bool  hit = false;
  float glowAcc = 0.0;
  for(int i = 0; i < 96; i++) {
    vec2  de = DE(ro + rd*tt, pw);
    float d  = de.x;
    glowAcc += exp(-max(d,0.0) * 18.0);
    if(d < eps) { hit = true; break; }
    if(tt > 8.0) break;
    tt += d * 0.62;
  }
  float y      = vUv.y * 0.5 + 0.5;
  vec3 bgBase  = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3 bg      = mix(bgBase * 0.55, bgBase * 1.1, y);
  float bvig   = smoothstep(1.5, 0.0, length(vUv * 0.85));
  bg = mix(bg * 0.7, bg, bvig);
  vec3 col = bg;
  col += u_hiColor * (glowAcc / 96.0) * u_glow * 0.12;
  if(hit) {
    vec3  p    = ro + rd * tt;
    vec2  de   = DE(p, pw);
    float trap = de.y;
    vec3  n    = calcNormal(p, pw);
    float ao   = mix(1.0, calcAO(p, n, pw), u_ao);
    vec3 ld    = normalize(vec3(0.6, 0.8, 0.5));
    float dif  = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim  = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.8);
    float spec = pow(clamp(dot(reflect(-ld,n), -rd), 0.0, 1.0), 24.0);
    float luma   = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3 baseCol = mix(vec3(luma), u_formColor, u_formSat) * u_formValue;
    baseCol = mix(baseCol, u_hiColor * u_formValue, trap * 0.35 * u_rim);
    col  = baseCol * mix(0.42, 1.1, dif);
    col  = mix(col, u_hiColor * u_formValue, smoothstep(0.55,0.95,dif) * 0.35 * u_rim);
    col += rim  * u_hiColor * 0.3  * u_rim;
    col += spec * u_hiColor * 0.15 * u_rim;
    col *= ao;
    col  = mix(col, bg, clamp((tt - 1.5) / 7.0, 0.0, 0.5) * 0.4);
  }
  col *= mix(0.74, 1.0, smoothstep(1.42, 0.15, length(vUv)));
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.83));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

<script>
const PIECE = "mandelbulb";

const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];

const PARAMS = [
  {k:"power",  label:"power",       min:0,  max:1,  step:0.01, v:0.75},
  {k:"morph",  label:"morph",       min:0,  max:1,  step:0.01, v:0.22},
  {k:"detail", label:"detail",      min:0,  max:1,  step:0.01, v:0.55},
  {k:"glow",   label:"glow",        min:0,  max:1,  step:0.01, v:0.45},
  {k:"ao",     label:"ambient occ", min:0,  max:1,  step:0.01, v:0.70},
  {k:"spin",   label:"spin",        min:0,  max:1,  step:0.01, v:0.18},
  {k:"dist",   label:"distance",    min:0,  max:1,  step:0.01, v:0.52},
  {k:"elev",   label:"elevation",   min:0,  max:1,  step:0.01, v:0.50},
  {k:"pal",    label:"palette",     min:0,  max:11, step:1,    v:4},
  {k:"bgVal",  label:"bg value",    min:0,  max:2,  step:0.01, v:1.0},
  {k:"fmVal",  label:"form value",  min:0,  max:2,  step:0.01, v:1.0},
  {k:"fmSat",  label:"form sat",    min:0,  max:2,  step:0.01, v:1.0},
  {k:"rim",    label:"rim",         min:0,  max:2,  step:0.01, v:1.0},
  {k:"bgAlpha",label:"bg alpha",    min:0,  max:1,  step:1,    v:0},
];

let P = {};
PARAMS.forEach(d => { P[d.k] = d.v; });

// Palette colors — driven by P.pal, not exposed directly in P
let _cs = { bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2" };

let t0, paused = false, pauseT = 0, theShader, _pCanvas;
let transparentBg = false;
let _camAzimuth = 0, _drag = { active:false, x:0, y:0 };

// Audio
let audioCtx, analyser, audioData, audioActive = false;
const ABANDS = { bass:0, mid:0, high:0, presence:0 };
const AMAP   = { bass:null, mid:null, high:null, presence:null };
const ADEPTH = { bass:0.5, mid:0.5, high:0.5, presence:0.5 };
let _audioSaved = {};

// Favs
const _FAV_KEY = "noixzy_" + PIECE + "_favs";
let _favs = [];

// ─── helpers ──────────────────────────────────────────────────────────────

function hexToRGB(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}
function clampV(v, a, b) { return Math.min(b, Math.max(a, v)); }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx), 0, PALETTES.length - 1)];
  _cs.bg = pal[1]; _cs.form = pal[2]; _cs.hi = pal[3];
}

// ─── pause ────────────────────────────────────────────────────────────────

window.noixzyTogglePause = function() {
  paused = !paused;
  if (paused) {
    pauseT = millis();
    noLoop();
  } else {
    t0 += millis() - pauseT;
    loop();
  }
};

// ─── bridge ───────────────────────────────────────────────────────────────

function _noixzyPostShellParams() {
  const data = PARAMS.map(d => ({ ...d, v: P[d.k] ?? d.v }));
  try { window.parent.postMessage({ type:"params", data }, "*"); } catch(e) {}
}

function _noixzySetParam(key, value) {
  if (key === "pal") {
    P.pal = clampV(Math.round(value), 0, PALETTES.length - 1);
    applyPalette(P.pal);
    _noixzyPostShellParams();
    return;
  }
  if (key === "bgAlpha") {
    P.bgAlpha   = value ? 1 : 0;
    transparentBg = !!value;
    _noixzyPostShellParams();
    return;
  }
  const def = PARAMS.find(p => p.k === key);
  if (!def) return;
  P[key] = clampV(parseFloat(value), def.min, def.max);
  _noixzyPostShellParams();
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === "getParams") { _noixzyPostShellParams(); return; }
  if (d.type === "setParam")  { _noixzySetParam(d.key, d.value); return; }
});

// ─── audio ────────────────────────────────────────────────────────────────

function _audioApply() {
  _audioSaved = {};
  if (!audioActive || !analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N = audioData.length;
  const avg = (s, e) => { let v=0; for(let i=s;i<e;i++) v+=audioData[i]; return v/((e-s)*255); };
  ABANDS.bass=avg(0,4); ABANDS.mid=avg(4,20); ABANDS.high=avg(20,60); ABANDS.presence=avg(0,N);
  for (const band of ['bass','mid','high','presence']) {
    const k = AMAP[band]; if (!k || P[k]===undefined) continue;
    const def = PARAMS.find(p => p.k === k);
    const mn = def ? def.min : 0, mx = def ? def.max : 1;
    _audioSaved[k] = P[k];
    P[k] = Math.min(mx, Math.max(mn, P[k] + ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore() { for (const k of Object.keys(_audioSaved)) P[k] = _audioSaved[k]; _audioSaved = {}; }

function _buildAudioUI() {
  const panel   = document.getElementById("audioPanel");
  const btnAudio = document.getElementById("btnAudio");
  if (!panel || !btnAudio) return;

  let audioSource=null, audioBuffer=null, audioPlaying=false, micStream=null;
  const _ensureCtx = () => {
    if (!audioCtx) { audioCtx=new AudioContext(); analyser=audioCtx.createAnalyser(); analyser.fftSize=512; audioData=new Uint8Array(analyser.frequencyBinCount); }
    if (audioCtx.state==="suspended") audioCtx.resume();
  };
  const _playBuffer = () => {
    if (!audioBuffer) return;
    if (audioSource) { try{audioSource.stop();}catch(e){} }
    audioSource=audioCtx.createBufferSource(); audioSource.buffer=audioBuffer; audioSource.loop=true;
    audioSource.connect(analyser); analyser.connect(audioCtx.destination); audioSource.start();
    audioPlaying=true; audioActive=true;
  };
  const _loadFile = async file => {
    _ensureCtx();
    if (audioSource) { try{audioSource.stop();}catch(e){} audioSource=null; }
    audioBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
    _playBuffer();
  };

  panel.innerHTML = "";
  panel.style.fontFamily="inherit";

  const dropZone = document.createElement("div");
  dropZone.style.cssText="border:1px dashed #444;border-radius:5px;padding:8px;text-align:center;cursor:pointer;margin-bottom:8px;color:#666;";
  dropZone.textContent="drop audio / click to load";
  const fileIn = document.createElement("input"); fileIn.type="file"; fileIn.accept="audio/*"; fileIn.style.display="none";
  dropZone.addEventListener("click", ()=>fileIn.click());
  fileIn.addEventListener("change", e=>{if(e.target.files[0])_loadFile(e.target.files[0]);});
  dropZone.addEventListener("dragover", e=>{e.preventDefault();dropZone.style.borderColor="var(--accent)";});
  dropZone.addEventListener("dragleave", ()=>{dropZone.style.borderColor="#444";});
  dropZone.addEventListener("drop", e=>{e.preventDefault();dropZone.style.borderColor="#444";if(e.dataTransfer.files[0])_loadFile(e.dataTransfer.files[0]);});

  const pauseBtn = document.createElement("button");
  pauseBtn.type="button"; pauseBtn.textContent="▶ / ⏸";
  pauseBtn.style.cssText="margin-bottom:8px;background:#0a0a0a;color:var(--ink);border:1px solid #333;border-radius:4px;padding:4px 10px;cursor:pointer;font:inherit;";
  pauseBtn.addEventListener("click", ()=>{
    if (audioPlaying) { try{audioSource.stop();}catch(e){} audioPlaying=false; audioActive=false; }
    else { _playBuffer(); }
  });

  const micBtn = document.createElement("button");
  micBtn.type="button"; micBtn.textContent="mic";
  micBtn.style.cssText=pauseBtn.style.cssText+"margin-left:6px;";
  micBtn.addEventListener("click", async ()=>{
    if (micStream) { micStream.getTracks().forEach(t=>t.stop()); micStream=null; micBtn.textContent="mic"; if(!audioPlaying)audioActive=false; return; }
    try { _ensureCtx(); micStream=await navigator.mediaDevices.getUserMedia({audio:true}); audioCtx.createMediaStreamSource(micStream).connect(analyser); audioActive=true; micBtn.textContent="mic ●"; } catch(e){alert("mic access denied");}
  });

  const bandsDiv = document.createElement("div"); bandsDiv.style.marginTop="8px";
  const audioParams = PARAMS.filter(p => !["pal","bgAlpha","bgVal"].includes(p.k));
  ['bass','mid','high','presence'].forEach(band => {
    const row=document.createElement("div"); row.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:5px;";
    const lbl=document.createElement("span"); lbl.textContent=band; lbl.style.cssText="width:68px;color:#666;font-size:11px;";
    const sel=document.createElement("select");
    const none=document.createElement("option"); none.value=""; none.textContent="— off —"; sel.appendChild(none);
    audioParams.forEach(p=>{const o=document.createElement("option");o.value=p.k;o.textContent=p.label;sel.appendChild(o);});
    sel.addEventListener("change",()=>{AMAP[band]=sel.value||null;});
    const dep=document.createElement("input"); dep.type="range"; dep.min=0; dep.max=1; dep.step=.01; dep.value=0.5; dep.style.width="55px";
    dep.addEventListener("input",()=>{ADEPTH[band]=parseFloat(dep.value);});
    row.append(lbl,sel,dep); bandsDiv.appendChild(row);
  });

  panel.append(dropZone, fileIn, pauseBtn, micBtn, bandsDiv);

  btnAudio.addEventListener("click", ()=>{
    const open = panel.style.display==="none" || panel.style.display==="";
    panel.style.display = open ? "block" : "none";
    btnAudio.style.color = open ? "var(--accent)" : "";
  });
}

// ─── favs ─────────────────────────────────────────────────────────────────

function _loadFavs() { try { _favs=JSON.parse(localStorage.getItem(_FAV_KEY)||"[]"); } catch(e) { _favs=[]; } _renderFavs(); }
function _saveFavs() { try { localStorage.setItem(_FAV_KEY, JSON.stringify(_favs)); } catch(e) {} }
function _pinFav()   { _favs.push({ P:{...P}, _cs:{..._cs} }); _saveFavs(); _renderFavs(); }

function _renderFavs() {
  const fp = document.getElementById("stageFavs"); if (!fp) return;
  fp.innerHTML = "";
  _favs.forEach((f, i) => {
    const chip = document.createElement("button"); chip.type="button"; chip.className="chip"; chip.title="restore";
    const sw  = document.createElement("span"); sw.className="sw"; sw.style.background=(f._cs||{}).hi||(f.cs||{}).hi||"#fff";
    const lbl = document.createElement("b"); lbl.textContent="★ "+(i+1);
    const x   = document.createElement("span"); x.className="x"; x.textContent="×"; x.title="remove";
    chip.append(sw, lbl, x);
    chip.addEventListener("click", ev => {
      ev.preventDefault(); ev.stopPropagation();
      if (ev.target.classList.contains("x")) { _favs.splice(i,1); _saveFavs(); _renderFavs(); return; }
      if (f.P)  Object.assign(P, f.P);
      if (f._cs) Object.assign(_cs, f._cs);
      _noixzyPostShellParams();
    });
    fp.appendChild(chip);
  });
}

// ─── orbit (bidirectional: drag → post params so shell sliders stay in sync) ──

function _initOrbit(stg) {
  stg.addEventListener("pointerdown", e => {
    _drag = { active:true, x:e.clientX, y:e.clientY };
    stg.setPointerCapture(e.pointerId);
  }, {passive:true});

  stg.addEventListener("pointermove", e => {
    if (!_drag.active) return;
    _camAzimuth += (e.clientX - _drag.x) * 0.012;
    P.elev = clampV(P.elev - (e.clientY - _drag.y) * 0.003, 0, 1);
    _drag.x = e.clientX; _drag.y = e.clientY;
    _noixzyPostShellParams(); // shell elevation slider stays in sync
  }, {passive:true});

  stg.addEventListener("pointerup", () => { _drag.active = false; });

  stg.addEventListener("wheel", e => {
    e.preventDefault();
    P.dist = clampV(P.dist + e.deltaY * 0.0003, 0, 1);
    _noixzyPostShellParams(); // shell distance slider stays in sync
  }, {passive:false});
}

// ─── p5 setup / draw ──────────────────────────────────────────────────────

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  _pCanvas = c.elt;
  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );
  t0 = millis();
  applyPalette(Math.round(P.pal));
  _initOrbit(stage);
  _loadFavs();
  _buildAudioUI();
  _buildToolbar();
  buildNav();
  window.addEventListener("resize", () => resizeCanvas(stage.clientWidth, stage.clientHeight));
}

function draw() {
  if (paused) return;
  _audioApply();
  const t = (millis() - t0) / 1000.0;
  shader(theShader);
  theShader.setUniform("u_res",          [width, height]);
  theShader.setUniform("u_time",         t);
  theShader.setUniform("u_azimuth",      _camAzimuth);
  theShader.setUniform("u_power",        P.power);
  theShader.setUniform("u_morph",        P.morph);
  theShader.setUniform("u_detail",       P.detail);
  theShader.setUniform("u_glow",         P.glow);
  theShader.setUniform("u_spin",         P.spin);
  theShader.setUniform("u_dist",         P.dist);
  theShader.setUniform("u_elev",         P.elev);
  theShader.setUniform("u_ao",           P.ao);
  theShader.setUniform("u_bgColor",      hexToRGB(_cs.bg));
  theShader.setUniform("u_formColor",    hexToRGB(_cs.form));
  theShader.setUniform("u_hiColor",      hexToRGB(_cs.hi));
  theShader.setUniform("u_bgValue",      P.bgVal);
  theShader.setUniform("u_formSat",      P.fmSat);
  theShader.setUniform("u_formValue",    P.fmVal);
  theShader.setUniform("u_rim",          P.rim);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}

// ─── toolbar ──────────────────────────────────────────────────────────────

function _buildToolbar() {
  document.getElementById("btnPin")?.addEventListener("click", _pinFav);

  document.getElementById("btnCopy")?.addEventListener("click", () => {
    const state = JSON.stringify({ P:{...P}, _cs:{..._cs} });
    navigator.clipboard?.writeText(state).then(()=>{}, ()=>prompt("state:", state));
  });

  document.getElementById("btnPaste")?.addEventListener("click", async () => {
    try {
      const s = JSON.parse(await navigator.clipboard.readText());
      if (s.P)  { Object.assign(P, s.P); applyPalette(Math.round(P.pal)); transparentBg=!!P.bgAlpha; }
      if (s._cs) Object.assign(_cs, s._cs);
      _noixzyPostShellParams();
    } catch(e) {}
  });

  document.getElementById("exportFavs")?.addEventListener("click", () => {
    const txt = JSON.stringify(_favs);
    navigator.clipboard?.writeText(txt).then(()=>{}, ()=>prompt("favorites:", txt));
  });

  document.getElementById("clearFavs")?.addEventListener("click", () => {
    if (confirm("clear all favorites?")) { _favs=[]; _saveFavs(); _renderFavs(); }
  });

  document.getElementById("btnSave")?.addEventListener("click", () =>
    saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`, "png"));

  document.getElementById("btnThumb")?.addEventListener("click", () => {
    let _thumbDir = null;
    requestAnimationFrame(() => {
      const src = _pCanvas || document.querySelector("canvas");
      const c = document.createElement("canvas"); c.width=400; c.height=300;
      c.getContext("2d").drawImage(src,0,0,400,300);
      c.toBlob(async b => {
        try {
          if (!_thumbDir) _thumbDir=await window.showDirectoryPicker({mode:"readwrite",startIn:"downloads"});
          const fh=await _thumbDir.getFileHandle(PIECE+".png",{create:true});
          const w=await fh.createWritable(); await w.write(b); await w.close();
        } catch(e) {
          if (e.name!=="AbortError") { const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=PIECE+".png"; a.click(); }
        }
      }, "image/png");
    });
  });

  document.getElementById("btnSave2x")?.addEventListener("click", () => {
    requestAnimationFrame(() => {
      const src = _pCanvas || document.querySelector("canvas"); if (!src) return;
      const out = document.createElement("canvas"); out.width=src.width*2; out.height=src.height*2;
      out.getContext("2d").drawImage(src,0,0,out.width,out.height);
      const a=document.createElement("a"); a.download=`noixzy_${PIECE}_${Math.floor(millis())}_2x.png`; a.href=out.toDataURL("image/png"); a.click();
    });
  });

  document.getElementById("btnRec")?.addEventListener("click", () => {
    const btn=document.getElementById("btnRec");
    const src=document.querySelector("canvas"); if (!src) return;
    const seconds=parseInt(document.getElementById("recDur")?.value||"4")||4;
    const chunks=[]; const rec=new MediaRecorder(src.captureStream(30),{mimeType:"video/webm"});
    rec.ondataavailable=e=>{if(e.data?.size)chunks.push(e.data);};
    rec.onstop=()=>{
      const a=document.createElement("a"); a.download=`noixzy_${PIECE}_${Math.floor(millis())}_${seconds}s.webm`;
      a.href=URL.createObjectURL(new Blob(chunks,{type:"video/webm"})); a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      if(btn)btn.textContent="video";
    };
    rec.start();
    let rem=seconds; if(btn)btn.textContent="● "+rem+"s";
    const iv=setInterval(()=>{ rem--; if(rem>0){if(btn)btn.textContent="● "+rem+"s";}else{clearInterval(iv);if(btn)btn.textContent="saving…";if(rec.state==="recording")rec.stop();} },1000);
  });

  // Prevent orbit drag stealing events from toolbar / thumb rail
  const tools = document.getElementById("stageTools");
  if (tools) {
    ["pointerdown","pointerup","mousedown","mouseup","touchstart","touchend","click","dblclick","wheel"].forEach(type =>
      tools.addEventListener(type, e=>e.stopPropagation(), type==="wheel"?{passive:false}:false));
  }
  const rail = document.getElementById("stageThumbs");
  if (rail) {
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type =>
      rail.addEventListener(type, e=>e.stopPropagation(), true));
    rail.addEventListener("wheel", e=>{
      e.preventDefault(); e.stopPropagation();
      const strip=document.getElementById("moduleThumbStrip"); if(strip)strip.scrollTop+=e.deltaY;
    }, {capture:true, passive:false});
  }

  let _thumbSel=0;
  const selectThumb = i => {
    const links=[...document.querySelectorAll(".navThumb")]; if(!links.length)return;
    _thumbSel=(i+links.length)%links.length;
    links.forEach(a=>a.classList.remove("selected"));
    links[_thumbSel].classList.add("selected");
    links[_thumbSel].scrollIntoView({block:"nearest",behavior:"smooth"});
  };
  document.getElementById("thumbUp")?.addEventListener("click", e=>{e.stopPropagation();selectThumb(_thumbSel-1);});
  document.getElementById("thumbDown")?.addEventListener("click", e=>{e.stopPropagation();selectThumb(_thumbSel+1);});
}

// ─── nav (manifest-driven, no hardcoded ALL_MODULES) ──────────────────────

function buildNav() {
  fetch("../modules.manifest.json")
    .then(r => r.json())
    .then(manifest => {
      const modules = Array.isArray(manifest) ? manifest : Object.values(manifest);
      const strip = document.getElementById("moduleThumbStrip"); if (!strip) return;
      strip.innerHTML = "";
      modules.forEach(m => {
        const id    = typeof m==="string" ? m : m.id;
        const title = typeof m==="object" ? (m.title||id) : id;
        const a=document.createElement("a"); a.href="../"+id+"/noixzy_"+id+".html"; a.title=title;
        a.className="navThumb"+(id===PIECE?" active":"");
        a.onclick=e=>{e.preventDefault();e.stopPropagation();window.location.href=a.href;};
        const img=document.createElement("img"); img.src="../home/thumbs/"+id+".png"; img.alt=title;
        a.appendChild(img); strip.appendChild(a);
      });
      setTimeout(()=>{ const el=strip.querySelector(".active"); if(el)el.scrollIntoView({block:"center",inline:"nearest"}); },50);
    })
    .catch(()=>{});
}
</script>
