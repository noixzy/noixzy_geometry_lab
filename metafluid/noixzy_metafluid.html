<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // metafluid</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --ink:#e8e8ea; --accent:#48dfff; --dim:#8b969c; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; height:100vh; }
  .stage { position:relative; flex:1; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel { display:none; }
  .stageTools { display:none; }
  .stageThumbs { display:none; }
  .stageFavs { position:absolute; left:50%; bottom:64px; transform:translateX(-50%); z-index:22; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:8px; max-width:min(760px,68vw); pointer-events:auto; }
  .stageFavs:empty { display:none; }
  .stageFavs .chip { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.58); border:1px solid rgba(255,255,255,.16); border-radius:4px; padding:4px 6px; cursor:pointer; font-size:11px; }
  .stageFavs .chip:hover { border-color:var(--accent); color:var(--accent); }
  .stageFavs .sw { width:9px; height:9px; border-radius:2px; display:inline-block; }
  .stageFavs .x { opacity:.45; padding:0 2px; }
  .stageFavs .x:hover { opacity:1; color:var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div id="stage" class="stage">
    <div id="stageFavs" class="stageFavs"></div>
  </div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_azimuth;
uniform float u_count;
uniform float u_seed;
uniform float u_radius;
uniform float u_smooth;
uniform float u_speed;
uniform float u_spread;
uniform float u_spin;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform int   u_transparentBg;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float r) { return length(p) - r; }

float map(vec3 p) {
  float rad = mix(0.15, 0.58, u_radius);
  float k   = mix(0.05, 0.65, u_smooth);
  float t   = u_time * mix(0.06, 0.9, u_speed);
  float spr = mix(0.45, 1.85, u_spread);
  float seedPhase = u_seed * 0.013;
  t += seedPhase;

  vec3 p0 = spr * vec3(sin(t*1.00)*1.00, cos(t*0.70)*0.85, sin(t*0.90)*0.75);
  vec3 p1 = spr * vec3(cos(t*0.85)*0.90, sin(t*1.20)*1.00, cos(t*1.10)*0.80);
  vec3 p2 = spr * vec3(sin(t*1.30+2.10)*0.80, cos(t*0.60+1.20)*0.90, sin(t*0.80+0.50)*0.90);
  vec3 p3 = spr * vec3(cos(t*0.90+3.50)*1.00, sin(t*1.10+0.70)*0.75, cos(t*0.75+1.80)*0.90);
  vec3 p4 = spr * vec3(sin(t*0.70+1.00)*0.85, cos(t*1.40+0.30)*0.95, sin(t*1.20+2.40)*0.70);
  vec3 p5 = spr * vec3(cos(t*1.10+2.00)*0.90, sin(t*0.80+3.10)*0.85, cos(t*1.40+0.90)*0.80);
  vec3 p6 = spr * vec3(sin(t*0.50+0.50)*1.10, cos(t*1.00+2.20)*0.70, sin(t*1.30+1.30)*0.65);
  vec3 p7  = spr * vec3(cos(t*1.30+1.50)*0.80, sin(t*0.60+0.80)*1.00, cos(t*0.95+2.50)*0.90);
  vec3 p8  = spr * vec3(sin(t*1.55+0.40)*0.72, cos(t*0.95+2.80)*0.92, sin(t*0.65+1.70)*0.82);
  vec3 p9  = spr * vec3(cos(t*0.72+2.60)*1.05, sin(t*1.65+1.10)*0.62, cos(t*1.18+0.20)*0.72);
  vec3 p10 = spr * vec3(sin(t*1.90+3.20)*0.66, cos(t*0.54+0.90)*1.05, sin(t*1.45+2.20)*0.66);
  vec3 p11 = spr * vec3(cos(t*1.42+0.70)*0.94, sin(t*0.88+3.70)*0.76, cos(t*0.58+1.40)*1.02);
  vec3 p12 = spr * vec3(sin(t*0.82+2.90)*1.08, cos(t*1.72+0.60)*0.58, sin(t*1.05+3.60)*0.78);
  vec3 p13 = spr * vec3(cos(t*1.78+1.90)*0.70, sin(t*0.76+2.40)*1.02, cos(t*1.34+3.00)*0.64);
  vec3 p14 = spr * vec3(sin(t*1.12+4.10)*0.86, cos(t*1.28+1.60)*0.74, sin(t*0.48+2.70)*1.06);
  vec3 p15 = spr * vec3(cos(t*0.62+3.30)*1.14, sin(t*1.92+0.20)*0.54, cos(t*1.58+2.10)*0.68);
  vec3 p16 = spr * vec3(sin(t*1.37+5.10)*0.74, cos(t*0.91+4.20)*1.12, sin(t*1.66+0.40)*0.58);
  vec3 p17 = spr * vec3(cos(t*1.83+2.80)*1.02, sin(t*0.67+5.70)*0.62, cos(t*1.21+4.90)*0.86);
  vec3 p18 = spr * vec3(sin(t*0.73+6.40)*1.18, cos(t*1.51+2.30)*0.50, sin(t*0.94+5.20)*0.92);
  vec3 p19 = spr * vec3(cos(t*1.26+4.40)*0.60, sin(t*1.74+1.10)*1.06, cos(t*0.82+3.70)*0.72);
  vec3 p20 = spr * vec3(sin(t*1.98+0.30)*0.96, cos(t*0.44+5.80)*0.68, sin(t*1.31+4.50)*1.10);
  vec3 p21 = spr * vec3(cos(t*0.58+6.10)*1.22, sin(t*1.39+2.60)*0.48, cos(t*1.87+1.30)*0.76);
  vec3 p22 = spr * vec3(sin(t*1.62+3.90)*0.68, cos(t*1.07+0.80)*1.18, sin(t*0.69+6.00)*0.84);
  vec3 p23 = spr * vec3(cos(t*1.09+5.40)*0.88, sin(t*0.96+3.20)*0.94, cos(t*1.48+2.00)*1.04);
  vec3 p24 = spr * vec3(sin(t*0.52+1.70)*1.08, cos(t*1.84+4.80)*0.56, sin(t*1.16+2.90)*0.70);
  vec3 p25 = spr * vec3(cos(t*1.71+0.60)*0.72, sin(t*0.49+6.30)*1.14, cos(t*0.77+5.10)*0.90);
  vec3 p26 = spr * vec3(sin(t*1.24+2.20)*0.92, cos(t*1.93+1.40)*0.80, sin(t*0.61+4.10)*1.16);
  vec3 p27 = spr * vec3(cos(t*0.88+3.60)*1.12, sin(t*1.58+5.00)*0.66, cos(t*1.19+0.90)*0.62);
  vec3 p28 = spr * vec3(sin(t*1.46+5.90)*0.54, cos(t*0.83+2.10)*1.20, sin(t*1.75+3.30)*0.96);
  vec3 p29 = spr * vec3(cos(t*1.34+1.50)*0.98, sin(t*1.02+4.60)*0.58, cos(t*0.53+6.20)*1.18);
  vec3 p30 = spr * vec3(sin(t*0.66+3.10)*1.24, cos(t*1.67+5.50)*0.72, sin(t*1.29+1.80)*0.52);
  vec3 p31 = spr * vec3(cos(t*1.91+4.70)*0.64, sin(t*0.74+0.50)*1.22, cos(t*1.43+3.90)*0.82);

  float d = sdSphere(p - p0, rad);
  d = smin(d, sdSphere(p - p1, rad * 0.93), k);
  d = smin(d, sdSphere(p - p2, (u_count >= 3.0) ? rad * 0.88 : 0.0001), k);
  d = smin(d, sdSphere(p - p3, (u_count >= 4.0) ? rad * 0.84 : 0.0001), k);
  d = smin(d, sdSphere(p - p4, (u_count >= 5.0) ? rad * 0.80 : 0.0001), k);
  d = smin(d, sdSphere(p - p5, (u_count >= 6.0) ? rad * 0.76 : 0.0001), k);
  d = smin(d, sdSphere(p - p6, (u_count >= 7.0) ? rad * 0.72 : 0.0001), k);
  d = smin(d, sdSphere(p - p7,  (u_count >= 8.0)  ? rad * 0.68 : 0.0001), k);
  d = smin(d, sdSphere(p - p8,  (u_count >= 9.0)  ? rad * 0.66 : 0.0001), k);
  d = smin(d, sdSphere(p - p9,  (u_count >= 10.0) ? rad * 0.64 : 0.0001), k);
  d = smin(d, sdSphere(p - p10, (u_count >= 11.0) ? rad * 0.62 : 0.0001), k);
  d = smin(d, sdSphere(p - p11, (u_count >= 12.0) ? rad * 0.60 : 0.0001), k);
  d = smin(d, sdSphere(p - p12, (u_count >= 13.0) ? rad * 0.58 : 0.0001), k);
  d = smin(d, sdSphere(p - p13, (u_count >= 14.0) ? rad * 0.56 : 0.0001), k);
  d = smin(d, sdSphere(p - p14, (u_count >= 15.0) ? rad * 0.54 : 0.0001), k);
  d = smin(d, sdSphere(p - p15, (u_count >= 16.0) ? rad * 0.52 : 0.0001), k);
  d = smin(d, sdSphere(p - p16, (u_count >= 17.0) ? rad * 0.50 : 0.0001), k);
  d = smin(d, sdSphere(p - p17, (u_count >= 18.0) ? rad * 0.49 : 0.0001), k);
  d = smin(d, sdSphere(p - p18, (u_count >= 19.0) ? rad * 0.48 : 0.0001), k);
  d = smin(d, sdSphere(p - p19, (u_count >= 20.0) ? rad * 0.47 : 0.0001), k);
  d = smin(d, sdSphere(p - p20, (u_count >= 21.0) ? rad * 0.46 : 0.0001), k);
  d = smin(d, sdSphere(p - p21, (u_count >= 22.0) ? rad * 0.45 : 0.0001), k);
  d = smin(d, sdSphere(p - p22, (u_count >= 23.0) ? rad * 0.44 : 0.0001), k);
  d = smin(d, sdSphere(p - p23, (u_count >= 24.0) ? rad * 0.43 : 0.0001), k);
  d = smin(d, sdSphere(p - p24, (u_count >= 25.0) ? rad * 0.42 : 0.0001), k);
  d = smin(d, sdSphere(p - p25, (u_count >= 26.0) ? rad * 0.41 : 0.0001), k);
  d = smin(d, sdSphere(p - p26, (u_count >= 27.0) ? rad * 0.40 : 0.0001), k);
  d = smin(d, sdSphere(p - p27, (u_count >= 28.0) ? rad * 0.39 : 0.0001), k);
  d = smin(d, sdSphere(p - p28, (u_count >= 29.0) ? rad * 0.38 : 0.0001), k);
  d = smin(d, sdSphere(p - p29, (u_count >= 30.0) ? rad * 0.37 : 0.0001), k);
  d = smin(d, sdSphere(p - p30, (u_count >= 31.0) ? rad * 0.36 : 0.0001), k);
  d = smin(d, sdSphere(p - p31, (u_count >= 32.0) ? rad * 0.35 : 0.0001), k);

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d=map(pos+nor*0.06); occ+=(0.06-d)*0.9;
  d=map(pos+nor*0.14); occ+=(0.14-d)*0.7;
  d=map(pos+nor*0.26); occ+=(0.26-d)*0.5;
  d=map(pos+nor*0.42); occ+=(0.42-d)*0.35;
  return clamp(1.0 - 1.6*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float a   = u_azimuth + u_time * u_spin * 0.35;
  vec3  ro  = vec3(sin(a)*u_dist, u_elev, cos(a)*u_dist);
  vec3  ta  = vec3(0.0);
  vec3  fw  = normalize(ta - ro);
  vec3  rt  = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3  up  = cross(fw, rt);
  vec3  rd  = normalize(fw*1.85 + rt*uv.x + up*uv.y);

  float tt = 0.5;
  bool  hit = false;
  for(int i = 0; i < 90; i++) {
    float d = map(ro + rd * tt);
    if(d < 0.001) { hit = true; break; }
    if(tt > 16.0) break;
    tt += d * 0.65;
  }

  float y       = vUv.y * 0.5 + 0.5;
  vec3  bgBase  = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3  bg      = mix(bgBase * 0.58, bgBase * 1.12, y);
  float bvig    = smoothstep(1.5, 0.0, length(vUv * 0.9));
  bg = mix(bg * 0.72, bg, bvig);
  vec3 col = bg;

  if(hit) {
    vec3  p   = ro + rd * tt;
    vec3  n   = calcNormal(p);
    float ao  = mix(1.0, calcAO(p, n), u_ao);

    vec3  ld   = normalize(vec3(0.55, 0.9, 0.45));
    float dif  = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim  = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.5);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 32.0);
    float fres = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 4.0);
    float sss  = pow(max(0.0, dot(-rd, ld)), 2.0) * 0.28;

    float luma   = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3  baseCol = mix(vec3(luma), u_formColor, u_formSat) * u_formValue;

    col  = baseCol * mix(0.42, 1.12, dif);
    col  = mix(col, u_hiColor * u_formValue, smoothstep(0.5, 0.9, dif) * 0.38 * u_rim);
    col += rim  * u_hiColor * 0.30 * u_rim;
    col += spec * u_hiColor * 0.22 * u_rim;
    col += fres * u_hiColor * 0.08 * u_rim;
    col += sss  * baseCol * 0.5;
    col *= ao;

    float fog = clamp((tt - 3.0) / 14.0, 0.0, 0.5);
    col = mix(col, bg, fog * 0.45);
  }

  float vig = smoothstep(1.45, 0.15, length(vUv));
  col *= mix(0.72, 1.0, vig);
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

<script>
const PIECE = "metafluid";

const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];

const PARAMS = [
  {k:"count",  label:"count",      min:2,    max:32,    step:1,    v:14},
  {k:"radius", label:"radius",     min:0,    max:1,     step:0.01, v:0.45},
  {k:"smooth", label:"smooth",     min:0,    max:1,     step:0.01, v:0.55},
  {k:"speed",  label:"speed",      min:0,    max:1,     step:0.01, v:0.28},
  {k:"spread", label:"spread",     min:0,    max:1,     step:0.01, v:0.58},
  {k:"seed",   label:"seed",       min:0,    max:999999,step:1,    v:0},
  {k:"spin",   label:"spin",       min:0,    max:1,     step:0.01, v:0.20},
  {k:"dist",   label:"distance",   min:3.5,  max:8,     step:0.05, v:5.5},
  {k:"elev",   label:"elevation",  min:-1.5, max:2.5,   step:0.05, v:0.70},
  {k:"ao",     label:"ambient occ",min:0,    max:1,     step:0.01, v:0.65},
  {k:"pal",    label:"palette",    min:0,    max:11,    step:1,    v:4},
  {k:"bgVal",  label:"bg value",   min:0,    max:2,     step:0.01, v:1.0},
  {k:"fmVal",  label:"form value", min:0,    max:2,     step:0.01, v:1.0},
  {k:"fmSat",  label:"form sat",   min:0,    max:2,     step:0.01, v:1.0},
  {k:"rim",    label:"rim",        min:0,    max:2,     step:0.01, v:1.0},
  {k:"bgAlpha",label:"bg alpha",   min:0,    max:1,     step:1,    v:0},
];

let P = {};
PARAMS.forEach(d => { P[d.k] = d.v; });
P.seed = Math.floor(Math.random() * 1000000);

let _cs = { bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2" };

let t0, paused = false, pauseT = 0, theShader, _pCanvas;
let transparentBg = false;
let _camAzimuth = 0, _drag = { active:false, x:0, y:0 };
let _velAz = 0, _velElev = 0;
const _DAMPING = 0.93;

// Audio
let audioCtx, analyser, audioData, audioActive = false;
const ABANDS = { bass:0, mid:0, high:0, presence:0 };
const AMAP   = { bass:null, mid:null, high:null, presence:null };
const ADEPTH = { bass:0.5, mid:0.5, high:0.5, presence:0.5 };
let _audioSaved = {};

// Favs
const _FAV_KEY = "noixzy_" + PIECE + "_favs";
let _favs = [];

// ─── helpers ──────────────────────────────────────────────────────────────

function hexToRGB(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}
function clampV(v, a, b) { return Math.min(b, Math.max(a, v)); }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx), 0, PALETTES.length - 1)];
  _cs.bg = pal[1]; _cs.form = pal[2]; _cs.hi = pal[3];
}

// ─── pause ────────────────────────────────────────────────────────────────

window.noixzyTogglePause = function() {
  paused = !paused;
  if (paused) {
    pauseT = millis();
    noLoop();
  } else {
    t0 += millis() - pauseT;
    loop();
  }
};

// ─── bridge ───────────────────────────────────────────────────────────────

function _noixzyPostShellParams() {
  const data = PARAMS.map(d => ({ ...d, v: P[d.k] ?? d.v }));
  try { window.parent.postMessage({ type:"params", data }, "*"); } catch(e) {}
}

function _noixzySetParam(key, value) {
  if (key === "pal") {
    P.pal = clampV(Math.round(value), 0, PALETTES.length - 1);
    applyPalette(P.pal);
    _noixzyPostShellParams();
    return;
  }
  if (key === "bgAlpha") {
    P.bgAlpha   = value ? 1 : 0;
    transparentBg = !!value;
    _noixzyPostShellParams();
    return;
  }
  const def = PARAMS.find(p => p.k === key);
  if (!def) return;
  P[key] = clampV(parseFloat(value), def.min, def.max);
  _noixzyPostShellParams();
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === "getParams") { _noixzyPostShellParams(); return; }
  if (d.type === "setParam")  { _noixzySetParam(d.key, d.value); return; }
});

// ─── audio ────────────────────────────────────────────────────────────────

function _audioApply() {
  _audioSaved = {};
  if (!audioActive || !analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N = audioData.length;
  const avg = (s, e) => { let v=0; for(let i=s;i<e;i++) v+=audioData[i]; return v/((e-s)*255); };
  ABANDS.bass=avg(0,4); ABANDS.mid=avg(4,20); ABANDS.high=avg(20,60); ABANDS.presence=avg(0,N);
  for (const band of ['bass','mid','high','presence']) {
    const k = AMAP[band]; if (!k || P[k]===undefined) continue;
    const def = PARAMS.find(p => p.k === k);
    const mn = def ? def.min : 0, mx = def ? def.max : 1;
    _audioSaved[k] = P[k];
    P[k] = Math.min(mx, Math.max(mn, P[k] + ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore() { for (const k of Object.keys(_audioSaved)) P[k] = _audioSaved[k]; _audioSaved = {}; }

// ─── favs ─────────────────────────────────────────────────────────────────

function _loadFavs() { try { _favs=JSON.parse(localStorage.getItem(_FAV_KEY)||"[]"); } catch(e) { _favs=[]; } _renderFavs(); }
function _saveFavs() { try { localStorage.setItem(_FAV_KEY, JSON.stringify(_favs)); } catch(e) {} }
function _pinFav()   { _favs.push({ P:{...P}, _cs:{..._cs} }); _saveFavs(); _renderFavs(); }

function _renderFavs() {
  const fp = document.getElementById("stageFavs"); if (!fp) return;
  fp.innerHTML = "";
  _favs.forEach((f, i) => {
    const chip = document.createElement("button"); chip.type="button"; chip.className="chip";
    const sw  = document.createElement("span"); sw.className="sw"; sw.style.background=(f._cs||{}).hi||"#fff";
    const lbl = document.createElement("b"); lbl.textContent="★ "+(i+1);
    const x   = document.createElement("span"); x.className="x"; x.textContent="×";
    chip.append(sw, lbl, x);
    chip.addEventListener("click", ev => {
      ev.preventDefault(); ev.stopPropagation();
      if (ev.target.classList.contains("x")) { _favs.splice(i,1); _saveFavs(); _renderFavs(); return; }
      if (f.P)   Object.assign(P, f.P);
      if (f._cs) Object.assign(_cs, f._cs);
      transparentBg = !!P.bgAlpha;
      _noixzyPostShellParams();
    });
    fp.appendChild(chip);
  });
}

// ─── orbit (bidirectional: drag + damping → shell sliders stay in sync) ──

function _initOrbit(stg) {
  stg.addEventListener("pointerdown", e => {
    _drag = { active:true, x:e.clientX, y:e.clientY };
    _velAz = 0; _velElev = 0;
    stg.setPointerCapture(e.pointerId);
  }, {passive:true});

  stg.addEventListener("pointermove", e => {
    if (!_drag.active) return;
    _velAz   = (e.clientX - _drag.x) * 0.012;
    _velElev = -(e.clientY - _drag.y) * 0.007;
    _camAzimuth += _velAz;
    P.elev = clampV(P.elev + _velElev, -1.5, 2.5);
    _drag.x = e.clientX; _drag.y = e.clientY;
    _noixzyPostShellParams(); // shell elevation slider tracks drag
  }, {passive:true});

  stg.addEventListener("pointerup", () => {
    _drag.active = false;
    _noixzyPostShellParams(); // capture state at release before damping
  });

  stg.addEventListener("wheel", e => {
    e.preventDefault();
    P.dist = clampV(P.dist + e.deltaY * 0.005, 3.5, 8);
    _noixzyPostShellParams(); // shell distance slider tracks scroll
  }, {passive:false});
}

// ─── p5 setup / draw ──────────────────────────────────────────────────────

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  _pCanvas = c.elt;
  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );
  t0 = millis();
  applyPalette(Math.round(P.pal));
  _initOrbit(stage);
  _loadFavs();
  buildNav();
  window.addEventListener("resize", () => resizeCanvas(stage.clientWidth, stage.clientHeight));
}

function draw() {
  if (paused) return;
  _audioApply();

  // Inertia damping — post params while velocity is still decaying so shell tracks landing
  if (!_drag.active) {
    let damp = false;
    if (Math.abs(_velAz) > 0.0001) {
      _camAzimuth += _velAz;
      _velAz *= _DAMPING;
      if (Math.abs(_velAz) < 0.0001) _velAz = 0;
      damp = true;
    }
    if (Math.abs(_velElev) > 0.0001) {
      P.elev = clampV(P.elev + _velElev, -1.5, 2.5);
      _velElev *= _DAMPING;
      if (Math.abs(_velElev) < 0.0001) _velElev = 0;
      damp = true;
    }
    if (damp) _noixzyPostShellParams();
  }

  const t = (millis() - t0) / 1000.0;

  shader(theShader);
  theShader.setUniform("u_res",          [width, height]);
  theShader.setUniform("u_time",         t);
  theShader.setUniform("u_azimuth",      _camAzimuth);
  theShader.setUniform("u_count",        P.count);
  theShader.setUniform("u_seed",         P.seed);
  theShader.setUniform("u_radius",       P.radius);
  theShader.setUniform("u_smooth",       P.smooth);
  theShader.setUniform("u_speed",        P.speed);
  theShader.setUniform("u_spread",       P.spread);
  theShader.setUniform("u_spin",         P.spin);
  theShader.setUniform("u_dist",         P.dist);
  theShader.setUniform("u_elev",         P.elev);
  theShader.setUniform("u_ao",           P.ao);
  theShader.setUniform("u_bgColor",      hexToRGB(_cs.bg));
  theShader.setUniform("u_formColor",    hexToRGB(_cs.form));
  theShader.setUniform("u_hiColor",      hexToRGB(_cs.hi));
  theShader.setUniform("u_bgValue",      P.bgVal);
  theShader.setUniform("u_formSat",      P.fmSat);
  theShader.setUniform("u_formValue",    P.fmVal);
  theShader.setUniform("u_rim",          P.rim);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}

// ─── nav (manifest-driven) ────────────────────────────────────────────────

function buildNav() {
  fetch("../modules.manifest.json")
    .then(r => r.json())
    .then(manifest => {
      const modules = Array.isArray(manifest) ? manifest : Object.values(manifest);
      const strip = document.getElementById("moduleThumbStrip"); if (!strip) return;
      strip.innerHTML = "";
      modules.forEach(m => {
        const id    = typeof m==="string" ? m : m.id;
        const title = typeof m==="object" ? (m.title||id) : id;
        const a=document.createElement("a"); a.href="../"+id+"/noixzy_"+id+".html"; a.title=title;
        a.className="navThumb"+(id===PIECE?" active":"");
        a.onclick=e=>{ e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
        const img=document.createElement("img"); img.src="../home/thumbs/"+id+".png"; img.alt=title;
        a.appendChild(img); strip.appendChild(a);
      });
      setTimeout(()=>{ const el=strip.querySelector(".active"); if(el)el.scrollIntoView({block:"center",inline:"nearest"}); },50);
    })
    .catch(()=>{});
}
</script>
