<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>noixzy studio</title>
<style>
:root {
  --bg:#000;
  --dim:rgba(255,255,255,.55);
  --accent:#d8c06a;
}

* { box-sizing:border-box; }

html,
body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

body {
  padding-top:30px;
}

.thumbRailWrap {
  position:relative;
  width:min(1350px, calc(100vw - 96px));
  margin:0 auto 14px auto;
  padding:8px;
  border:1px solid rgba(255,255,255,.11);
  border-radius:14px;
  background:rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:45;
}

.thumbRail {
  display:flex;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

.thumbRail::-webkit-scrollbar {
  display:none;
}

.railThumb {
  flex:0 0 auto;
  width:82px;
  height:48px;
  border:1px solid rgba(255,255,255,.13);
  border-radius:9px;
  overflow:hidden;
  background:#000;
  opacity:.72;
  transition:opacity .16s ease, transform .16s ease, border-color .16s ease;
}

.railThumb:hover,
.railThumb[aria-current="true"] {
  opacity:1;
  transform:translateY(-1px);
  border-color:rgba(216,192,106,.65);
}

.railThumb img {
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  pointer-events:none;
}

.logoBox {
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, calc(-50% - 5px));
  z-index:30;
  width:96px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  border:0;
  border-radius:14px;
  text-decoration:none;
}

.logoBox img {
  width:70.4px;
  height:70.4px;
  display:block;
  object-fit:contain;
  pointer-events:none;
}

.stage {
  width:100vw;
  height:calc(100vh - 166px);
  margin-top:40px;
  background:#000;
}

#moduleFrame {
  width:100%;
  height:100%;
  display:block;
  border:0;
  background:#000;
}

.shellTrigger {
  position:fixed;
  right:12px;
  top:148px;
  width:116px;
  height:calc(100vh - 168px);
  z-index:89;
  pointer-events:auto;
}

.shellControls {
  position:fixed;
  right:18px;
  top:154px;
  z-index:80;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  padding:8px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  opacity:0;
  pointer-events:none;
  transform:translateX(8px);
  transition:opacity .18s ease, transform .18s ease;
  max-height:calc(100vh - 180px);
  height:calc(100vh - 180px);
  overflow:hidden;
}

.shellControls.shown {
  opacity:1;
  pointer-events:auto;
  transform:translateX(0);
}

.shellControls button {
  width:92px;
  min-height:30px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:9px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font:10px/1.1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-align:center;
  cursor:pointer;
}

.shellControls button:hover {
  border-color:rgba(216,192,106,.65);
  background:rgba(255,255,255,.10);
}

.btnRow {
  display:flex;
  gap:4px;
  width:92px;
}
.btnRow button {
  flex:1;
  width:auto;
  min-width:0;
}

.btnToggle.active {
  background:rgba(216,192,106,.18);
  border-color:rgba(216,192,106,.55);
  color:rgb(216,192,106);
}

/* ── prev / next module nav ── */
.navTriggerLeft {
  position:fixed;
  left:0;
  top:80px;
  width:130px;
  height:80px;
  z-index:79;
  pointer-events:auto;
}

.navTriggerRight {
  position:fixed;
  right:0;
  top:80px;
  width:130px;
  height:80px;
  z-index:79;
  pointer-events:auto;
}

.navPill {
  position:fixed;
  top:65px;
  z-index:80;
  display:flex;
  flex-direction:row;
  gap:4px;
  padding:5px 2px;
  width:64px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:17px;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 0 6px rgba(255,255,255,.35);
}

.navPillLeft {
  left:18px;
}

.navPillRight {
  right:18px;
}

.navBtn {
  display:flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:25px;
  border-radius:13px;
  text-decoration:none;
  color:#fff;
  font-size:14px;
}

.navBtn:hover {
  color:rgba(216,192,106,1);
}

/* ── utility bar ── */
.utilityTrigger {
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  top:101px;
  width:400px;
  height:30px;
  z-index:79;
  pointer-events:auto;
}

.utilityBar {
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  top:105px;
  z-index:80;
  display:flex;
  flex-direction:row;
  gap:6px;
  padding:6px 10px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  opacity:0;
  pointer-events:none;
  transform:translateX(-50%) translateY(-4px);
  transition:opacity .18s ease, transform .18s ease;
}

.utilityTrigger:hover ~ .utilityBar,
.utilityBar:hover {
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}

.utilityBar button {
  min-width:52px;
  min-height:24px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font:9px/1.1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
}

.utilityBar button:hover {
  border-color:rgba(216,192,106,.65);
  background:rgba(255,255,255,.10);
}

/* ── undo / redo bar ── */
.undoBar {
  flex-shrink:0;
  display:flex;
  gap:4px;
  width:92px;
}

.undoBar button {
  flex:1;
  min-width:0;
}

.undoBar button:disabled {
  opacity:.3;
  cursor:default;
}

/* ── param scroll wrapper ── */
.paramScrollWrap {
  flex:1 1 0;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;
  width:92px;
}

.paramScrollWrap::-webkit-scrollbar {
  display:none;
}

/* ── param panel ── */
.paramDivider {
  width:100%;
  height:1px;
  background:rgba(255,255,255,.1);
  margin:4px 0;
}

.paramPanel {
  display:flex;
  flex-direction:column;
  gap:8px;
  width:100%;
}

.paramPanel:empty {
  display:none;
}

.paramRow {
  display:flex;
  flex-direction:column;
  gap:3px;
}

.paramHead {
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:8px;
  min-width:0;
}

.paramLabel {
  font-size:9px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
}

.paramValue {
  flex:0 0 auto;
  max-width:72px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:rgba(255,255,255,.55);
  font:9px/1.1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  text-align:right;
}

.paramRow input[type=range] {
  width:100%;
  height:18px;
  accent-color:var(--accent);
  cursor:pointer;
  background:transparent;
}

.paramRow input[type=checkbox] {
  accent-color:var(--accent);
  cursor:pointer;
  width:14px;
  height:14px;
}

.checkRow {
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
}

.checkRow .paramLabel {
  color:rgba(255,255,255,.55);
}

.status {
  position:absolute;
  left:50%;
  top:154px;
  transform:translateX(-50%);
  color:var(--dim);
  font-size:11px;
  letter-spacing:.06em;
  padding:10px 14px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  background:rgba(0,0,0,.6);
}

/* ── touch-only panel toggle (iPad / phones) ── */
.panelToggle {
  position:fixed;
  bottom:16px;
  right:16px;
  width:48px;
  height:48px;
  z-index:90;
  display:none;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:#fff;
  font:18px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.panelToggle.active {
  background:rgba(216,192,106,.18);
  border-color:rgba(216,192,106,.55);
  color:rgb(216,192,106);
}

@media (hover: none) {
  .panelToggle { display:flex; }
  /* prevent the invisible hover strip from swallowing taps on touch devices */
  .shellTrigger { pointer-events:none; }
}


</style>
</head>
<body>
  <div class="thumbRailWrap">
    <a class="logoBox" href="home/home.html" aria-label="home">
      <img src="home/assets/waveform_logo.svg" alt="noixzy studio">
    </a>
    <nav class="thumbRail" id="moduleRail" aria-label="module thumbnails"></nav>
  </div>

  <div class="shellTrigger"></div>
  <aside class="shellControls" id="shellControls" aria-label="module controls">
    <label class="checkRow" id="extrudeOffRow" style="display:none">
      <input type="checkbox" id="extrudeOffCheck">
      <span class="paramLabel" style="color:rgba(255,255,255,.55)">extrude off</span>
    </label>
    <div class="paramDivider" id="extrudeDivider" style="display:none"></div>
    <button type="button" data-proxy="randomAll">random all</button>
    <div class="btnRow">
      <button type="button" data-proxy="randomForm">rand form</button>
      <button type="button" data-proxy="randomColor">rand color</button>
    </div>
    <div class="btnRow">
      <button type="button" data-proxy="newSeed">new seed</button>
      <button type="button" data-proxy="reset">reset</button>
    </div>
    <button type="button" data-proxy="pause">pause</button>
    <button type="button" data-proxy="bgAlpha" class="btnToggle" id="btnBgAlpha">bg alpha</button>
    <div class="btnRow">
      <button type="button" data-proxy="themePrev">thm prev</button>
      <button type="button" data-proxy="themeNext">thm next</button>
    </div>
    <div class="undoBar">
      <button type="button" data-proxy="undo">undo</button>
      <button type="button" data-proxy="redo">redo</button>
    </div>
    <div class="paramScrollWrap" id="paramScrollWrap">
      <div class="paramDivider" id="paramDivider" style="display:none"></div>
      <div class="paramPanel" id="paramPanel"></div>
    </div>
  </aside>

  <div class="navTriggerLeft"></div>
  <div class="navPill navPillLeft" id="navPillLeft">
    <a class="navBtn" id="navPrevL" href="#" aria-label="previous module">&#8592;</a>
    <a class="navBtn" id="navNextL" href="#" aria-label="next module">&#8594;</a>
  </div>

  <div class="navTriggerRight"></div>
  <div class="navPill navPillRight" id="navPillRight">
    <a class="navBtn" id="navPrevR" href="#" aria-label="previous module">&#8592;</a>
    <a class="navBtn" id="navNextR" href="#" aria-label="next module">&#8594;</a>
  </div>

  <div class="utilityTrigger"></div>
  <div class="utilityBar" id="utilityBar">
    <button type="button" data-proxy="save">save</button>
    <button type="button" data-proxy="save2x">save 2x</button>
    <button type="button" data-proxy="thumb">thumb</button>
    <button type="button" data-proxy="rec">rec</button>
  </div>

  <main class="stage">
    <div class="status" id="status">loading modules.manifest.json</div>
    <iframe id="moduleFrame" title="noixzy studio module"></iframe>
  </main>

  <button type="button" class="panelToggle" id="panelToggle" aria-label="toggle controls panel" aria-expanded="false" aria-controls="shellControls">☰</button>

<script>
(() => {
  const manifestPath = "modules.manifest.json";
  const frame = document.getElementById("moduleFrame");
  const rail = document.getElementById("moduleRail");
  const status = document.getElementById("status");
  const paramPanel = document.getElementById("paramPanel");
  const paramDivider = document.getElementById("paramDivider");

  const params = new URLSearchParams(location.search);
  const requested = params.get("module");

  function thumbPath(module) {
    const id = module.id || (module.file || "").split("/")[0];
    const raw = module.thumb || `home/thumbs/${id}.png`;
    return raw.replace(/^\.?\//, "");
  }

  function moduleHref(module) {
    return module.file || `${module.id}/noixzy_${module.id}.html`;
  }

  function shellHref(module) {
    const id = module.id || (module.file || "").split("/")[0];
    return `module_shell?module=${encodeURIComponent(id)}`;
  }

  // ── param panel ──
  function clearParams() {
    paramPanel.innerHTML = "";
    paramDivider.style.display = "none";
  }

  const PARAM_VALUE_LABELS = {
    animMode: ["Drift", "Pulse", "Breathe", "Swarm"],
    rotAxis: ["current", "next", "third"],
  };

  function formatParamValue(def, rawValue) {
    const key = def.k || "";
    const value = parseFloat(rawValue);
    if (key === "pal" || key === "palette") return `palette ${Math.round(value)}`;
    if (PARAM_VALUE_LABELS[key]) {
      return PARAM_VALUE_LABELS[key][Math.round(value)] ?? String(Math.round(value));
    }
    const step = Number(def.step ?? 0.01);
    if (Number.isInteger(step) || step >= 1) return String(Math.round(value));
    const stepText = String(step);
    const decimals = stepText.includes(".") ? Math.min(4, stepText.split(".")[1].length) : 2;
    return Number.isFinite(value) ? value.toFixed(decimals) : String(rawValue);
  }

  function renderParams(defs) {
    clearParams();
    if (!defs || !defs.length) return;
    paramDivider.style.display = "block";

    // sort: speed first, then rest
    defs = [...defs].sort((a, b) => {
      if (a.k === "speed") return -1;
      if (b.k === "speed") return 1;
      return 0;
    });

    for (const def of defs) {
      const row = document.createElement("div");

      if (def.type === "bool" || def.type === "checkbox") {
        row.className = "paramRow";
        const label = document.createElement("label");
        label.className = "checkRow";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!def.v;
        cb.addEventListener("change", () => {
          frame.contentWindow?.postMessage({ type: "setParam", key: def.k, value: cb.checked }, "*");
        });
        const span = document.createElement("span");
        span.className = "paramLabel";
        span.textContent = def.label || def.k;
        label.appendChild(cb);
        label.appendChild(span);
        row.appendChild(label);
      } else {
        row.className = "paramRow";
        const head = document.createElement("div");
        head.className = "paramHead";
        const lbl = document.createElement("div");
        lbl.className = "paramLabel";
        lbl.textContent = def.label || def.k;
        const val = document.createElement("div");
        val.className = "paramValue";
        const slider = document.createElement("input");
        slider.type = "range";
        slider.min = def.min ?? 0;
        slider.max = def.max ?? 1;
        slider.step = def.step ?? 0.01;
        slider.value = def.v ?? 0.5;
        const updateValue = () => {
          val.textContent = formatParamValue(def, slider.value);
          val.title = val.textContent;
        };
        updateValue();
        slider.addEventListener("input", () => {
          updateValue();
          frame.contentWindow?.postMessage({ type: "setParam", key: def.k, value: parseFloat(slider.value) }, "*");
        });
        head.appendChild(lbl);
        head.appendChild(val);
        row.appendChild(head);
        row.appendChild(slider);
      }

      paramPanel.appendChild(row);
    }
  }

  // ── extrude off checkbox ──
  const extrudeOffRow = document.getElementById("extrudeOffRow");
  const extrudeOffCheck = document.getElementById("extrudeOffCheck");
  const extrudeDivider = document.getElementById("extrudeDivider");

  extrudeOffCheck?.addEventListener("change", () => {
    frame.contentWindow?.postMessage({ type: "setParam", key: "__extrudeOff", value: extrudeOffCheck.checked }, "*");
  });

  // ── param request with cancellation ──
  let _paramTimer = null;

  function cancelParamRetries() {
    if (_paramTimer !== null) { clearTimeout(_paramTimer); _paramTimer = null; }
  }

  function requestParams() {
    if (!frame.src) return;
    clearParams();
    cancelParamRetries();
    let attempts = 0;
    const MAX = 12, BASE = 300, CAP = 3000;
    function try_() {
      if (attempts >= MAX) { _paramTimer = null; return; }
      console.log("[shell] → getParams attempt", attempts, frame.src); // DEBUG
      frame.contentWindow?.postMessage({ type: "getParams" }, "*");
      const delay = Math.min(BASE * Math.pow(2, attempts), CAP);
      attempts++;
      _paramTimer = setTimeout(try_, delay);
    }
    _paramTimer = setTimeout(try_, 50);
  }

  frame.addEventListener("load", requestParams);

  // ── listen for messages from module ──
  window.addEventListener("message", e => {
    console.log("[shell] msg:", e.data?.type, e.origin, e.data); // DEBUG
    if (!e.data || e.data.type !== "params") return;
    cancelParamRetries();
    const defs = e.data.data;
    const extrudeDef = defs.find(d => d.k === "__extrudeOff");
    if (extrudeDef) {
      extrudeOffCheck.checked = !!extrudeDef.v;
      extrudeOffRow.style.display = "";
      extrudeDivider.style.display = "";
    }
    renderParams(defs.filter(d => d.k !== "__extrudeOff"));
  });

  // ── proxy controls ──
  const proxyAliases = {
    randomAll: ["randomUnlocked", "randomAll", "btnRandom", "btnRandomAll", "btnRandomUnlocked", "randomize"],
    randomForm: ["randomForm", "btnRandomForm"],
    randomColor: ["randomColor", "btnRandomColor"],
    undo: ["btnUndo", "undo"],
    redo: ["btnRedo", "redo"],
    newSeed: ["btnNewSeed", "newSeed"],
    pause: ["btnPause", "pause", "play"],
    reset: ["btnReset", "reset"],
    save: ["btnSave", "save", "btnSave2", "export"],
    save2x: ["btnSave2x", "save2x", "btnSave2x2"],
    thumb: ["btnThumb", "thumb", "btnThumb2"],
    rec: ["btnRec", "rec", "btnRec2"],
    themePrev: ["themePrev"],
    themeNext: ["themeNext"],
  };

  let _bgAlphaActive = false;

  function findProxyTarget(doc, id) {
    const ids = proxyAliases[id] || [id];
    for (const candidate of ids) {
      const target = doc.getElementById(candidate);
      if (target) return target;
    }
    return null;
  }

  function cycleIframeTheme(doc, dir) {
    const win = doc.defaultView;
    if (win && typeof win.cycleTheme === "function") { win.cycleTheme(dir); return true; }
    const sel = doc.getElementById("themeSelect");
    if (!sel || !sel.options || !sel.options.length) return false;
    const next = (sel.selectedIndex + dir + sel.options.length) % sel.options.length;
    sel.selectedIndex = next;
    sel.dispatchEvent(new Event("input", { bubbles: true }));
    sel.dispatchEvent(new Event("change", { bubbles: true }));
    return true;
  }

  function clickFirst(doc, ids) {
    for (const id of ids) {
      const target = doc.getElementById(id);
      if (target && typeof target.click === "function") { target.click(); return true; }
    }
    return false;
  }

  function runProxyFallback(doc, id) {
    const win = doc.defaultView;
    const api = win && win.noixzyModuleControls;
    if (api && typeof api[id] === "function") { api[id](); return true; }
    if (id === "bgAlpha") {
      _bgAlphaActive = !_bgAlphaActive;
      const btn = document.getElementById("btnBgAlpha");
      if (btn) btn.classList.toggle("active", _bgAlphaActive);
      frame.contentWindow?.postMessage({ type: "setParam", key: "__bgAlpha", value: _bgAlphaActive }, "*");
      return true;
    }
    if (id === "undo") {
      frame.contentWindow?.postMessage({ type: "undo" }, "*");
      if (win && typeof win._histUndoStep === "function") { win._histUndoStep(); return true; }
      return clickFirst(doc, ["btnUndo", "undo"]) || true;
    }
    if (id === "redo") {
      frame.contentWindow?.postMessage({ type: "redo" }, "*");
      if (win && typeof win._histRedoStep === "function") { win._histRedoStep(); return true; }
      return clickFirst(doc, ["btnRedo", "redo"]) || true;
    }
    if (id === "themePrev") return cycleIframeTheme(doc, -1);
    if (id === "themeNext") return cycleIframeTheme(doc, 1);
    if (id === "randomAll") {
      if (win && typeof win.randomizeParams === "function") { win.randomizeParams("all"); return true; }
      const formClicked = clickFirst(doc, ["randomForm", "btnRandomForm"]);
      const colorClicked = clickFirst(doc, ["randomColor", "btnRandomColor"]);
      if (formClicked || colorClicked) return true;
      return clickFirst(doc, ["randomUnlocked", "btnRandom", "randomAll"]);
    }
    if (id === "randomForm") {
      if (win && typeof win.randomizeParams === "function") { win.randomizeParams("form"); return true; }
      return clickFirst(doc, ["randomForm", "btnRandomForm"]);
    }
    if (id === "randomColor") {
      if (win && typeof win.randomizeParams === "function") { win.randomizeParams("color"); return true; }
      return clickFirst(doc, ["randomColor", "btnRandomColor"]);
    }
    if (id === "newSeed") {
      if (win && typeof win._newMfSeed === "function") { win._newMfSeed(); return true; }
      return clickFirst(doc, ["btnNewSeed", "newSeed"]);
    }
    if (id === "pause") {
      if (win && typeof win.noixzyTogglePause === "function") { win.noixzyTogglePause(); return true; }
      if (win && typeof win.togglePause === "function") { win.togglePause(); return true; }
      if (win && typeof win.pauseFromConsole === "function") { win.pauseFromConsole(); return true; }
      return clickFirst(doc, ["btnPause", "pause"]);
    }
    if (id === "reset") {
      if (win && typeof win._resetMf === "function") { win._resetMf(); return true; }
      if (win && typeof win.resetFromConsole === "function") { win.resetFromConsole(); return true; }
      return clickFirst(doc, ["btnReset", "reset"]);
    }
    return clickFirst(doc, proxyAliases[id] || [id]);
  }

  function bindShellControls() {
    const controls = document.getElementById("shellControls");
    const utility = document.getElementById("utilityBar");
    [controls, utility].filter(Boolean).forEach(el => {
    el.addEventListener("click", event => {
      const btn = event.target.closest("[data-proxy]");
      if (!btn) return;
      const id = btn.dataset.proxy;
      const doc = frame.contentDocument;
      if (!doc) return;
      if (runProxyFallback(doc, id)) return;
      const target = findProxyTarget(doc, id);
      if (target && typeof target.click === "function") { target.click(); return; }
      runProxyFallback(doc, id);
    });
    });
  }

  bindShellControls();

  // ── shell controls hover bridge (JS-driven to work through iframe) ──
  (() => {
    const trigger  = document.querySelector('.shellTrigger');
    const controls = document.getElementById('shellControls');
    let hideTimer = null;

    function showControls() {
      clearTimeout(hideTimer);
      hideTimer = null;
      controls.classList.add('shown');
      trigger.style.pointerEvents = 'none';
    }

    function scheduleHide() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        controls.classList.remove('shown');
        trigger.style.pointerEvents = '';
      }, 200);
    }

    trigger.addEventListener('mouseenter', showControls);
    trigger.addEventListener('mouseleave', scheduleHide);
    controls.addEventListener('mouseenter', showControls);
    controls.addEventListener('mouseleave', scheduleHide);
  })();

  // ── touch-only panel toggle button (iPad / phones) ──
  (() => {
    const toggle  = document.getElementById('panelToggle');
    const controls = document.getElementById('shellControls');
    if (!toggle || !controls) return;
    toggle.addEventListener('click', () => {
      const isShown = controls.classList.toggle('shown');
      toggle.classList.toggle('active', isShown);
      toggle.setAttribute('aria-expanded', isShown ? 'true' : 'false');
    });
  })();

  fetch(manifestPath, { cache:"no-store" })
    .then(r => {
      if (!r.ok) throw new Error(`manifest ${r.status}`);
      return r.json();
    })
    .then(manifest => {
      const modules = (manifest.modules || []).filter(m => m.enabledInShell !== false);
      if (!modules.length) throw new Error("no modules");

      const active = modules.find(m => m.id === requested) || modules[0];

      for (const module of modules) {
        const id = module.id || (module.file || "").split("/")[0];
        const title = module.title || id.replaceAll("_", " ");
        const a = document.createElement("a");
        a.className = "railThumb";
        a.href = shellHref(module);
        a.title = title;
        if (id === active.id) a.setAttribute("aria-current", "true");
        a.innerHTML = `<img src="${thumbPath(module)}" alt="${title}" loading="lazy">`;
        rail.appendChild(a);
      }

      // restore scroll position from previous thumb click
      const savedScroll = sessionStorage.getItem("railScroll");
      if (savedScroll !== null) {
        rail.scrollLeft = parseInt(savedScroll, 10);
        sessionStorage.removeItem("railScroll");
      }

      // save scroll position before navigating via a rail thumb
      rail.addEventListener("click", e => {
        if (e.target.closest(".railThumb")) {
          sessionStorage.setItem("railScroll", rail.scrollLeft);
        }
      });

      frame.src = moduleHref(active);
      status.remove();

      // wire prev/next
      const activeIdx = modules.findIndex(m => m.id === active.id);
      const prevModule = modules[(activeIdx - 1 + modules.length) % modules.length];
      const nextModule = modules[(activeIdx + 1) % modules.length];
      const prevHref = shellHref(prevModule);
      const nextHref = shellHref(nextModule);
      ["navPrevL","navPrevR"].forEach(id => { const el = document.getElementById(id); if(el) el.href = prevHref; });
      ["navNextL","navNextR"].forEach(id => { const el = document.getElementById(id); if(el) el.href = nextHref; });
    })
    .catch(err => {
      status.textContent = `error: ${err.message}`;
    });

})();
</script>
</body>
</html>
