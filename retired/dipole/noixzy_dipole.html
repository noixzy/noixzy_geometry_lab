<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // dipole</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --ink:#e8e8ea; --accent:#48dfff; --dim:#8b969c; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; height:100vh; }
  .stage { position:relative; flex:1; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel, .stageTools, .stageThumbs { display:none; }
  .stageFavs { position:absolute; left:50%; bottom:64px; transform:translateX(-50%); z-index:22; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:8px; max-width:min(760px,68vw); pointer-events:auto; }
  .stageFavs:empty { display:none; }
  .stageFavs .chip { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.58); border:1px solid rgba(255,255,255,.16); border-radius:4px; padding:4px 6px; cursor:pointer; font-size:11px; }
  .stageFavs .chip:hover { border-color:var(--accent); color:var(--accent); }
  .stageFavs .sw { width:9px; height:9px; border-radius:2px; display:inline-block; }
  .stageFavs .x { opacity:.45; padding:0 2px; }
  .stageFavs .x:hover { opacity:1; color:var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div id="stage" class="stage">
    <div id="stageFavs" class="stageFavs"></div>
  </div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main() { vUv = aPosition.xy; gl_Position = vec4(aPosition.xy, 0.0, 1.0); }
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_azimuth;
uniform float u_spin;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform float u_scale;
uniform float u_shells;
uniform float u_thick;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;
uniform int   u_transparentBg;

// Magnetic flux function of a dipole at origin: ψ = sin²θ / r = (x²+y²) / r³
float psi(vec3 p) {
  float r2 = max(dot(p, p), 1e-5);
  return dot(p.xy, p.xy) / (sqrt(r2) * r2);
}

// Analytical gradient of ψ
vec3 gradPsi(vec3 p) {
  float r2  = max(dot(p, p), 1e-5);
  float r   = sqrt(r2);
  float r5  = r2 * r2 * r;
  float z2  = p.z * p.z;
  float fxy = (3.0*z2 - r2) / r5;
  float fz  = p.z * (3.0*z2 - 5.0*r2) / r5;
  return vec3(p.x*fxy, p.y*fxy, fz);
}

float map(vec3 p) {
  float bound  = length(p) - 2.18;
  float inner  = 0.14 - length(p);
  float region = max(bound, inner);

  float sc  = mix(0.28, 1.6, u_scale);
  vec3  q   = p * sc;
  // cap pv so singularity near origin doesn't produce infinite oscillation
  float pv   = min(psi(q) * u_shells, u_shells + 0.49);
  float frac  = fract(pv) - 0.5;
  float gp   = length(gradPsi(q)) * sc * u_shells;
  float th   = mix(0.003, 0.09, u_thick);
  float shell = abs(frac) / max(gp, 0.025) - th;

  return max(region, shell);
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)
  ));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d = map(pos + nor*0.06); occ += (0.06-d)*1.0;
  d = map(pos + nor*0.14); occ += (0.14-d)*0.7;
  d = map(pos + nor*0.26); occ += (0.26-d)*0.4;
  return clamp(1.0 - 2.2*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float az = u_azimuth + u_time * u_spin * 0.38;
  vec3  ro  = vec3(sin(az)*u_dist, u_elev, cos(az)*u_dist);
  vec3  fw  = normalize(-ro);
  vec3  rt  = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3  up  = cross(fw, rt);
  vec3  rd  = normalize(fw*1.8 + rt*uv.x + up*uv.y);

  float tt  = 0.5;
  bool  hit = false;
  for (int i = 0; i < 80; i++) {
    float d = map(ro + rd*tt);
    if (d < 0.0008) { hit = true; break; }
    if (tt > 14.0)  break;
    tt += d * 0.40;
  }

  float y      = vUv.y*0.5+0.5;
  vec3  bgBase = max(u_bgColor*u_bgValue, vec3(0.0));
  vec3  bg     = mix(bgBase*0.62, bgBase*1.08, y);
  bg = mix(bg*0.78, bg, smoothstep(1.42, 0.0, length(vUv*0.88)));
  vec3 col = bg;

  if (hit) {
    vec3  p  = ro + rd*tt;
    vec3  n  = calcNormal(p);
    float ao = mix(1.0, calcAO(p, n), u_ao);

    vec3  ld   = normalize(vec3(0.55, 1.0, 0.40));
    float dif  = clamp(dot(n, ld)*0.5+0.5, 0.0, 1.0);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 36.0);
    float fres = pow(clamp(1.0-dot(n,-rd), 0.0, 1.0), 4.0);
    float rim  = pow(clamp(1.0-dot(n,-rd), 0.0, 1.0), 3.0);

    float luma    = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3  baseCol = mix(vec3(luma), u_formColor, u_formSat)*u_formValue;

    col  = baseCol * mix(0.40, 1.14, dif);
    col  = mix(col, u_hiColor*u_formValue, smoothstep(0.55, 0.95, dif)*0.38*u_rim);
    col += rim  * u_hiColor * 0.30*u_rim;
    col += spec * u_hiColor * 0.22*u_rim;
    col += fres * u_hiColor * 0.10*u_rim;
    col *= ao;

    float fog = clamp((tt-2.0)/11.0, 0.0, 0.5);
    col = mix(col, bg, fog*0.45);
  }

  col *= mix(0.78, 1.0, smoothstep(1.4, 0.2, length(vUv)));
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

<script>
const PIECE = "dipole";

const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];

const PARAMS = [
  {k:"shells", g:"field",    label:"shells",     min:1,  max:8,  step:1,    v:5},
  {k:"scale",  g:"field",    label:"scale",      min:0,  max:1,  step:0.01, v:0.45},
  {k:"thick",  g:"field",    label:"thickness",  min:0,  max:1,  step:0.01, v:0.35},
  {k:"spin",   g:"motion",   label:"spin",       min:0,  max:1,  step:0.01, v:0.06},
  {k:"dist",   g:"camera",   label:"dist",       min:2,  max:8,  step:0.05, v:5.0},
  {k:"elev",   g:"camera",   label:"elev",       min:-2, max:3,  step:0.05, v:0.6},
  {k:"ao",     g:"material", label:"ambient occ",min:0,  max:1,  step:0.01, v:0.65},
  {k:"pal",    g:"material", label:"palette",    min:0,  max:11, step:1,    v:2},
  {k:"bgVal",  g:"material", label:"bg value",   min:0,  max:2,  step:0.01, v:1.0},
  {k:"fmVal",  g:"material", label:"form value", min:0,  max:2,  step:0.01, v:1.0},
  {k:"fmSat",  g:"material", label:"form sat",   min:0,  max:2,  step:0.01, v:1.0},
  {k:"rim",    g:"material", label:"rim",        min:0,  max:1,  step:0.01, v:0.80},
  {k:"bgAlpha",g:"material", label:"bg alpha",   min:0,  max:1,  step:1,    v:0},
];

let P = {}; PARAMS.forEach(d => { P[d.k] = d.v; });
let _cs = { bg:"#100c18", form:"#2c2660", hi:"#b7b0ff" };
let t0, paused = false, pauseT = 0, theShader;
let transparentBg = false;
let _camAzimuth = 0, _drag = { active:false, x:0, y:0 };
let _velAz = 0, _velElev = 0;
const _DAMPING = 0.93;
const _FAV_KEY = "noixzy_" + PIECE + "_favs";
let _favs = [];

function hexToRGB(h) { return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }
function clampV(v,a,b) { return Math.min(b,Math.max(a,v)); }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx), 0, PALETTES.length-1)];
  _cs.bg = pal[1]; _cs.form = pal[2]; _cs.hi = pal[3];
}

window.noixzyTogglePause = function() {
  paused = !paused;
  if (paused) { pauseT = millis(); noLoop(); } else { t0 += millis() - pauseT; loop(); }
};

function _noixzyPostShellParams() {
  const data = PARAMS.map(d => ({ ...d, v: P[d.k] ?? d.v }));
  try { window.parent.postMessage({ type:"params", data }, "*"); } catch(e) {}
}

function _noixzySetParam(key, value) {
  if (key === "pal")     { P.pal = clampV(Math.round(value), 0, PALETTES.length-1); applyPalette(P.pal); _noixzyPostShellParams(); return; }
  if (key === "bgAlpha") { P.bgAlpha = value ? 1 : 0; transparentBg = !!value; _noixzyPostShellParams(); return; }
  const def = PARAMS.find(p => p.k === key); if (!def) return;
  P[key] = clampV(parseFloat(value), def.min, def.max);
  _noixzyPostShellParams();
}

window.addEventListener("message", e => {
  const d = e.data; if (!d || !d.type) return;
  if (d.type === "getParams") { _noixzyPostShellParams(); return; }
  if (d.type === "setParam")  { _noixzySetParam(d.key, d.value); return; }
});

function _loadFavs() { try { _favs=JSON.parse(localStorage.getItem(_FAV_KEY)||"[]"); } catch(e) { _favs=[]; } _renderFavs(); }
function _saveFavs() { try { localStorage.setItem(_FAV_KEY, JSON.stringify(_favs)); } catch(e) {} }

function _renderFavs() {
  const fp = document.getElementById("stageFavs"); if (!fp) return; fp.innerHTML = "";
  _favs.forEach((f, i) => {
    const chip = document.createElement("button"); chip.type="button"; chip.className="chip";
    const sw = document.createElement("span"); sw.className="sw"; sw.style.background=(f._cs||{}).hi||"#fff";
    const lbl = document.createElement("b"); lbl.textContent="★ "+(i+1);
    const x = document.createElement("span"); x.className="x"; x.textContent="×";
    chip.append(sw, lbl, x);
    chip.addEventListener("click", ev => {
      ev.preventDefault(); ev.stopPropagation();
      if (ev.target.classList.contains("x")) { _favs.splice(i,1); _saveFavs(); _renderFavs(); return; }
      if (f.P) Object.assign(P, f.P); if (f._cs) Object.assign(_cs, f._cs);
      transparentBg = !!P.bgAlpha; _noixzyPostShellParams();
    });
    fp.appendChild(chip);
  });
}

function _initOrbit(stg) {
  stg.addEventListener("pointerdown", e => { _drag={active:true,x:e.clientX,y:e.clientY}; _velAz=0; _velElev=0; stg.setPointerCapture(e.pointerId); }, {passive:true});
  stg.addEventListener("pointermove", e => {
    if (!_drag.active) return;
    _velAz   =  (e.clientX - _drag.x) * 0.012;
    _velElev = -(e.clientY - _drag.y) * 0.007;
    _camAzimuth += _velAz; P.elev = clampV(P.elev + _velElev, -2, 3);
    _drag.x = e.clientX; _drag.y = e.clientY; _noixzyPostShellParams();
  }, {passive:true});
  stg.addEventListener("pointerup", () => { _drag.active = false; _noixzyPostShellParams(); });
  stg.addEventListener("wheel", e => { e.preventDefault(); P.dist = clampV(P.dist + e.deltaY*0.005, 2, 8); _noixzyPostShellParams(); }, {passive:false});
}

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL); c.parent(stage);
  theShader = createShader(document.getElementById("vert").textContent, document.getElementById("frag").textContent);
  t0 = millis(); applyPalette(Math.round(P.pal));
  _initOrbit(stage); _loadFavs(); buildNav();
  window.addEventListener("resize", () => resizeCanvas(stage.clientWidth, stage.clientHeight));
  _noixzyPostShellParams();
}

function draw() {
  if (paused) return;
  if (!_drag.active) {
    let damp = false;
    if (Math.abs(_velAz) > 0.0001)   { _camAzimuth += _velAz; _velAz *= _DAMPING; if (Math.abs(_velAz)<0.0001) _velAz=0; damp=true; }
    if (Math.abs(_velElev) > 0.0001) { P.elev = clampV(P.elev+_velElev,-2,3); _velElev *= _DAMPING; if (Math.abs(_velElev)<0.0001) _velElev=0; damp=true; }
    if (damp) _noixzyPostShellParams();
  }
  const t = (millis() - t0) / 1000.0;
  shader(theShader);
  theShader.setUniform("u_res",          [width, height]);
  theShader.setUniform("u_time",         t);
  theShader.setUniform("u_azimuth",      _camAzimuth);
  theShader.setUniform("u_spin",         P.spin);
  theShader.setUniform("u_dist",         P.dist);
  theShader.setUniform("u_elev",         P.elev);
  theShader.setUniform("u_ao",           P.ao);
  theShader.setUniform("u_scale",        P.scale);
  theShader.setUniform("u_shells",       P.shells);
  theShader.setUniform("u_thick",        P.thick);
  theShader.setUniform("u_bgColor",      hexToRGB(_cs.bg));
  theShader.setUniform("u_formColor",    hexToRGB(_cs.form));
  theShader.setUniform("u_hiColor",      hexToRGB(_cs.hi));
  theShader.setUniform("u_bgValue",      P.bgVal);
  theShader.setUniform("u_formSat",      P.fmSat);
  theShader.setUniform("u_formValue",    P.fmVal);
  theShader.setUniform("u_rim",          P.rim);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  noStroke(); quad(-1,-1, 1,-1, 1,1, -1,1);
}

function buildNav() {
  fetch("../modules.manifest.json")
    .then(r => r.json())
    .then(manifest => {
      const modules = Array.isArray(manifest) ? manifest : (manifest.modules || Object.values(manifest));
      const strip = document.getElementById("moduleThumbStrip"); if (!strip) return;
      strip.innerHTML = "";
      modules.forEach(m => {
        const id = typeof m==="string" ? m : m.id;
        const title = typeof m==="object" ? (m.title||id) : id;
        const a = document.createElement("a"); a.href="../"+id+"/noixzy_"+id+".html"; a.title=title;
        a.className = "navThumb" + (id===PIECE?" active":"");
        a.onclick = e => { e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
        const img = document.createElement("img"); img.src="../home/thumbs/"+id+".png"; img.alt=title;
        a.appendChild(img); strip.appendChild(a);
      });
      setTimeout(()=>{ const el=strip.querySelector(".active"); if(el)el.scrollIntoView({block:"center",inline:"nearest"}); },50);
    }).catch(()=>{});
}
</script>

<script src="../home/noixzy_ruler_overlay.js"></script>
</body>
</html>
