<script id="vert" type="x-shader/x-vertex">

<!-- ===== fragment shader: SDF ray-march with smooth booleans ===== -->
<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

#define MAXP 24

uniform vec2  u_res;
uniform float u_time;
uniform int   u_count;
uniform float u_blend;     // smooth-min k
uniform float u_turb;      // domain warp amount
uniform float u_spin;      // animation speed
uniform float u_azimuth;   // mouse orbit offset
uniform float u_dist;      // camera distance
uniform float u_elev;      // camera elevation
uniform vec4  u_prims[MAXP]; // xyz = center, w = radius
uniform vec3  u_bgColor;
uniform vec3  u_blobColor;
uniform vec3  u_highlightColor;
uniform float u_bgValue;
uniform float u_blobSat;
uniform float u_blobValue;
uniform float u_rimStrength;
uniform vec3  u_target;    // blob centroid (keeps form centered)
uniform float u_extrude;   // stretch the form along Y (pillars)
uniform float u_displace;  // sine ripple displacement
uniform int   u_ttype;     // turbulence type: 0=warp 1=fbm 2=curl 3=ridged
uniform int   u_dtype;     // displacement type: 0=sine 1=noise 2=radial 3=twist
uniform float u_ao;        // ambient occlusion strength
uniform int   u_transparentBg; // 1 = transparent background, geometry remains opaque

// polynomial smooth min
float smin(float a, float b, float k){
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float hash(vec3 p){
  p = fract(p*0.3183099 + 0.1);
  p *= 17.0;
  return fract(p.x*p.y*p.z*(p.x+p.y+p.z));
}
float vnoise(vec3 x){
  vec3 i = floor(x); vec3 f = fract(x);
  f = f*f*(3.0-2.0*f);
  float n000=hash(i+vec3(0,0,0)), n100=hash(i+vec3(1,0,0));
  float n010=hash(i+vec3(0,1,0)), n110=hash(i+vec3(1,1,0));
  float n001=hash(i+vec3(0,0,1)), n101=hash(i+vec3(1,0,1));
  float n011=hash(i+vec3(0,1,1)), n111=hash(i+vec3(1,1,1));
  return mix(mix(mix(n000,n100,f.x),mix(n010,n110,f.x),f.y),
             mix(mix(n001,n101,f.x),mix(n011,n111,f.x),f.y),f.z);
}

// FBM warp: 3-octave layered noise, richer wrinkled texture
vec3 fbmWarp(vec3 p, float t){
  vec3 r = vec3(0.0);
  float amp = 0.5, freq = 1.3;
  for(int i=0;i<3;i++){
    r.x += amp*(vnoise(p*freq + t*0.15) - 0.5);
    r.y += amp*(vnoise(p*freq + vec3(3.7,1.1,0.0) + t*0.15) - 0.5);
    r.z += amp*(vnoise(p*freq + vec3(7.3,0.0,4.5) + t*0.15) - 0.5);
    amp *= 0.5; freq *= 2.1;
  }
  return r * 1.5;
}
// Curl-like warp: pseudo-divergence-free, swirling flow
vec3 curlWarp(vec3 p, float t){
  float a = vnoise(p*1.2 + vec3(0.0,1.5,0.7) + t*0.15);
  float b = vnoise(p*1.2 + vec3(1.5,0.0,1.2) + t*0.15);
  float c = vnoise(p*1.2 + vec3(0.7,1.2,0.0) + t*0.15);
  return vec3(b-c, c-a, a-b) * 1.2;
}
// Ridged warp: abs-folded noise, sharp creases
vec3 ridgedWarp(vec3 p, float t){
  float rx = (1.0-abs(vnoise(p*1.3+t*0.15)*2.0-1.0)) - 0.5;
  float ry = (1.0-abs(vnoise(p*1.3+vec3(3.7,1.1,2.3)+t*0.15)*2.0-1.0)) - 0.5;
  float rz = (1.0-abs(vnoise(p*1.3+vec3(7.3,4.5,8.1)+t*0.15)*2.0-1.0)) - 0.5;
  return vec3(rx,ry,rz) * 1.4;
}

float map(vec3 p){
  float t = u_time;
  // DISPLACE: field displacement — type: 0=sine 1=noise 2=radial 3=twist
  if(u_dtype==0){
    p.x += u_displace * sin(p.y*2.5 + t*0.8) * 0.6;
    p.z += u_displace * cos(p.x*2.5 + t*0.7) * 0.6;
  } else if(u_dtype==1){
    p.x += u_displace * (vnoise(p*2.1 + vec3(t*0.5,0.0,0.0)) - 0.5) * 1.2;
    p.z += u_displace * (vnoise(p*2.1 + vec3(0.0,t*0.4,0.0)) - 0.5) * 1.2;
  } else if(u_dtype==2){
    float dr = length(p.xz) + 0.001;
    float rs = sin(dr*4.5 - t*1.2) * u_displace * 0.65;
    p.x += rs * (p.x/dr);
    p.z += rs * (p.z/dr);
  } else {
    float ang = u_displace * p.y * 1.8 * (0.7 + 0.3*sin(t*0.35));
    float ca = cos(ang), sa = sin(ang);
    vec2 txz = vec2(ca*p.x - sa*p.z, sa*p.x + ca*p.z);
    p.x = txz.x; p.z = txz.y;
  }
  // domain warp — type: 0=warp 1=fbm 2=curl 3=ridged
  if(u_ttype==0)      p += u_turb*(vnoise(p*1.3+t*0.15)-0.5)*1.2;
  else if(u_ttype==1) p += u_turb*fbmWarp(p,t);
  else if(u_ttype==2) p += u_turb*curlWarp(p,t);
  else                p += u_turb*ridgedWarp(p,t);
  // EXTRUDE: compress Y so blobs elongate into pillars
  float ey = 1.0 + u_extrude*2.5;
  float k = mix(0.05, 0.9, u_blend);
  float d = 1e5;
  for(int i=0;i<MAXP;i++){
    if(i>=u_count) break;
    vec3 c = u_prims[i].xyz;
    // slow orbital drift so the field loops (gentle, stays centered)
    c.x += 0.16*sin(t*0.6 + float(i)*1.7);
    c.y += 0.14*cos(t*0.5 + float(i)*2.3);
    vec3 sp = p; sp.y /= ey;
    vec3 sc = c; sc.y /= ey;
    float sph = length(sp - sc) - u_prims[i].w;
    d = smin(d, sph, k);
  }
  return d;
}

vec3 calcNormal(vec3 p){
  vec2 e = vec2(0.0015, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor){
  float occ = 0.0;
  float d;
  d=map(pos+nor*0.06); occ+=(0.06-d)*1.000;
  d=map(pos+nor*0.13); occ+=(0.13-d)*0.780;
  d=map(pos+nor*0.21); occ+=(0.21-d)*0.608;
  d=map(pos+nor*0.30); occ+=(0.30-d)*0.474;
  d=map(pos+nor*0.40); occ+=(0.40-d)*0.370;
  return clamp(1.0 - 1.4*occ, 0.0, 1.0);
}

vec3 backgroundColor(vec2 ndc){
  float y = ndc.y*0.5 + 0.5;
  float radial = smoothstep(1.35, 0.04, length(ndc*vec2(0.82, 1.05) + vec2(-0.12, 0.04)));
  float vertical = smoothstep(0.0, 1.0, y);
  float haze = vnoise(vec3(ndc*1.05 + vec2(0.18, -0.07), 2.3));
  vec3 base = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3 lower = base * 0.66;
  vec3 upper = mix(base * 1.12, vec3(0.08), 0.12);
  vec3 glow = mix(base, vec3(0.12), 0.18);
  vec3 bg = mix(lower, upper, vertical);
  bg = mix(bg, glow, radial*0.44);
  bg += (haze - 0.5) * (0.010 + base*0.012);
  return max(bg, vec3(0.0));
}

vec3 adjustBlobColor(vec3 c){
  float luma = dot(c, vec3(0.2126, 0.7152, 0.0722));
  return max(mix(vec3(luma), c, u_blobSat) * u_blobValue, vec3(0.0));
}

void main(){
  vec2 uv = vUv;
  uv.x *= u_res.x/u_res.y;
  float frameShift = mix(0.02, 0.04, smoothstep(1.0, 1.8, u_res.x/u_res.y));
  uv.x += frameShift;

  // Phase 2 camera: orbit remains centered on blob centroid, distance/elevation are user-controlled.
  float a = u_azimuth + u_time * u_spin;
  float camDist = mix(2.65, 6.25, u_dist);
  float camElev = mix(-1.25, 2.20, u_elev);
  vec3 ro = u_target + vec3(sin(a)*camDist, camElev, cos(a)*camDist);
  vec3 ta = u_target;
  vec3 fw = normalize(ta-ro);
  vec3 rt = normalize(cross(vec3(0,1,0), fw));
  vec3 up = cross(fw, rt);
  vec3 rd = normalize(fw*1.6 + rt*uv.x + up*uv.y);

  float tt = 0.0; float d = 0.0; bool hit=false;
  for(int i=0;i<90;i++){
    vec3 p = ro + rd*tt;
    d = map(p);
    if(d < 0.001){ hit=true; break; }
    if(tt > 14.0) break;
    tt += d*0.85;
  }

  vec3 bg = backgroundColor(vUv);
  vec3 col = bg;
  if(hit){
    vec3 p = ro + rd*tt;
    vec3 n = calcNormal(p);
    float ao = calcAO(p, n);
    vec3 lp = normalize(vec3(0.6, 0.9, 0.4));
    float dif = clamp(dot(n, lp), 0.0, 1.0);
    float rim = pow(1.0 - clamp(dot(n, -rd), 0.0, 1.0), 2.5);
    float ramp = clamp(dif*0.9 + 0.1, 0.0, 1.0);
    vec3 baseCol = adjustBlobColor(u_blobColor);
    vec3 highCol = max(u_highlightColor, vec3(0.0));
    vec3 litBase = baseCol * mix(0.58, 1.12, ramp);
    float hiAmt = clamp(smoothstep(0.18, 1.0, ramp) * 0.62 * u_rimStrength, 0.0, 0.95);
    col = mix(litBase, highCol, hiAmt);
    col += rim * highCol * 0.45 * u_rimStrength;
    col *= mix(1.0, ao, u_ao);
    // depth falloff stays material-local so background controls do not tint the form.
    col *= mix(1.0, 0.72, clamp((tt-3.0)/9.0, 0.0, 0.65));
  }
  // subtle vignette
  float vig = smoothstep(1.4, 0.2, length(vUv));
  col *= mix(0.78, 1.0, vig);
  // gentle filmic-ish curve
  col = pow(col, vec3(0.85));
  float alpha = (u_transparentBg == 1 && !hit) ? 0.0 : 1.0;
  gl_FragColor = vec4(col, alpha);
}
</script>

function hexToRGB(h){
  return [parseInt(h.slice(1,3),16)/255,
          parseInt(h.slice(3,5),16)/255,
          parseInt(h.slice(5,7),16)/255];
}

function clamp(v, min, max){ return Math.min(max, Math.max(min, v)); }
function rand(min, max){ return min + Math.random() * (max - min); }
function randInt(min, max){ return Math.floor(rand(min, max + 1)); }
function choose(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
function normHex(v){ return /^#[0-9a-f]{6}$/i.test(v) ? v.toLowerCase() : "#000000"; }

function controlElement(key){
  if(key === "seed") return document.getElementById("seedField");
  return document.getElementById(key);
}

function updatePReadout(key){
  const cfg = P_CONTROLS[key];
  const out = document.getElementById(cfg.out);
  if(!out) return;
  if(key === "p3") out.textContent = `${P[cfg.index]} ${PALETTES[P[cfg.index]][0]}`;
  else out.textContent = P[cfg.index].toFixed(2);
}

function setPControl(key, value, opts={}){
  const cfg = P_CONTROLS[key];
  const el = document.getElementById(key);
  let v = parseFloat(value);
  if(Number.isNaN(v)) v = P[cfg.index];
  if(key === "p3"){
    v = clamp(Math.round(v), 0, PALETTES.length - 1);
  } else if(el) {
    v = clamp(v, parseFloat(el.min), parseFloat(el.max));
  }
  P[cfg.index] = v;
  if(el) el.value = String(v);
  updatePReadout(key);
  if(key === "p3" && opts.applyPalette !== false) applyPreset(v, !!opts.respectLocks);
  if(cfg.rebuild && opts.rebuild !== false && prims) buildPrims();
}

function syncPControls(){
  Object.keys(P_CONTROLS).forEach(key=>{
    const cfg = P_CONTROLS[key];
    const el = document.getElementById(key);
    if(key === "p3" && el) el.max = PALETTES.length - 1;
    if(el) el.value = String(P[cfg.index]);
    updatePReadout(key);
  });
}

function updateColorUI(){
  document.getElementById("bgColor").value = colorState.bg;
  document.getElementById("blobColor").value = colorState.blob;
  document.getElementById("hiColor").value = colorState.hi;
  document.getElementById("bgValue").value = colorState.bgValue;
  document.getElementById("blobSat").value = colorState.blobSat;
  document.getElementById("blobValue").value = colorState.blobValue;
  document.getElementById("rimStrength").value = colorState.rim;
  document.getElementById("v10").textContent = colorState.bgValue.toFixed(2);
  document.getElementById("v11").textContent = colorState.blobSat.toFixed(2);
  document.getElementById("v12").textContent = colorState.blobValue.toFixed(2);
  document.getElementById("v13").textContent = colorState.rim.toFixed(2);
}

function setColorControl(id, value){
  colorState[COLOR_CONTROLS[id]] = normHex(value);
  updateColorUI();
}

function setValueControl(id, value){
  const el = document.getElementById(id);
  const key = VALUE_CONTROLS[id];
  const min = parseFloat(el.min), max = parseFloat(el.max);
  let v = parseFloat(value);
  if(Number.isNaN(v)) v = colorState[key];
  colorState[key] = clamp(v, min, max);
  updateColorUI();
}

function applyPreset(idx, respectLocks=false){
  const pal = PALETTES[idx];
  if(!respectLocks || !locks.bgColor) colorState.bg = pal[1];
  if(!respectLocks || !locks.blobColor) colorState.blob = pal[2];
  if(!respectLocks || !locks.hiColor) colorState.hi = pal[3];
  if(!respectLocks || !locks.bgValue) colorState.bgValue = 1;
  if(!respectLocks || !locks.blobSat) colorState.blobSat = 1;
  if(!respectLocks || !locks.blobValue) colorState.blobValue = 1;
  if(!respectLocks || !locks.rimStrength) colorState.rim = 1;
  updateColorUI();
}

function setTypeControl(key, value){
  const values = TYPE_OPTIONS[key];
  const v = values.includes(parseInt(value)) ? parseInt(value) : values[0];
  if(key === "turbType") turbType = v;
  else displaceType = v;
  document.getElementById(key).value = String(v);
}

function setSeedValue(value, rebuild=true){
  seed = Math.max(0, Math.floor(parseFloat(value) || 0));
  document.getElementById("seedField").value = seed;
  document.getElementById("seedRead").textContent = seed;
  if(rebuild && prims) buildPrims();
}

function updateLockUI(key){
  const btn = document.querySelector(`.lockBtn[data-lock="${key}"]`);
  const row = controlElement(key)?.closest(".row");
  const on = !!locks[key];
  if(btn){
    btn.textContent = on ? "locked" : "lock";
    btn.classList.toggle("locked", on);
    btn.setAttribute("aria-pressed", on ? "true" : "false");
  }
  if(row) row.classList.toggle("locked", on);
}

function updateAllLockUI(){ LOCKABLE_KEYS.forEach(updateLockUI); }

function wireLockButtons(){
  LOCKABLE_KEYS.forEach(key=>{
    const el = controlElement(key);
    const row = el?.closest(".row");
    const label = row?.querySelector("label");
    if(!label || label.querySelector(`[data-lock="${key}"]`)) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "lockBtn";
    btn.dataset.lock = key;
    btn.addEventListener("click", e=>{
      e.preventDefault();
      locks[key] = !locks[key];
      updateLockUI(key);
    });
    label.appendChild(btn);
  });
  updateAllLockUI();
}

function applyColorRecipe(recipe, respectLocks=true){
  if(!respectLocks || !locks.bgColor) colorState.bg = recipe.bg;
  if(!respectLocks || !locks.blobColor) colorState.blob = recipe.blob;
  if(!respectLocks || !locks.hiColor) colorState.hi = recipe.hi;
  if(!respectLocks || !locks.bgValue) colorState.bgValue = rand(recipe.bgValue[0], recipe.bgValue[1]);
  if(!respectLocks || !locks.blobSat) colorState.blobSat = rand(recipe.blobSat[0], recipe.blobSat[1]);
  if(!respectLocks || !locks.blobValue) colorState.blobValue = rand(recipe.blobValue[0], recipe.blobValue[1]);
  if(!respectLocks || !locks.rimStrength) colorState.rim = rand(recipe.rim[0], recipe.rim[1]);
  updateColorUI();
}

function randomizeFormControls(respectLocks=true){
  FORM_RANDOM_KEYS.forEach(key=>{
    if(respectLocks && locks[key]) return;
    if(key === "seed") setSeedValue(randInt(1, 999999));
    else setPControl(key, rand(FORM_RANGES[key][0], FORM_RANGES[key][1]));
  });
  setPresetStatus("form randomized");
}

function randomizeColorControls(respectLocks=true){
  applyColorRecipe(choose(COLOR_RECIPES), respectLocks);
  setPresetStatus("color randomized");
}

function randomizeUnlockedControls(){
  randomizeFormControls(true);
  if(!locks.p9) setPControl("p9", rand(FORM_RANGES.p9[0], FORM_RANGES.p9[1]));
  if(!locks.turbType) setTypeControl("turbType", choose(TYPE_OPTIONS.turbType));
  if(!locks.displaceType) setTypeControl("displaceType", choose(TYPE_OPTIONS.displaceType));
  if(!locks.p3){
    const idx = randInt(0, PALETTES.length - 1);
    setPControl("p3", idx, { applyPalette:false });
    applyPreset(idx, true);
  }
  randomizeColorControls(true);
  setPresetStatus("unlocked randomized");
}

function captureState(){
  return {
    version:1,
    seed,
    P:P.slice(),
    colorState:{ ...colorState },
    turbType,
    displaceType,
    locks:{ ...locks }
  };
}

function loadState(state){
  if(!state) return;
  if(Array.isArray(state.P)){
    Object.keys(P_CONTROLS).forEach(key=>{
      const cfg = P_CONTROLS[key];
      if(state.P[cfg.index] !== undefined) setPControl(key, state.P[cfg.index], { applyPalette:false, rebuild:false });
    });
  }
  if(state.colorState) colorState = { ...colorState, ...state.colorState };
  if(state.turbType !== undefined) setTypeControl("turbType", state.turbType);
  if(state.displaceType !== undefined) setTypeControl("displaceType", state.displaceType);
  if(state.locks){
    locks = makeUnlockedLocks();
    LOCKABLE_KEYS.forEach(key=>{ locks[key] = !!state.locks[key]; });
  }
  setSeedValue(state.seed !== undefined ? state.seed : seed, false);
  syncPControls();
  updateColorUI();
  updateAllLockUI();
  buildPrims();
}

function readLocalPresets(){
  try {
    const raw = localStorage.getItem(PRESET_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
  } catch(e) {
    return {};
  }
}

function writeLocalPresets(presets){
  localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
}

function populateStarterPresets(){
  const sel = document.getElementById("starterPreset");
  sel.innerHTML = "";
  STARTER_PRESETS.forEach((preset, i)=>{
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = preset.name;
    sel.appendChild(opt);
  });
}

function renderLocalPresets(){
  const sel = document.getElementById("localPreset");
  const presets = readLocalPresets();
  const names = Object.keys(presets).sort((a,b)=>a.localeCompare(b));
  sel.innerHTML = "";
  if(!names.length){
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "no local presets";
    sel.appendChild(opt);
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  names.forEach(name=>{
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function setPresetStatus(text){
  const el = document.getElementById("presetStatus");
  if(el) el.textContent = text || "";
}

function mixValue(a, b, t){ return a + (b - a) * t; }
function blobScaleFromSlider(t){
  t = Math.max(0, Math.min(1, t));
  if(t <= 0.5) return mixValue(0.3, 1.0, Math.pow(t / 0.5, 1.15));
  return mixValue(1.0, 1.45, Math.pow((t - 0.5) / 0.5, 1.85));
}

const THEME_NAMES=["ember","mineral","violet","amber","graphite","cyan","acid","magenta","gold","neutral"];
const THEMEKEY="noixzy_lab_theme";
let activeTheme=null;

function _syncSdfThemeChrome(idx){
  const pal = PALETTES[idx];
  if(!pal) return;

  // SDF palette format: [name, bg, blob, highlight]
  const bg = pal[1];
  const blob = pal[2];
  const hi = pal[3];

  const root = document.documentElement.style;
  root.setProperty("--bg", bg);
  root.setProperty("--panel", bg);
  root.setProperty("--accent", hi);
  root.setProperty("--ink", hi);
  root.setProperty("--dim", blob);

  // Keep visible color controls/readouts synced to the active palette.
  if(typeof updateColorUI === "function") updateColorUI();
}

function applyTheme(name){
  const idx=THEME_NAMES.indexOf(name); if(idx<0) return;
  activeTheme=name;

  // This updates SDF form palette/colorState through the existing native path.
  setPControl('p3', idx, { applyPalette:true, rebuild:false });

  // This updates UI chrome so arrows/dropdown/form feel like one theme.
  _syncSdfThemeChrome(idx);

  const sel=document.getElementById('themeSelect'); if(sel) sel.value=name;
  try{localStorage.setItem(THEMEKEY,name);}catch(e){}
}
function cycleTheme(dir){
  const idx=THEME_NAMES.indexOf(activeTheme);
  applyTheme(THEME_NAMES[((idx<0?0:idx)+dir+THEME_NAMES.length)%THEME_NAMES.length]);
}

function setup(){
  const container=document.getElementById("stage"); const c = createCanvas(container.clientWidth, container.clientHeight, WEBGL);
  c.parent("stage"); _pCanvas=c.elt;
  pixelDensity(1);
  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent);
  bindUI();
  buildPrims();
  t0 = millis();
  // populate theme select + restore persisted theme
  const tSel=document.getElementById('themeSelect');
  if(tSel){ THEME_NAMES.forEach(n=>{ const opt=document.createElement('option'); opt.value=n; opt.textContent=n; tSel.appendChild(opt); });
    tSel.addEventListener('change',e=>applyTheme(e.target.value)); }
  const savedTheme=localStorage.getItem(THEMEKEY); if(savedTheme) applyTheme(savedTheme);
}
function windowResized(){ const container=document.getElementById("stage"); resizeCanvas(container.clientWidth, container.clientHeight); }
function keyPressed(){
  const tag=document.activeElement&&document.activeElement.tagName;
  if(tag==="INPUT"||tag==="SELECT") return;
  if(key==="h"||key==="H") document.querySelector(".panel").classList.toggle("hidden");
  if(key==="[") cycleTheme(-1); if(key==="]") cycleTheme(1);
}

// seed drives primitive layout — reproducible
function buildPrims(){
  randomSeed(seed);
  noiseSeed(seed);
  const densityCurve = Math.pow(P[0], 1.35);
  const n = 1 + floor((MAX_PRIMS - 1) * densityCurve + 0.0001);
  const spread = mixValue(0.6, 2.1, Math.pow(P[7], 1.65));
  const densityRadius = mixValue(0.58, 1.0, constrain(P[0] / 0.5, 0, 1));
  const blobScale = blobScaleFromSlider(P[8]);
  const tmp = []; let cx=0, cy=0, cz=0;
  for(let i=0;i<n;i++){
    const px=random(-1.3,1.3), py=random(-1.15,1.15), pz=random(-1.3,1.3);
    const r=random(0.55,1.1) * densityRadius * blobScale;
    tmp.push([px,py,pz,r]); cx+=px; cy+=py; cz+=pz;
  }
  cx/=n; cy/=n; cz/=n;
  // recenter cluster on the origin so the form is always centered in frame
  prims = tmp.map(p=>[(p[0]-cx)*spread, (p[1]-cy)*spread, (p[2]-cz)*spread, p[3]]);
  target = [0,0,0];
  select("#seedRead").html(seed);
}

let _camAzimuth=0,_drag={active:false,x:0,y:0};
function _initOrbit(stg){
  stg.addEventListener("pointerdown",e=>{_drag={active:true,x:e.clientX,y:e.clientY};stg.setPointerCapture(e.pointerId);},{passive:true});
  stg.addEventListener("pointermove",e=>{if(!_drag.active)return;_camAzimuth+=(e.clientX-_drag.x)*0.012;P[11]=clamp(P[11]-(e.clientY-_drag.y)*0.003,0,1);_drag.x=e.clientX;_drag.y=e.clientY;const se=document.getElementById("pElev");if(se){se.value=P[11];const vv=document.getElementById("vElev");if(vv)vv.textContent=P[11].toFixed(2);}},{passive:true});
  stg.addEventListener("pointerup",()=>{_drag.active=false;});
  stg.addEventListener("wheel",e=>{e.preventDefault();P[10]=clamp(P[10]+e.deltaY*0.0003,0,1);const sd=document.getElementById("pDist");if(sd){sd.value=P[10];const vd=document.getElementById("vDist");if(vd)vd.textContent=P[10].toFixed(2);}},{passive:false});
}

function draw(){
  _audioApply();
  const t = running ? (millis()-t0)/1000 : pauseT;
  shader(theShader);
  theShader.setUniform("u_res", [width, height]);
  theShader.setUniform("u_time", t);
  theShader.setUniform("u_azimuth", _camAzimuth);
  theShader.setUniform("u_count", prims.length);
  theShader.setUniform("u_blend", P[1]);
  theShader.setUniform("u_turb", P[2]);
  theShader.setUniform("u_spin", map(P[4], 0, 1, 0.0, 0.7));
  theShader.setUniform("u_dist", P[10] ?? 0.55);
  theShader.setUniform("u_elev", P[11] ?? 0.44);
  // flatten prims into vec4 array
  const flat = [];
  for(let i=0;i<MAX_PRIMS;i++){
    const p = prims[i] || [0,0,0,0];
    flat.push(p[0], p[1], p[2], p[3]);
  }
  theShader.setUniform("u_prims", flat);
  theShader.setUniform("u_bgColor", hexToRGB(colorState.bg));
  theShader.setUniform("u_blobColor", hexToRGB(colorState.blob));
  theShader.setUniform("u_highlightColor", hexToRGB(colorState.hi));
  theShader.setUniform("u_bgValue", colorState.bgValue);
  theShader.setUniform("u_blobSat", colorState.blobSat);
  theShader.setUniform("u_blobValue", colorState.blobValue);
  theShader.setUniform("u_rimStrength", colorState.rim);
  theShader.setUniform("u_target", target);
  theShader.setUniform("u_extrude", P[5]);
  theShader.setUniform("u_displace", P[6]);
  theShader.setUniform("u_ttype", turbType);
  theShader.setUniform("u_dtype", displaceType);
  theShader.setUniform("u_ao", P[9]);
  theShader.setUniform("u_transparentBg", transparentBg ? 1 : 0);
  noStroke();
  // explicit normalized-device fullscreen quad (aspect-independent)
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}

let _sdfRecorder=null,_sdfRecChunks=[];
function _recSdf(){
  const visibleBtn=document.getElementById("btnRec");
  const hiddenBtn=document.getElementById("rec");
  const btn=visibleBtn || hiddenBtn;
  const src=document.querySelector("canvas");
  if(!src) return;

  if(_sdfRecorder && _sdfRecorder.state==="recording"){
    _sdfRecorder.stop();
    return;
  }

  const durEl=document.getElementById("btnRecDur") || document.getElementById("recDur");
  const seconds=durEl ? parseInt(durEl.value,10) || 4 : 4;

  let stream;
  try {
    stream=src.captureStream(30);
  } catch(e) {
    if(btn) btn.textContent="unsupported";
    setTimeout(()=>{ if(btn) btn.textContent="video"; },1200);
    return;
  }

  _sdfRecChunks=[];
  _sdfRecorder=new MediaRecorder(stream,{mimeType:"video/webm"});

  _sdfRecorder.ondataavailable=e=>{
    if(e.data && e.data.size) _sdfRecChunks.push(e.data);
  };

  _sdfRecorder.onstop=()=>{
    const blob=new Blob(_sdfRecChunks,{type:"video/webm"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download=`noixzy_sdf_raymarch_${seed}_${seconds}s.webm`;
    a.href=url;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    stream.getTracks().forEach(tr=>tr.stop());
    if(btn) btn.textContent="video";
  };

  _sdfRecorder.start();

  let remaining=seconds;
  if(btn) btn.textContent="● " + remaining + "s";

  const iv=setInterval(()=>{
    if(!_sdfRecorder || _sdfRecorder.state!=="recording"){
      clearInterval(iv);
      return;
    }

    remaining--;

    if(remaining > 0){
      if(btn) btn.textContent="● " + remaining + "s";
    } else {
      clearInterval(iv);
      if(btn) btn.textContent="saving…";
      _sdfRecorder.stop();
    }
  },1000);
}
function _bindUtilityControls(){
  document.getElementById("reset")?.addEventListener("click",_resetSdf);
  document.getElementById("copy")?.addEventListener("click",_copySdfState);
  document.getElementById("paste")?.addEventListener("click",_pasteSdfState);
  document.getElementById("save2x")?.addEventListener("click",_saveSdf2x);
  document.getElementById("rec")?.addEventListener("click",_recSdf);
}

let audioCtx,analyser,audioData,audioActive=false;
const ABANDS={bass:0,mid:0,high:0,presence:0};
const AMAP={bass:'p5',mid:'p2',high:'p6',presence:'p4'};
const AUDIO_GAIN=2.0;
const BASS_SENSOR_GAIN=1.85;
const AUDIO_ATTACK=0.55, AUDIO_RELEASE=0.16;
const ADEPTH={bass:0.8,mid:0.55,high:0.65,presence:0.45};
let _audioSaved={};
let _audioBassFloor=0;
function _audioClamp(v){ return Math.max(0,Math.min(1,v)); }
function _audioShape(v){
  v=_audioClamp(v);
  return _audioClamp(Math.pow(v,0.65)*AUDIO_GAIN);
}
function _audioShapeBass(v){
  v=_audioShape(v);
  return _audioClamp(v*BASS_SENSOR_GAIN);
}
function _audioBandHz(lo,hi){
  if(!audioCtx||!analyser||!audioData) return 0;
  const hzPerBin=audioCtx.sampleRate/analyser.fftSize;
  let s=Math.max(0,Math.floor(lo/hzPerBin));
  let e=Math.min(audioData.length,Math.ceil(hi/hzPerBin));
  if(e<=s) e=Math.min(audioData.length,s+1);
  let v=0;
  for(let i=s;i<e;i++) v+=audioData[i];
  return e>s ? v/((e-s)*255) : 0;
}
function _audioSmoothBand(band,target){
  const cur=ABANDS[band]||0;
  const rate=target>cur?AUDIO_ATTACK:AUDIO_RELEASE;
  ABANDS[band]=cur+(target-cur)*rate;
}
const _pAudioParams=[
  {k:'p0',sid:'p0',label:'density'},{k:'p1',sid:'p1',label:'blend'},
  {k:'p2',sid:'p2',label:'turbulence'},{k:'p4',sid:'p4',label:'spin'},
  {k:'p5',sid:'p5',label:'extrude'},{k:'p6',sid:'p6',label:'displace'},
  {k:'p7',sid:'p7',label:'spread'},{k:'p8',sid:'p8',label:'blob size'},
  {k:'p9',sid:'p9',label:'ao'},{k:'pDist',sid:'pDist',label:'distance'},
  {k:'pElev',sid:'pElev',label:'elevation'},
];

function _audioApply(){
  _audioSaved={};
  if(!audioActive||!analyser) return;
  analyser.getByteFrequencyData(audioData);
  const bassLevel=_audioShapeBass(_audioBandHz(35,220));
  _audioBassFloor += (bassLevel-_audioBassFloor)*0.08;
  const bassKick=_audioClamp((bassLevel-_audioBassFloor)*5.0);
  _audioSmoothBand('bass',_audioClamp(bassLevel*0.88+bassKick*0.85));
  _audioSmoothBand('mid',_audioShape(_audioBandHz(180,1400)));
  _audioSmoothBand('high',_audioShape(_audioBandHz(1800,5200)));
  _audioSmoothBand('presence',_audioShape(_audioBandHz(5200,12000)));
  for(const band of['bass','mid','high','presence']){
    const k=AMAP[band];if(!k)continue;
    const cfg=P_CONTROLS[k];if(!cfg)continue;
    const idx=cfg.index;
    _audioSaved[k]=P[idx];
    const el=document.getElementById(k);
    const mn=el?parseFloat(el.min):0,mx=el?parseFloat(el.max):1;
    P[idx]=Math.min(mx,Math.max(mn,P[idx]+ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore(){
  for(const k of Object.keys(_audioSaved)){const cfg=P_CONTROLS[k];if(cfg)P[cfg.index]=_audioSaved[k];}
  _audioSaved={};
}

function _favSwatch(f){

  async function _loadFile(file){_ensureCtx();if(audioSource){try{audioSource.stop();}catch(e){}audioSource=null;}const ab=await file.arrayBuffer();audioBuffer=await audioCtx.decodeAudioData(ab);audioFilename.textContent=file.name;audioStatus.style.display="flex";_playBuffer();}
  function _playBuffer(){if(!audioBuffer)return;if(audioSource){try{audioSource.stop();}catch(e){}}audioSource=audioCtx.createBufferSource();audioSource.buffer=audioBuffer;audioSource.loop=true;audioSource.connect(analyser);analyser.connect(audioCtx.destination);audioSource.start();audioPlaying=true;audioPlayPause.textContent="⏸";audioActive=true;}
  audioPlayPause?.addEventListener("click",()=>{if(audioPlaying){try{audioSource.stop();}catch(e){}audioPlaying=false;audioActive=false;audioPlayPause.textContent="▶";}else{_playBuffer();}});
  const _lfd=async f=>{if(f&&f.type.startsWith("audio/"))await _loadFile(f);};

  btnAudio?.addEventListener("click",()=>{const open=audioPanel.style.display==="none";audioPanel.style.display=open?"block":"none";btnAudio.style.color=open?"var(--accent)":"";});

    const none=document.createElement("option");none.value="";none.textContent="— off —";sel.appendChild(none);
    _pAudioParams.forEach(p=>{const o=document.createElement("option");o.value=p.k;o.textContent=p.label;sel.appendChild(o);});
    if(AMAP[band])sel.value=AMAP[band];
    sel.addEventListener("change",()=>{AMAP[band]=sel.value||null;});
    const dep=document.createElement("input");dep.type="range";dep.min=0;dep.max=1;dep.step=.01;dep.value=ADEPTH[band];dep.style.cssText="width:55px;";
    dep.addEventListener("input",()=>{ADEPTH[band]=parseFloat(dep.value);});

  _bindUtilityControls();
}

function _bindSdfVideoButtonOwnsRecording(){
  const btn=document.getElementById("btnRec");
  if(!btn || btn.dataset.videoOwnsRecording==="1") return;
  btn.dataset.videoOwnsRecording="1";

  btn.addEventListener("click", e=>{
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    const canvas=document.querySelector("#stage canvas") || document.querySelector("canvas");
    if(!canvas || !canvas.captureStream){
      btn.textContent="unsupported";
      setTimeout(()=>btn.textContent="video",1200);
      return;
    }

    const durEl=document.getElementById("btnRecDur");
    const seconds=durEl ? parseInt(durEl.value,10) || 4 : 4;

    let stream, recorder, chunks=[];
    try{
      stream=canvas.captureStream(30);
      const mimeType=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
        .find(t=>MediaRecorder.isTypeSupported(t)) || '';
      recorder=new MediaRecorder(stream, mimeType ? {mimeType} : {});
    }catch(err){
      btn.textContent="rec error";
      setTimeout(()=>btn.textContent="video",1200);
      return;
    }

    recorder.ondataavailable=ev=>{
      if(ev.data && ev.data.size>0) chunks.push(ev.data);
    };

    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:"video/webm"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=`noixzy_sdf_raymarch_${seed}_${seconds}s.webm`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      stream.getTracks().forEach(tr=>tr.stop());
      btn.textContent="video";
    };

    recorder.start();

    let remaining=seconds;
    btn.textContent="● " + remaining + "s";

    const iv=setInterval(()=>{
      remaining--;
      if(remaining>0){
        btn.textContent="● " + remaining + "s";
      }else{
        clearInterval(iv);
        btn.textContent="saving…";
        if(recorder.state==="recording") recorder.stop();
      }
    },1000);
  }, true);
}

function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);
  const safeIdx=idx>=0?idx:0;
  const prev=ALL_MODULES[(safeIdx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(safeIdx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev"); if(np){ np.href="../"+prev.id+"/noixzy_"+prev.id+".html"; np.title=prev.title; }
  const nn=document.getElementById("navNext"); if(nn){ nn.href="../"+next.id+"/noixzy_"+next.id+".html"; nn.title=next.title; }

  const rail=document.getElementById("stageThumbs");
  if(rail){
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type=>{
      rail.addEventListener(type,e=>e.stopPropagation(),true);
    });
    if(!rail.dataset.wheelBound){
      rail.dataset.wheelBound="1";
      rail.addEventListener("wheel",e=>{
        e.preventDefault();
        e.stopPropagation();
        const strip=document.getElementById("moduleThumbStrip");
        if(strip) strip.scrollTop += e.deltaY;
      },{capture:true,passive:false});
    }
  }

  const strip=document.getElementById("moduleThumbStrip"); if(!strip) return;
  strip.innerHTML="";
  let railSelected=safeIdx;

  function selectThumb(i){
    const links=[...strip.querySelectorAll(".navThumb")];
    if(!links.length) return;
    railSelected=(i+links.length)%links.length;
    links.forEach(a=>a.classList.remove("selected"));
    links[railSelected].classList.add("selected");
    links[railSelected].scrollIntoView({block:"nearest",inline:"nearest",behavior:"smooth"});
  }

  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a"); a.href="../"+m.id+"/noixzy_"+m.id+".html"; a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    a.onclick=e=>{ e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
    const img=document.createElement("img"); img.src="../home/thumbs/"+m.id+".png"; img.alt=m.title;
    a.appendChild(img); strip.appendChild(a);
  });

  const up=document.getElementById("thumbUp");
  const dn=document.getElementById("thumbDown");
  if(up){ up.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected-1); }; }
  if(dn){ dn.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected+1); }; }

  setTimeout(()=>{ const el=strip.querySelector(".active"); if(el){ el.scrollIntoView({block:"center",inline:"nearest"}); } },50);
}
</script>
