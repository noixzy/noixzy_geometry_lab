<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noixzy parametric shell</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #101010;
      --line: #2d2d2d;
      --text: #e7e2d8;
      --muted: #8f8a82;
      --accent: #c9b27c;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 292px;
      min-height: 100vh;
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.055), transparent 35%),
        linear-gradient(180deg, #0b0b0b 0%, #030303 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    aside {
      border-left: 1px solid var(--line);
      background: rgba(12, 12, 12, .96);
      padding: 14px;
      overflow: auto;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      min-height: 34px;
      border: 1px solid #383838;
      background: #171717;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      text-transform: lowercase;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .seed-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .seed-row span {
      font-size: 11px;
      color: var(--muted);
      text-transform: lowercase;
    }

    input[type="text"] {
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid var(--line);
      color: var(--text);
      font: inherit;
      font-size: 11px;
    }

    .control {
      margin-bottom: 16px;
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .control-head label {
      color: var(--muted);
      text-transform: lowercase;
    }

    .control-head .value {
      color: var(--text);
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      outline: none;
      appearance: none;
    }

    .physics-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 12px;
      padding: 9px 0;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      color: var(--muted);
      font-size: 11px;
      text-transform: lowercase;
    }

    .physics-toggle input { accent-color: var(--accent); }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="view"></canvas>
  </main>

  <aside>
    <h1>noixzy parametric shell</h1>
    <p class="sub">curved concrete shell structures, hyperbolic paraboloids, folded plates, vault systems</p>

    <div class="buttons">
      <button id="randomize">randomize</button>
      <button id="reset">reset</button>
      <button id="play">pause</button>
      <button id="export">export png</button>
    </div>

    <div class="seed-row">
      <span>seed</span>
      <input id="seed" type="text" value="noixzy-shell-001" spellcheck="false">
    </div>
    <div id="controls"></div>
    <label class="physics-toggle"><input id="experimental-physics" type="checkbox"> experimental physics</label>
  </aside>

  <script>
    const defaults = {
      segments: 24,
      curvature: 65,
      twist: 35,
      thickness: 8,
      ribCount: 6,
      ribWeight: 4,
      openings: 18,
      tension: 45,
      rotation: 15
    };

    const controlDefs = [
      ["segments", "segments", 12, 48, 1],
      ["curvature", "curvature", 0, 100, 1],
      ["twist", "twist", 0, 100, 1],
      ["thickness", "thickness", 2, 20, 1],
      ["ribCount", "rib count", 0, 12, 1],
      ["ribWeight", "rib weight", 1, 8, 1],
      ["openings", "openings", 0, 50, 1],
      ["tension", "tension", 0, 100, 1],
      ["rotation", "rotation", -45, 45, 1]
    ];

    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const controls = document.getElementById("controls");
    const seedInput = document.getElementById("seed");
    const playButton = document.getElementById("play");
    const values = {};
    let state = { ...defaults };
    let running = true;
    let frame = 0;
    let width = 1;
    let height = 1;
    let dpr = 1;
    let experimentalPhysics = false;
    function randomBiasFor(label) {
      const k = String(label).toLowerCase();
      if (/palette|material|color|hue/.test(k)) return Math.random();
      if (/density|count|grid|cells|points|nodes|modules|bays|divisions|segments|cracks|repeats/.test(k)) return 0.38 + Math.random() * 0.62;
      if (/extrude|depth|height|stack|layer|relief|bump|displace|amplitude|thickness|width|size|scale|cantilever|perspective|slab|fin|mullion|erosion/.test(k)) return 0.28 + Math.random() * 0.72;
      if (/offset|jitter|noise|field|force|twist|warp|phase|bias|rotation|entropy|feedback|pressure|void|variation|fracture/.test(k)) return 0.12 + Math.random() * 0.76;
      if (/line|stroke|shadow/.test(k)) return 0.18 + Math.random() * 0.62;
      return 0.15 + Math.random() * 0.7;
    }
    function snapToStep(value, min, max, step) {
      const safeStep = Number(step) || 1;
      const snapped = Math.round(value / safeStep) * safeStep;
      return Math.max(Number(min), Math.min(Number(max), Number.isInteger(safeStep) ? Math.round(snapped) : Number(snapped.toFixed(3))));
    }
    function randomizeModuleControls() {
      controlDefs.forEach(([key, label, min, max, step]) => {
        const value = snapToStep(min + (max - min) * randomBiasFor(label || key), min, max, step);
        state[key] = value;
        const input = document.getElementById(key);
        if (input) input.value = value;
        if (values[key]) values[key].textContent = value;
      });
      experimentalPhysics = Math.random() > 0.55;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = experimentalPhysics;
      applyExperimentalPhysics();
    }
    function applyExperimentalPhysics() {
      const dx = experimentalPhysics ? Math.sin(frame * 0.017) * 4.5 : 0;
      const dy = experimentalPhysics ? Math.cos(frame * 0.013) * 3.5 : 0;
      const breathe = experimentalPhysics ? 1 + Math.sin(frame * 0.011) * 0.004 : 1;
      canvas.style.transformOrigin = "50% 50%";
      canvas.style.transform = experimentalPhysics ? `translate3d(${dx}px, ${dy}px, 0) scale(${breathe})` : "";
      canvas.style.filter = experimentalPhysics ? "contrast(1.06) saturate(1.08)" : "";
    }


    function hashString(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function randomSource(seed) {
      let t = hashString(seed) || 1;
      return function random() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function buildControls() {
      controls.innerHTML = "";
      controlDefs.forEach(([key, label, min, max, step]) => {
        const wrap = document.createElement("div");
        wrap.className = "control";
        wrap.innerHTML = `
          <div class="control-head">
            <label for="${key}">${label}</label>
            <span class="value" id="${key}Value">${state[key]}</span>
          </div>
          <input id="${key}" type="range" min="${min}" max="${max}" step="${step}" value="${state[key]}">
        `;
        controls.appendChild(wrap);
        values[key] = wrap.querySelector(".value");
        wrap.querySelector("input").addEventListener("input", event => {
          state[key] = Number(event.target.value);
          values[key].textContent = state[key];
          draw();
        });
      });
    }

    function resizeCanvas() {
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(260, Math.floor(rect.height));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function drawShell() {
      const random = randomSource(`${seedInput.value}|shell`);
      const cx = width * 0.5;
      const cy = height * 0.5;
      const scale = Math.min(width, height) * 0.38;
      const segments = state.segments;
      const curveFactor = state.curvature / 100;
      const twistFactor = state.twist / 100;
      const tensionFactor = state.tension / 100;
      const rotOffset = (state.rotation + Math.sin(frame * 0.008) * (running ? 2 : 0)) * Math.PI / 180;

      // Generate shell surface
      const grid = [];
      for (let v = 0; v <= segments; v++) {
        const row = [];
        for (let u = 0; u <= segments; u++) {
          const pu = (u / segments - 0.5) * 2;
          const pv = (v / segments - 0.5) * 2;
          
          const z = (pu * pu - pv * pv) * curveFactor * 0.6 + 
                    Math.sin(pu * Math.PI * twistFactor) * 0.3 +
                    Math.cos(pv * Math.PI * tensionFactor) * 0.2;
          
          const twist = pv * twistFactor * 0.8;
          const ca = Math.cos(twist + rotOffset);
          const sa = Math.sin(twist + rotOffset);
          
          const x = pu * ca - z * sa * 0.3;
          const y = pv + z * 0.5;
          
          row.push({
            x: cx + x * scale,
            y: cy + y * scale,
            z: z
          });
        }
        grid.push(row);
      }

      // Draw surface quads
      for (let v = 0; v < segments; v++) {
        for (let u = 0; u < segments; u++) {
          const p0 = grid[v][u];
          const p1 = grid[v][u + 1];
          const p2 = grid[v + 1][u + 1];
          const p3 = grid[v + 1][u];
          
          const avgZ = (p0.z + p1.z + p2.z + p3.z) / 4;
          const brightness = clamp(120 + avgZ * 80, 50, 180);
          
          const hasOpening = random() < state.openings / 100;
          
          if (!hasOpening) {
            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.closePath();
            ctx.fillStyle = `rgb(${brightness}, ${brightness - 10}, ${brightness - 15})`;
            ctx.fill();
            
            ctx.strokeStyle = `rgba(40, 38, 35, ${0.4 + avgZ * 0.2})`;
            ctx.lineWidth = state.thickness * 0.15;
            ctx.stroke();
          }
        }
      }

      // Draw structural ribs
      if (state.ribCount > 0) {
        ctx.strokeStyle = "rgba(90, 88, 82, 0.8)";
        ctx.lineWidth = state.ribWeight * 0.5;
        
        for (let i = 0; i < state.ribCount; i++) {
          const ribU = Math.floor(lerp(2, segments - 2, i / state.ribCount));
          ctx.beginPath();
          for (let v = 0; v <= segments; v++) {
            const p = grid[v][ribU];
            if (v === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }
        
        for (let i = 0; i < state.ribCount; i++) {
          const ribV = Math.floor(lerp(2, segments - 2, i / state.ribCount));
          ctx.beginPath();
          for (let u = 0; u <= segments; u++) {
            const p = grid[ribV][u];
            if (u === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }
      }

      // Edge treatment
      ctx.strokeStyle = "rgba(200, 195, 180, 0.6)";
      ctx.lineWidth = state.thickness * 0.3;
      ctx.beginPath();
      for (let u = 0; u <= segments; u++) {
        const p = grid[0][u];
        if (u === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#0f0f0f");
      gradient.addColorStop(1, "#020202");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      drawShell();

      ctx.fillStyle = "rgba(231,226,216,.72)";
      ctx.font = "11px ui-monospace, monospace";
      ctx.fillText(seedInput.value || "seed", 16, height - 18);
    }

    function tick() {
      if (running) {
        frame++;
        applyExperimentalPhysics();
        draw();
      }
      requestAnimationFrame(tick);
    }

    function randomSeed() {
      return `noixzy-shell-${Math.floor(Math.random() * 999999).toString(36)}`;
    }

    function resetAll() {
      experimentalPhysics = false;
      const physics = document.getElementById("experimental-physics");
      if (physics) physics.checked = false;
      applyExperimentalPhysics();
      state = { ...defaults };
      seedInput.value = "noixzy-shell-001";
      controlDefs.forEach(([key]) => {
        const input = document.getElementById(key);
        input.value = state[key];
        values[key].textContent = state[key];
      });
      frame = 0;
      draw();
    }

    function exportPng() {
      draw();
      const link = document.createElement("a");
      link.download = `noixzy_parametric_shell_${seedInput.value || "seed"}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    const physicsToggle = document.getElementById("experimental-physics");
    if (physicsToggle) physicsToggle.addEventListener("change", () => {
      experimentalPhysics = physicsToggle.checked;
      applyExperimentalPhysics();
      draw();
    });

    seedInput.addEventListener("input", draw);
    playButton.addEventListener("click", () => {
      running = !running;
      playButton.textContent = running ? "pause" : "play";
      draw();
    });
    document.getElementById("randomize").addEventListener("click", () => {
      seedInput.value = randomSeed();
      randomizeModuleControls();
      draw();
    });
    document.getElementById("reset").addEventListener("click", resetAll);
    document.getElementById("export").addEventListener("click", exportPng);
    window.addEventListener("resize", resizeCanvas);

    buildControls();
    resizeCanvas();
    tick();
  </script>
</body>
</html>
