<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noixzy delaunay mesh field</title>
<style>
:root{color-scheme:dark;--a:#90b0c8;--t:#e8e1d4;--m:#8c877d}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#030408;color:var(--t);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;grid-template-columns:minmax(0,1fr) 280px}
main{min-width:0;min-height:0;background:#030408}
canvas{display:block;width:100%;height:100%}
aside{border-left:1px solid #2a2a2a;background:#0e0e0e;padding:14px;overflow-y:auto}
h1{margin:0 0 4px;font-size:13px;font-weight:500;text-transform:lowercase}
.sub{color:var(--m);font-size:10px;line-height:1.5;margin-bottom:12px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
button{height:32px;border:1px solid #333;background:#141414;color:var(--t);font:inherit;font-size:10px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:#555}
.row{display:grid;grid-template-columns:44px 1fr;gap:8px;align-items:center;margin-bottom:10px}
.row span{font-size:10px;color:var(--m)}
input[type=text]{width:100%;background:#070707;border:1px solid #2e2e2e;color:var(--t);padding:7px;font:inherit;font-size:10px}
.ctl{border-top:1px solid #1e1e1e;padding:8px 0}
.head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:var(--m)}
.head b{font-weight:400;color:var(--a)}
input[type=range]{width:100%;accent-color:var(--a)}
.note{color:#444;font-size:9px;line-height:1.5;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:8px}
.physics-toggle{display:flex;align-items:center;gap:8px;margin:10px 0 12px;padding:9px 0;border-top:1px solid #222;border-bottom:1px solid #222;color:var(--m);font-size:10px}
.physics-toggle input{accent-color:var(--a)}
</style>
</head>
<body>
<main><canvas id="cv"></canvas></main>
<aside>
  <h1>noixzy delaunay mesh field</h1>
  <p class="sub">delaunay triangulation of a point field — terrain coloring, elevation, wireframe mesh · pairs with voronoi</p>
  <div class="btns">
    <button id="regen">regenerate</button>
    <button id="rnd">randomize</button>
    <button id="rst">reset</button>
    <button id="png">save png</button>
  </div>
  <div class="row"><span>seed</span><input id="seed" value="delaunay-mesh-001" spellcheck="false"></div>
  <div id="ctls"></div>
  <label class="physics-toggle"><input id="experimental-physics" type="checkbox"> experimental physics</label>
  <p class="note">escrow proto · geometry batch · 2026-06-27<br>delaunay: maximizes minimum angle of triangulation; no triangle contains another's circumcircle</p>
</aside>
<script>
const CONTROLS=[
  ["points","point count",12,200,1,68],
  ["jitter","jitter",0,100,1,54],
  ["elevation","elevation range",0,100,1,72],
  ["edge_w","edge weight",1,5,1,1],
  ["fill_mode","fill mode",0,2,1,1],
  ["animate","drift speed",0,100,1,0],
  ["palette","palette",0,3,1,3]
];

const PALETTES=[
  {lo:[8,14,24],hi:[80,140,200],edge:"rgba(100,160,210,"},
  {lo:[20,12,8],hi:[180,120,60],edge:"rgba(200,140,80,"},
  {lo:[12,20,12],hi:[80,160,80],edge:"rgba(100,180,100,"},
  {lo:[16,14,20],hi:[100,80,140],edge:"rgba(140,120,180,"}
];

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mkRng(seed){let t=hash(seed)||1;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296;};}

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const ctlsEl=document.getElementById("ctls");
const seedEl=document.getElementById("seed");
const S={};
CONTROLS.forEach(([k,,,,v])=>S[k]=v);
let W=1,H=1,dpr=1,frame=0,running=true,experimentalPhysics=false;
let pts=[],tris=[],elevations=[];

// Simple Bowyer-Watson Delaunay triangulation
function delaunay(points){
  const n=points.length;
  // super-triangle
  const M=1e6;
  const st=[[M*3,0],[0,-M*3],[0,M*3]];
  const allPts=[...points,...st];
  let triangles=[[n,n+1,n+2]];
  for(let i=0;i<n;i++){
    const p=allPts[i];
    const bad=[];const edges=[];
    triangles.forEach(t=>{
      const[a,b,c]=[allPts[t[0]],allPts[t[1]],allPts[t[2]]];
      const ax=a[0]-p[0],ay=a[1]-p[1];
      const bx=b[0]-p[0],by=b[1]-p[1];
      const cx=c[0]-p[0],cy=c[1]-p[1];
      const D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
      if(Math.abs(D)<1e-10){bad.push(t);return;}
      const ux=(ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by);
      const uy=(ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax);
      const oux=ux/D+p[0],ouy=uy/D+p[1];
      const r2=(a[0]-oux)**2+(a[1]-ouy)**2;
      if((p[0]-oux)**2+(p[1]-ouy)**2<r2)bad.push(t);
    });
    bad.forEach(t=>{
      [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]].forEach(e=>{
        const dup=edges.some(f=>(f[0]===e[0]&&f[1]===e[1])||(f[0]===e[1]&&f[1]===e[0]));
        if(dup)edges.splice(edges.findIndex(f=>(f[0]===e[0]&&f[1]===e[1])||(f[0]===e[1]&&f[1]===e[0])),1);
        else edges.push(e);
      });
    });
    triangles=triangles.filter(t=>!bad.includes(t));
    edges.forEach(e=>triangles.push([e[0],e[1],i]));
  }
  // remove triangles touching super-triangle
  return triangles.filter(t=>!t.some(v=>v>=n)).map(t=>[allPts[t[0]],allPts[t[1]],allPts[t[2]]]);
}

function build(){
  const rng=mkRng(seedEl.value);
  const count=Math.floor(S.points);
  const jit=S.jitter/100;
  pts=[];
  const grid=Math.ceil(Math.sqrt(count));
  for(let i=0;i<count;i++){
    const gx=(i%grid)/grid,gy=Math.floor(i/grid)/grid;
    pts.push([
      (gx+(rng()-0.5)*jit)*W*0.9+W*0.05,
      (gy+(rng()-0.5)*jit)*H*0.9+H*0.05
    ]);
  }
  tris=delaunay(pts);
  elevations=pts.map(p=>{
    const nx=p[0]/W,ny=p[1]/H;
    // procedural elevation: noise-like
    return Math.sin(nx*Math.PI*3+0.7)*Math.cos(ny*Math.PI*2+1.3)*0.5+0.5;
  });
}

function triElevation(tri){
  const ae=elevations[pts.indexOf(tri[0])]??0.5;
  const be=elevations[pts.indexOf(tri[1])]??0.5;
  const ce=elevations[pts.indexOf(tri[2])]??0.5;
  return (ae+be+ce)/3;
}

function render(){
  const pal=PALETTES[Math.min(Math.floor(S.palette),3)];
  const fillMode=Math.floor(S.fill_mode);
  const ew=S.edge_w;
  const elevScale=S.elevation/100;
  ctx.fillStyle="#030408";
  ctx.fillRect(0,0,W,H);
  tris.forEach(tri=>{
    const e=triElevation(tri);
    const norm=Math.max(0,Math.min(1,e*elevScale+(1-elevScale)*0.5));
    const r=pal.lo[0]*(1-norm)+pal.hi[0]*norm;
    const g=pal.lo[1]*(1-norm)+pal.hi[1]*norm;
    const b=pal.lo[2]*(1-norm)+pal.hi[2]*norm;
    ctx.beginPath();
    ctx.moveTo(tri[0][0],tri[0][1]);
    ctx.lineTo(tri[1][0],tri[1][1]);
    ctx.lineTo(tri[2][0],tri[2][1]);
    ctx.closePath();
    if(fillMode===0){
      ctx.fillStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},0.88)`;
      ctx.fill();
    } else if(fillMode===1){
      ctx.fillStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},0.72)`;
      ctx.fill();
      ctx.strokeStyle=pal.edge+"0.4)";
      ctx.lineWidth=ew;
      ctx.stroke();
    } else {
      ctx.strokeStyle=pal.edge+(0.3+norm*0.5)+")";
      ctx.lineWidth=ew*(0.5+norm*0.5);
      ctx.stroke();
    }
  });
  // draw points
  pts.forEach((p,i)=>{
    const e=elevations[i]??0.5;
    ctx.beginPath();ctx.arc(p[0],p[1],1.5,0,Math.PI*2);
    ctx.fillStyle=pal.edge+"0.8)";ctx.fill();
  });
}

function draw(){
  if(!running){requestAnimationFrame(draw);return;}
  if(S.animate>0){
    const spd=S.animate*0.0003;
    pts.forEach((p,i)=>{p[0]+=Math.sin(frame*spd+i*0.7)*0.3;p[1]+=Math.cos(frame*spd+i*0.9)*0.3;});
    tris=delaunay(pts);
  }
  render();
  if(experimentalPhysics){
    cv.style.transform=`translate3d(${Math.sin(frame*0.017)*3}px,${Math.cos(frame*0.013)*2}px,0)`;
    cv.style.filter="contrast(1.06)";
  } else {cv.style.transform="";cv.style.filter="";}
  frame++;requestAnimationFrame(draw);
}

function buildCtls(){
  ctlsEl.innerHTML="";
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const d=document.createElement("div");d.className="ctl";
    d.innerHTML=`<div class="head"><span>${label}</span><b>${S[k]}</b></div><input type="range" min="${mn}" max="${mx}" step="${st}" value="${S[k]}">`;
    d.querySelector("input").addEventListener("input",e=>{S[k]=+e.target.value;d.querySelector("b").textContent=S[k];});
    ctlsEl.appendChild(d);
  });
}

function randomize(){
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const bias=/points/.test(k)?0.3+Math.random()*0.5:0.1+Math.random()*0.8;
    S[k]=Math.round((mn+(mx-mn)*bias)/st)*st;
  });
  buildCtls();build();
}

function resize(){
  dpr=window.devicePixelRatio||1;
  const rect=cv.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.scale(dpr,dpr);
  build();
}

document.getElementById("regen").addEventListener("click",build);
document.getElementById("rnd").addEventListener("click",randomize);
document.getElementById("rst").addEventListener("click",()=>{CONTROLS.forEach(([k,,,,v])=>S[k]=v);buildCtls();build();});
document.getElementById("png").addEventListener("click",()=>{const a=document.createElement("a");a.download="noixzy_delaunay_mesh.png";a.href=cv.toDataURL();a.click();});
document.getElementById("experimental-physics").addEventListener("change",e=>{experimentalPhysics=e.target.checked;});
seedEl.addEventListener("change",build);
window.addEventListener("resize",resize);
buildCtls();resize();draw();
</script>
</body>
</html>
