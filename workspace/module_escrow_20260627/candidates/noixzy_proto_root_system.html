<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noixzy root system</title>
<style>
:root{color-scheme:dark;--a:#a0b892;--t:#e8e1d4;--m:#8c877d}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#040302;color:var(--t);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;grid-template-columns:minmax(0,1fr) 280px}
main{min-width:0;min-height:0;background:#040302}
canvas{display:block;width:100%;height:100%}
aside{border-left:1px solid #2a2a2a;background:#0e0e0e;padding:14px;overflow-y:auto}
h1{margin:0 0 4px;font-size:13px;font-weight:500;text-transform:lowercase}
.sub{color:var(--m);font-size:10px;line-height:1.5;margin-bottom:12px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
button{height:32px;border:1px solid #333;background:#141414;color:var(--t);font:inherit;font-size:10px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:#555}
.row{display:grid;grid-template-columns:44px 1fr;gap:8px;align-items:center;margin-bottom:10px}
.row span{font-size:10px;color:var(--m)}
input[type=text]{width:100%;background:#070707;border:1px solid #2e2e2e;color:var(--t);padding:7px;font:inherit;font-size:10px}
.ctl{border-top:1px solid #1e1e1e;padding:8px 0}
.head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:var(--m)}
.head b{font-weight:400;color:var(--a)}
input[type=range]{width:100%;accent-color:var(--a)}
.note{color:#444;font-size:9px;line-height:1.5;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:8px}
.physics-toggle{display:flex;align-items:center;gap:8px;margin:10px 0 12px;padding:9px 0;border-top:1px solid #222;border-bottom:1px solid #222;color:var(--m);font-size:10px}
.physics-toggle input{accent-color:var(--a)}
</style>
</head>
<body>
<main><canvas id="cv"></canvas></main>
<aside>
  <h1>noixzy root system</h1>
  <p class="sub">fractal root system with depth tapering, gravitropism, and soil horizon layering — mycelium · tree roots · vascular networks</p>
  <div class="btns">
    <button id="grow">regrow</button>
    <button id="rnd">randomize</button>
    <button id="rst">reset</button>
    <button id="png">save png</button>
  </div>
  <div class="row"><span>seed</span><input id="seed" value="root-system-001" spellcheck="false"></div>
  <div id="ctls"></div>
  <label class="physics-toggle"><input id="experimental-physics" type="checkbox"> experimental physics</label>
  <p class="note">escrow proto · organic batch · 2026-06-27<br>fractal branching with tropism, tapering, and layered soil depth coloring</p>
</aside>
<script>
const CONTROLS=[
  ["branches","root branches",2,7,1,4],
  ["depth","depth",2,10,1,8],
  ["taper","taper rate",0,100,1,64],
  ["angle_var","angle variance",0,100,1,58],
  ["tropism","gravitropism",0,100,1,42],
  ["soil_layers","soil layers",1,6,1,3],
  ["palette","palette",0,3,1,1]
];

const PALETTES=[
  // earth tones
  [[40,28,18],[70,48,28],[100,72,40],[140,108,70],[180,148,110]],
  // dark soil / mycelium
  [[16,12,10],[36,28,20],[68,54,38],[110,90,68],[160,140,110]],
  // mineral blue-grey
  [[12,14,20],[28,32,44],[54,60,80],[90,100,124],[140,150,170]],
  // forest green
  [[10,16,8],[22,36,14],[44,72,24],[80,120,48],[130,170,90]]
];

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mkRng(seed){let t=hash(seed)||1;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296;};}

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const ctlsEl=document.getElementById("ctls");
const seedEl=document.getElementById("seed");
const S={};
CONTROLS.forEach(([k,,,,v])=>S[k]=v);
let W=1,H=1,dpr=1,frame=0,experimentalPhysics=false;

function resize(){
  dpr=window.devicePixelRatio||1;
  const rect=cv.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.scale(dpr,dpr);
  grow();
}

function grow(){
  const pal=PALETTES[Math.min(Math.floor(S.palette),3)];
  ctx.fillStyle="#040302";
  ctx.fillRect(0,0,W,H);

  // soil horizon gradient
  const layers=Math.floor(S.soil_layers);
  for(let l=0;l<layers;l++){
    const y0=H*(0.05+l/layers*0.85);
    const y1=H*(0.05+(l+1)/layers*0.85);
    const pi=Math.min(l,pal.length-1);
    const grad=ctx.createLinearGradient(0,y0,0,y1);
    grad.addColorStop(0,`rgba(${pal[pi]},0.04)`);
    grad.addColorStop(1,`rgba(${pal[Math.min(pi+1,pal.length-1)]},0.04)`);
    ctx.fillStyle=grad;
    ctx.fillRect(0,y0,W,y1-y0);
  }

  const rng=mkRng(seedEl.value);
  const taper=S.taper/100;
  const angleVar=S.angle_var/100;
  const tropism=S.tropism/100;
  const maxDepth=Math.floor(S.depth);
  const numBranches=Math.floor(S.branches);

  // root trunks spread from top center
  for(let t=0;t<3+Math.floor(rng()*3);t++){
    const sx=W*0.3+rng()*W*0.4;
    const sy=H*0.05;
    branch(rng,sx,sy,Math.PI/2+(rng()-0.5)*0.4,maxDepth,W*0.012,numBranches,taper,angleVar,tropism,pal);
  }
}

function branch(rng,x,y,angle,depth,weight,numBranches,taper,angleVar,tropism,pal){
  if(depth<=0||weight<0.3)return;
  const len=H*(0.04+depth*0.012)*( 0.7+rng()*0.6);
  const nx=x+Math.cos(angle)*len;
  const ny=y+Math.sin(angle)*len;
  // color by depth (soil layer)
  const depthFrac=ny/H;
  const pi=Math.min(Math.floor(depthFrac*(pal.length-1)),pal.length-1);
  const col=pal[pi];
  const alpha=0.55+depth*0.04;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(nx,ny);
  ctx.strokeStyle=`rgba(${col},${alpha})`;
  ctx.lineWidth=weight;
  ctx.lineCap="round";
  ctx.stroke();
  // recurse
  for(let b=0;b<numBranches;b++){
    if(rng()>0.6+depth*0.04)continue;
    const spread=(2*Math.PI/numBranches)*b+(rng()-0.5)*angleVar*1.2;
    let childAngle=angle+spread*(0.4+rng()*0.5);
    // gravitropism: bias downward (toward PI/2)
    childAngle+=(Math.PI/2-childAngle)*tropism*0.12;
    branch(rng,nx,ny,childAngle,depth-1,weight*(1-taper*0.08),numBranches,taper,angleVar,tropism,pal);
  }
}

function buildCtls(){
  ctlsEl.innerHTML="";
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const d=document.createElement("div");d.className="ctl";
    d.innerHTML=`<div class="head"><span>${label}</span><b>${S[k]}</b></div><input type="range" min="${mn}" max="${mx}" step="${st}" value="${S[k]}">`;
    d.querySelector("input").addEventListener("input",e=>{S[k]=+e.target.value;d.querySelector("b").textContent=S[k];});
    ctlsEl.appendChild(d);
  });
}

function randomBiasFor(k){
  if(/depth/.test(k))return 0.4+Math.random()*0.5;
  if(/branches/.test(k))return 0.3+Math.random()*0.5;
  return 0.1+Math.random()*0.8;
}

function randomize(){
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    S[k]=Math.round((mn+(mx-mn)*randomBiasFor(k))/st)*st;
  });
  buildCtls();grow();
}

let animFrame;
function animate(){
  if(experimentalPhysics){
    cv.style.transform=`translate3d(${Math.sin(frame*0.017)*2}px,${Math.cos(frame*0.013)*1.5}px,0)`;
    frame++;
    animFrame=requestAnimationFrame(animate);
  } else {
    cv.style.transform="";cv.style.filter="";
    cancelAnimationFrame(animFrame);
  }
}

document.getElementById("grow").addEventListener("click",grow);
document.getElementById("rnd").addEventListener("click",randomize);
document.getElementById("rst").addEventListener("click",()=>{CONTROLS.forEach(([k,,,,v])=>S[k]=v);buildCtls();grow();});
document.getElementById("png").addEventListener("click",()=>{const a=document.createElement("a");a.download="noixzy_root_system.png";a.href=cv.toDataURL();a.click();});
document.getElementById("experimental-physics").addEventListener("change",e=>{
  experimentalPhysics=e.target.checked;
  if(experimentalPhysics)animate();
});
seedEl.addEventListener("change",grow);
window.addEventListener("resize",resize);
buildCtls();resize();
</script>
</body>
</html>
