<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noixzy sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --accent-primary: #00ffff;
      --accent-secondary: #00aaff;
      --base: #030912;
      --surface: rgba(5, 15, 30, 0.6);
      --ghost-weak: rgba(255, 255, 255, 0.15);
      --ghost: rgba(255, 255, 255, 0.24);
      --ghost-strong: rgba(255, 255, 255, 0.3);
      --panel-border: rgba(0, 255, 255, 0.4);
      --text: rgba(236, 255, 255, 0.94);
      --muted: rgba(236, 255, 255, 0.58);
      --danger: #ff6f8d;
      --font-ui: "DM Sans", Inter, ui-sans-serif, system-ui, sans-serif;
      --font-data: "DM Mono", "Fira Code", ui-monospace, monospace;
    }

    body[data-theme="void"] {
      --accent-primary: #e8ffe8;
      --accent-secondary: #ffffff;
      --base: #000000;
      --surface: rgba(0, 0, 0, 0.8);
      --panel-border: rgba(232, 255, 232, 0.42);
      --text: rgba(245, 255, 245, 0.95);
      --muted: rgba(245, 255, 245, 0.55);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--base);
      color: var(--text);
      font-family: var(--font-ui);
    }

    body {
      display: grid;
      grid-template-columns: minmax(270px, 22vw) minmax(0, 1fr);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    body::before {
      content:
        "Δ 03:09:12  SIG/NULL  Ψ  TRACE  ◇  00FFFF  //  VECTOR  ▱  COLD\\A"
        "λ sandbox  FIELD  0xC0DE  ⌁  GRID  +  PHASE  ∴  INDEX  0110\\A"
        "Ξ carrier  ▵  HUSH  //  checksum  Ω  drift  001101  ⟡  pass\\A"
        "SYNC  ·  glyph_field  ·  ▽  module  ·  sandbox  ·  AWAIT  ·  ◌\\A"
        "0A FF 09 12  //  CANDIDATE  //  ▣  ▦  ▫  SIGNAL  ▰  77";
      color: var(--accent-primary);
      font-family: var(--font-data);
      font-size: 13px;
      line-height: 2.2;
      letter-spacing: 0.16em;
      white-space: pre;
      opacity: 0.05;
      width: 180vw;
      height: 180vh;
      transform: translate3d(-8vw, -8vh, 0);
      animation: glyphDrift 54s linear infinite, glyphCycle 18s steps(1, end) infinite;
    }

    body::after {
      opacity: 0.045;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.22) 0,
          rgba(255, 255, 255, 0.22) 1px,
          transparent 1px,
          transparent 4px
        );
      mix-blend-mode: screen;
    }

    @keyframes glyphDrift {
      0% { transform: translate3d(-8vw, -8vh, 0); }
      50% { transform: translate3d(-2vw, -15vh, 0); }
      100% { transform: translate3d(-8vw, -8vh, 0); }
    }

    @keyframes glyphCycle {
      0%, 100% { content:
        "Δ 03:09:12  SIG/NULL  Ψ  TRACE  ◇  00FFFF  //  VECTOR  ▱  COLD\\A"
        "λ sandbox  FIELD  0xC0DE  ⌁  GRID  +  PHASE  ∴  INDEX  0110\\A"
        "Ξ carrier  ▵  HUSH  //  checksum  Ω  drift  001101  ⟡  pass\\A"
        "SYNC  ·  glyph_field  ·  ▽  module  ·  sandbox  ·  AWAIT  ·  ◌\\A"
        "0A FF 09 12  //  CANDIDATE  //  ▣  ▦  ▫  SIGNAL  ▰  77"; }
      33% { content:
        "◇ COLD SIGNAL ◇  00:AA:FF  //  ECHO  ⌬  INDEX  ◢  SCAN\\A"
        "root/sandbox/candidates ▱  HOLD  ∆  phase-lock  1001  ▽\\A"
        "NULL  NULL  VECTOR  ▫  ▫  TRACE  Ξ  module frame  λ λ λ\\A"
        "checksum  //  frost  //  carrier  //  0x00ffff  //  ◌\\A"
        "SANDBOX ▦ sandbox ▦ sandbox ▦ GLYPH FIELD ▦ sandbox"; }
      66% { content:
        "VOID ALT READY  ◌  lightline  e8ffe8  ◌  coldline  00ffff\\A"
        "⟡ receiver  ⟡  candidate  ⟡  iframe  ⟡  reload  ⟡  open\\A"
        "011011  001001  111000  030912  00AAFF  //  TRACE\\A"
        "Ψ Ψ Ψ    noixzy sandbox    Δ Δ Δ    frost panel    λ λ λ\\A"
        "SIGNAL BELOW THRESHOLD  //  DRIFT  //  HOLD  //  GLASS"; }
    }

    @keyframes panelBoot {
      0% { opacity: 0; filter: brightness(2.4); }
      12% { opacity: 0.2; }
      24% { opacity: 0.86; }
      38% { opacity: 0.35; }
      52% { opacity: 1; }
      66% { opacity: 0.62; }
      80% { opacity: 0.92; }
      100% { opacity: 1; filter: brightness(1); }
    }

    aside {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      margin: 12px 0 12px 12px;
      border: 1px solid var(--panel-border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      animation: panelBoot 80ms steps(6, end) both;
    }

    header {
      position: relative;
      padding: 14px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--accent-primary);
      font-family: var(--font-ui);
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      font-family: var(--font-data);
    }

    .tools {
      position: relative;
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }

    input[type="search"] {
      width: 100%;
      border: 1px solid var(--ghost);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 9px 10px;
      font: 400 12px/1.2 var(--font-data);
      font-size: 12px;
      outline: 0;
      border-radius: 0;
    }

    input[type="search"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.16);
    }

    input[type="search"]::placeholder {
      color: rgba(236, 255, 255, 0.42);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    a.button,
    button {
      min-height: 32px;
      border: 1px solid var(--ghost);
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      display: inline-grid;
      place-items: center;
      padding: 0 10px;
      font: 500 11px/1 var(--font-data);
      font-size: 11px;
      text-decoration: none;
      text-transform: lowercase;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    a.button:hover,
    button:hover,
    button:focus-visible,
    a.button:focus-visible {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: rgba(0, 255, 255, 0.07);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.16);
      outline: 0;
    }

    .list {
      position: relative;
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .list::-webkit-scrollbar {
      width: 8px;
    }

    .list::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 255, 0.22);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .candidate {
      width: 100%;
      min-height: 34px;
      border: 0;
      border-left: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      justify-content: start;
      place-items: center start;
      text-align: left;
      padding: 6px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .candidate:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: var(--ghost-strong);
    }

    .candidate.active {
      background: rgba(0, 255, 255, 0.08);
      color: var(--text);
      border-color: var(--accent-primary);
      box-shadow: inset 12px 0 24px rgba(0, 255, 255, 0.08);
    }

    main {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: transparent;
    }

    .preview-head {
      position: relative;
      min-width: 0;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 12px 0 12px;
      padding: 10px 14px;
      border: 1px solid var(--panel-border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: panelBoot 80ms steps(6, end) 25ms both;
    }

    .selected {
      min-width: 0;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text);
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
      font-family: var(--font-data);
    }

    .preview-actions {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
    }

    #themeToggle {
      min-width: 54px;
      color: var(--accent-secondary);
    }

    iframe {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--base);
    }

    .empty {
      padding: 18px 14px;
      color: var(--danger);
      font-size: 12px;
      line-height: 1.5;
      font-family: var(--font-data);
    }

    aside::before,
    aside::after,
    .preview-head::before,
    .preview-head::after,
    header::before,
    header::after,
    .tools::before,
    .tools::after,
    .list::before,
    .list::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 11px;
      pointer-events: none;
      opacity: 0.9;
    }

    aside::before,
    .preview-head::before,
    header::before,
    .tools::before,
    .list::before {
      top: 0;
      left: 0;
      border-top: 1px solid var(--accent-primary);
      border-left: 1px solid var(--accent-primary);
      box-shadow: calc(100% - 11px) 0 0 -10px var(--accent-primary);
    }

    aside::after,
    .preview-head::after,
    header::after,
    .tools::after,
    .list::after {
      right: 0;
      bottom: 0;
      border-right: 1px solid var(--accent-primary);
      border-bottom: 1px solid var(--accent-primary);
    }

    header,
    .tools,
    .list {
      background:
        linear-gradient(to right, transparent, rgba(0, 255, 255, 0.26), transparent) bottom / 100% 1px no-repeat,
        linear-gradient(to right, transparent calc(50% - 5px), var(--accent-primary) calc(50% - 5px), var(--accent-primary) calc(50% + 5px), transparent calc(50% + 5px)) bottom / 100% 5px no-repeat;
    }

    .preview-head {
      background:
        linear-gradient(to right, transparent, rgba(0, 255, 255, 0.26), transparent) bottom / 100% 1px no-repeat,
        linear-gradient(to right, transparent calc(50% - 5px), var(--accent-primary) calc(50% - 5px), var(--accent-primary) calc(50% + 5px), transparent calc(50% + 5px)) bottom / 100% 5px no-repeat,
        var(--surface);
    }

    aside::before,
    .preview-head::before,
    header::before,
    .tools::before,
    .list::before {
      inset: 0;
      width: auto;
      height: auto;
      border: 0;
      box-shadow: none;
      background:
        linear-gradient(var(--accent-primary), var(--accent-primary)) left top / 11px 1px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) left top / 1px 11px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) right top / 11px 1px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) right top / 1px 11px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) left bottom / 11px 1px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) left bottom / 1px 11px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) right bottom / 11px 1px no-repeat,
        linear-gradient(var(--accent-primary), var(--accent-primary)) right bottom / 1px 11px no-repeat;
    }

    aside::after,
    .preview-head::after,
    header::after,
    .tools::after,
    .list::after {
      display: none;
    }

    @media (max-width: 820px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh minmax(0, 1fr);
      }

      aside {
        margin: 8px;
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }

      .preview-head {
        margin: 0 8px;
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <aside>
    <header>
      <h1>noixzy sandbox</h1>
      <div class="meta"><span id="count">0</span> candidates</div>
    </header>
    <div class="tools">
      <input id="filter" type="search" placeholder="filter candidates" spellcheck="false">
      <div class="actions">
        <a class="button" href="../../home/home.html">home</a>
        <a class="button" href="candidates/">directory</a>
      </div>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main>
    <div class="preview-head">
      <div class="selected">
        <div class="name" id="selectedName">loading</div>
        <div class="path" id="selectedPath">candidates/</div>
      </div>
      <div class="preview-actions">
        <button id="themeToggle" type="button" aria-pressed="false">void</button>
        <a class="button" id="openLink" href="candidates/" target="_blank" rel="noopener">open</a>
        <button id="reload" type="button">reload</button>
      </div>
    </div>
    <iframe id="preview" title="noixzy sandbox candidate preview"></iframe>
  </main>

  <script>
    const directoryUrl = "candidates/";
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const filterEl = document.getElementById("filter");
    const frame = document.getElementById("preview");
    const selectedName = document.getElementById("selectedName");
    const selectedPath = document.getElementById("selectedPath");
    const openLink = document.getElementById("openLink");
    const reload = document.getElementById("reload");
    const themeToggle = document.getElementById("themeToggle");

    let candidates = [];
    let selected = null;

    function labelFromFile(file) {
      return file.replace(/^noixzy_/, "").replace(/\.html$/, "").replaceAll("_", " ");
    }

    function normalizeHref(href) {
      const url = new URL(href, location.href);
      return `${directoryUrl}${url.pathname.split("/").pop()}`;
    }

    function selectCandidate(candidate, updateHash = true) {
      selected = candidate;
      selectedName.textContent = labelFromFile(candidate.file);
      selectedPath.textContent = candidate.href;
      openLink.href = candidate.href;
      frame.src = candidate.href;
      if (updateHash) history.replaceState(null, "", `#${candidate.file}`);
      renderList();
    }

    function renderList() {
      const q = filterEl.value.trim().toLowerCase();
      const visible = candidates.filter(item => {
        return item.file.toLowerCase().includes(q) || labelFromFile(item.file).includes(q);
      });
      listEl.innerHTML = "";
      if (!visible.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no matching candidates";
        listEl.appendChild(empty);
        return;
      }
      const frag = document.createDocumentFragment();
      visible.forEach(candidate => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `candidate${selected && selected.file === candidate.file ? " active" : ""}`;
        button.textContent = labelFromFile(candidate.file);
        button.title = candidate.file;
        button.addEventListener("click", () => selectCandidate(candidate));
        frag.appendChild(button);
      });
      listEl.appendChild(frag);
    }

    async function loadCandidates() {
      try {
        const response = await fetch(directoryUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`directory ${response.status}`);
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        candidates = [...doc.querySelectorAll("a")]
          .map(a => {
            const href = a.getAttribute("href") || "";
            const file = decodeURIComponent(href.split("/").pop() || "");
            return { file, href: normalizeHref(href) };
          })
          .filter(item => /^noixzy_.*\.html$/.test(item.file))
          .sort((a, b) => a.file.localeCompare(b.file));

        countEl.textContent = String(candidates.length);
        const hashFile = decodeURIComponent(location.hash.replace(/^#/, ""));
        const initial = candidates.find(item => item.file === hashFile) || candidates[0];
        if (initial) selectCandidate(initial, false);
        else {
          selectedName.textContent = "empty";
          selectedPath.textContent = directoryUrl;
          renderList();
        }
      } catch (error) {
        selectedName.textContent = "directory unavailable";
        selectedPath.textContent = String(error.message || error);
        listEl.innerHTML = '<div class="empty">unable to load candidates</div>';
      }
    }

    filterEl.addEventListener("input", renderList);
    reload.addEventListener("click", () => {
      if (selected) frame.src = selected.href;
    });
    themeToggle.addEventListener("click", () => {
      const isVoid = document.body.dataset.theme === "void";
      document.body.dataset.theme = isVoid ? "cold" : "void";
      themeToggle.setAttribute("aria-pressed", String(!isVoid));
      themeToggle.textContent = isVoid ? "void" : "cold";
    });
    window.addEventListener("hashchange", () => {
      const hashFile = decodeURIComponent(location.hash.replace(/^#/, ""));
      const next = candidates.find(item => item.file === hashFile);
      if (next) selectCandidate(next, false);
    });

    loadCandidates();
  </script>
</body>
</html>
