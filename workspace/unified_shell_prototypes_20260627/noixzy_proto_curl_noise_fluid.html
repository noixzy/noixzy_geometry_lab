<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noixzy curl noise fluid — prototype</title>
<style>
:root{color-scheme:dark;--a:#8ab4c8;--t:#e8e1d4;--m:#8c877d}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#050505;color:var(--t);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;grid-template-columns:minmax(0,1fr) 280px}
main{min-width:0;min-height:0;background:#060606}
canvas{display:block;width:100%;height:100%}
aside{border-left:1px solid #2a2a2a;background:#0e0e0e;padding:14px;overflow-y:auto}
h1{margin:0 0 4px;font-size:13px;font-weight:500;text-transform:lowercase;color:var(--t)}
.sub{color:var(--m);font-size:10px;line-height:1.5;margin-bottom:12px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
button{height:32px;border:1px solid #333;background:#141414;color:var(--t);font:inherit;font-size:10px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:#555;background:#1a1a1a}
.row{display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center;margin-bottom:10px}
.row span{font-size:10px;color:var(--m)}
input[type=text]{width:100%;background:#070707;border:1px solid #2e2e2e;color:var(--t);padding:7px;font:inherit;font-size:10px}
.ctl{border-top:1px solid #1e1e1e;padding:8px 0}
.head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:var(--m)}
.head b{font-weight:400;color:var(--a)}
input[type=range]{width:100%;accent-color:var(--a)}
.note{color:#555;font-size:9px;line-height:1.5;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:8px}
@media(max-width:760px){body{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) 300px}aside{border-left:0;border-top:1px solid #2a2a2a}}
</style>
</head>
<body>
<main><canvas id="cv"></canvas></main>
<aside>
  <h1>noixzy curl noise fluid</h1>
  <p class="sub">curl-noise vector field driving particle streamlines as liquid-metal ribbons</p>
  <div class="btns">
    <button id="play">pause</button>
    <button id="rnd">randomize</button>
    <button id="rst">reset</button>
    <button id="png">save png</button>
  </div>
  <div class="row"><span>seed</span><input id="seed" value="curl-fluid-001" spellcheck="false"></div>
  <div id="ctls"></div>
  <p class="note">proto — unified shell candidate · 2026-06-27 · not in production</p>
</aside>
<script>
const CONTROLS = [
  ["turbulence","turbulence",0,100,1,62],
  ["viscosity","viscosity",0,100,1,38],
  ["ribbons","ribbon count",20,600,1,260],
  ["fade","fade length",4,80,1,34],
  ["speed","speed",0,100,1,44],
  ["scale","field scale",4,80,1,28],
  ["weight","line weight",1,6,1,2],
  ["palette","palette",0,4,1,1]
];

const PALETTES = [
  ["#8ab4c8","#b0ccd8","#4a7a92"],
  ["#c8a87a","#e0c89a","#7a5a2a"],
  ["#a8c492","#c4e2b0","#4a7a3a"],
  ["#c8a0b8","#e0b8d0","#7a4a6a"],
  ["#d0d0c8","#f0f0e8","#808078"]
];

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mkRng(seed){let t=hash(seed)||1;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296;};}

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const ctlsEl=document.getElementById("ctls");
const seedEl=document.getElementById("seed");

const S={};
CONTROLS.forEach(([k,,,,v])=>S[k]=v);

let W=1,H=1,dpr=1,frame=0,running=true;
let particles=[];
const N_NOISE=4;

function noise2(x,y,seed){
  let v=0,amp=1,sc=1,tot=0;
  for(let i=0;i<N_NOISE;i++){
    const px=x*sc*0.003,py=y*sc*0.003;
    v+=amp*(Math.sin(px*3.1+py*1.7+seed*0.37+i*2.1)*Math.cos(py*2.3-px*1.1+seed*0.55+i*1.7));
    tot+=amp;amp*=0.5;sc*=2.1;
  }
  return v/tot;
}

function curlField(x,y,t,turb,scale){
  const e=0.8;
  const s=scale*0.01;
  const n1=noise2(x+e,y,t*0.3+turb*0.02);
  const n2=noise2(x-e,y,t*0.3+turb*0.02);
  const n3=noise2(x,y+e,t*0.3+turb*0.02+10);
  const n4=noise2(x,y-e,t*0.3+turb*0.02+10);
  return {fx:(n3-n4)/(2*e)*s*50,fy:-(n1-n2)/(2*e)*s*50};
}

function resize(){
  dpr=window.devicePixelRatio||1;
  const rect=cv.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.scale(dpr,dpr);
  init();
}

function init(){
  const rng=mkRng(seedEl.value);
  const count=Math.round(S.ribbons);
  particles=[];
  for(let i=0;i<count;i++){
    particles.push({x:rng()*W,y:rng()*H,life:20+rng()*60,maxLife:0,age:0});
    particles[i].maxLife=particles[i].life;
  }
  ctx.fillStyle="#050505";
  ctx.fillRect(0,0,W,H);
}

function draw(){
  if(!running){requestAnimationFrame(draw);return;}
  const pal=PALETTES[Math.min(S.palette,PALETTES.length-1)];
  const turb=S.turbulence;
  const visc=1-S.viscosity*0.009;
  const fade=S.fade;
  const spd=S.speed*0.004+0.01;
  const weight=S.weight;
  const scale=S.scale;

  ctx.fillStyle=`rgba(5,5,5,${0.012+fade*0.001})`;
  ctx.fillRect(0,0,W,H);

  particles.forEach(p=>{
    const {fx,fy}=curlField(p.x,p.y,frame,turb,scale);
    const vx=fx*spd;
    const vy=fy*spd;
    const nx=p.x+vx;
    const ny=p.y+vy;
    const t=1-p.age/p.maxLife;
    const alpha=t*t*(3-2*t)*0.8;
    const ci=Math.floor(t*2)%pal.length;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(nx,ny);
    ctx.strokeStyle=pal[ci]+Math.round(alpha*255).toString(16).padStart(2,"0");
    ctx.lineWidth=weight*(0.5+t*0.5);
    ctx.stroke();
    p.x=nx;p.y=ny;p.age++;
    if(p.age>p.maxLife||p.x<0||p.x>W||p.y<0||p.y>H){
      const rng=mkRng(seedEl.value+frame+Math.random());
      p.x=rng()*W;p.y=rng()*H;p.age=0;p.life=20+rng()*60;p.maxLife=p.life;
    }
  });
  frame++;
  requestAnimationFrame(draw);
}

function buildCtls(){
  ctlsEl.innerHTML="";
  CONTROLS.forEach(([k,label,mn,mx,st,def])=>{
    const d=document.createElement("div");d.className="ctl";
    d.innerHTML=`<div class="head"><span>${label}</span><b>${S[k]}</b></div><input type="range" min="${mn}" max="${mx}" step="${st}" value="${S[k]}">`;
    d.querySelector("input").addEventListener("input",e=>{S[k]=+e.target.value;d.querySelector("b").textContent=S[k];});
    ctlsEl.appendChild(d);
  });
}

function randomize(){
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const bias=(/density|count|ribbons/.test(k)?0.4:0.15)+Math.random()*0.6;
    S[k]=Math.round((mn+(mx-mn)*bias)/st)*st;
  });
  buildCtls();init();
}

document.getElementById("play").addEventListener("click",e=>{running=!running;e.target.textContent=running?"pause":"play";});
document.getElementById("rnd").addEventListener("click",randomize);
document.getElementById("rst").addEventListener("click",()=>{CONTROLS.forEach(([k,,,,v])=>S[k]=v);buildCtls();init();});
document.getElementById("png").addEventListener("click",()=>{const a=document.createElement("a");a.download="noixzy_curl_noise_fluid.png";a.href=cv.toDataURL();a.click();});
seedEl.addEventListener("change",init);

window.addEventListener("resize",resize);
buildCtls();
resize();
draw();
</script>
</body>
</html>
