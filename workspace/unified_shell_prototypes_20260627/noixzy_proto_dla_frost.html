<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noixzy dla frost — prototype</title>
<style>
:root{color-scheme:dark;--a:#b0ccd8;--t:#e8e1d4;--m:#8c877d}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#050505;color:var(--t);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;grid-template-columns:minmax(0,1fr) 280px}
main{min-width:0;min-height:0;background:#040404}
canvas{display:block;width:100%;height:100%}
aside{border-left:1px solid #2a2a2a;background:#0e0e0e;padding:14px;overflow-y:auto}
h1{margin:0 0 4px;font-size:13px;font-weight:500;text-transform:lowercase;color:var(--t)}
.sub{color:var(--m);font-size:10px;line-height:1.5;margin-bottom:12px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
button{height:32px;border:1px solid #333;background:#141414;color:var(--t);font:inherit;font-size:10px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:#555;background:#1a1a1a}
.row{display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center;margin-bottom:10px}
.row span{font-size:10px;color:var(--m)}
input[type=text]{width:100%;background:#070707;border:1px solid #2e2e2e;color:var(--t);padding:7px;font:inherit;font-size:10px}
.ctl{border-top:1px solid #1e1e1e;padding:8px 0}
.head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:var(--m)}
.head b{font-weight:400;color:var(--a)}
input[type=range]{width:100%;accent-color:var(--a)}
.status{color:#555;font-size:9px;margin-top:8px}
.note{color:#444;font-size:9px;line-height:1.5;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:8px}
</style>
</head>
<body>
<main><canvas id="cv"></canvas></main>
<aside>
  <h1>noixzy dla frost</h1>
  <p class="sub">diffusion-limited aggregation — frost · coral · lightning · dendritic crystal growth</p>
  <div class="btns">
    <button id="regrow">regrow</button>
    <button id="rnd">randomize</button>
    <button id="rst">reset</button>
    <button id="png">save png</button>
  </div>
  <div class="row"><span>seed</span><input id="seed" value="dla-frost-001" spellcheck="false"></div>
  <div id="ctls"></div>
  <p class="status" id="status">idle</p>
  <p class="note">proto — unified shell candidate · 2026-06-27 · not in production<br>DLA: random walkers stick on contact → dendritic frost / coral / neural webs</p>
</aside>
<script>
const CONTROLS = [
  ["walkers","walkers",100,4000,100,1200],
  ["stickiness","stickiness",0,100,1,82],
  ["seed_shape","seed shape",0,3,1,0],
  ["branch_w","branch weight",1,5,1,2],
  ["palette","palette",0,3,1,0],
  ["glow","glow",0,100,1,44]
];

const PALETTES = [
  {fg:"#b0ccd8",glow:"rgba(176,204,216,"},
  {fg:"#d4e8a0",glow:"rgba(212,232,160,"},
  {fg:"#e0b8a0",glow:"rgba(224,184,160,"},
  {fg:"#c0b8e8",glow:"rgba(192,184,232,"}
];

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mkRng(seed){let t=hash(seed)||1;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296;};}

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const ctlsEl=document.getElementById("ctls");
const seedEl=document.getElementById("seed");
const statusEl=document.getElementById("status");

const S={};
CONTROLS.forEach(([k,,,,v])=>S[k]=v);

let W=1,H=1,dpr=1,growing=false;
let grid,gW,gH,walkerList,clusterSize;
const CELL=4;

function resize(){
  dpr=window.devicePixelRatio||1;
  const rect=cv.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.scale(dpr,dpr);
  grow();
}

function grow(){
  growing=false;
  gW=Math.floor(W/CELL);gH=Math.floor(H/CELL);
  grid=new Uint8Array(gW*gH);
  walkerList=[];clusterSize=0;
  ctx.fillStyle="#040404";
  ctx.fillRect(0,0,W,H);
  const rng=mkRng(seedEl.value);
  const shape=Math.floor(S.seed_shape);
  // plant seed
  if(shape===0){
    const cx=Math.floor(gW/2),cy=Math.floor(gH/2);
    set(cx,cy);
  } else if(shape===1){
    for(let x=0;x<gW;x++)set(x,gH-1);
  } else if(shape===2){
    const cx=Math.floor(gW/2),cy=Math.floor(gH/2),r=4;
    for(let a=0;a<32;a++){set(cx+Math.round(Math.cos(a/32*Math.PI*2)*r),cy+Math.round(Math.sin(a/32*Math.PI*2)*r));}
  } else {
    set(Math.floor(gW/2),0);set(Math.floor(gW/2),gH-1);set(0,Math.floor(gH/2));set(gW-1,Math.floor(gH/2));
  }
  // spawn walkers
  for(let i=0;i<S.walkers;i++){
    let x,y;
    const edge=Math.floor(rng()*4);
    if(edge===0){x=Math.floor(rng()*gW);y=0;}
    else if(edge===1){x=Math.floor(rng()*gW);y=gH-1;}
    else if(edge===2){x=0;y=Math.floor(rng()*gH);}
    else{x=gW-1;y=Math.floor(rng()*gH);}
    walkerList.push({x,y,rng:mkRng(seedEl.value+"w"+i)});
  }
  growing=true;
  statusEl.textContent="growing…";
  requestAnimationFrame(tick);
}

function set(x,y){
  if(x<0||x>=gW||y<0||y>=gH)return;
  if(grid[y*gW+x])return;
  grid[y*gW+x]=1;clusterSize++;
  const pal=PALETTES[Math.min(Math.floor(S.palette),PALETTES.length-1)];
  const g=S.glow;
  if(g>10){
    ctx.shadowBlur=g*0.4;
    ctx.shadowColor=pal.glow+"0.6)";
  } else {
    ctx.shadowBlur=0;
  }
  ctx.fillStyle=pal.fg;
  ctx.fillRect(x*CELL,y*CELL,Math.max(1,S.branch_w),Math.max(1,S.branch_w));
}

function hasNeighbor(x,y){
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    if(!dx&&!dy)continue;
    const nx=x+dx,ny=y+dy;
    if(nx>=0&&nx<gW&&ny>=0&&ny<gH&&grid[ny*gW+nx])return true;
  }
  return false;
}

function tick(){
  if(!growing)return;
  const stickProb=S.stickiness/100;
  const steps=Math.min(80,walkerList.length);
  for(let i=0;i<steps;i++){
    const w=walkerList[i];
    if(!w)continue;
    const dir=Math.floor(w.rng()*4);
    const moves=[[0,-1],[0,1],[-1,0],[1,0]];
    const [dx,dy]=moves[dir];
    const nx=Math.max(0,Math.min(gW-1,w.x+dx));
    const ny=Math.max(0,Math.min(gH-1,w.y+dy));
    w.x=nx;w.y=ny;
    if(hasNeighbor(w.x,w.y)&&w.rng()<stickProb){
      set(w.x,w.y);
      walkerList.splice(i,1);i--;
    }
  }
  statusEl.textContent=`growing · ${walkerList.length} walkers · ${clusterSize} cells`;
  if(walkerList.length>0)requestAnimationFrame(tick);
  else{growing=false;statusEl.textContent=`done · ${clusterSize} cells`;}
}

const S_defs={};
CONTROLS.forEach(([k,,,,v])=>S_defs[k]=v);

function buildCtls(){
  ctlsEl.innerHTML="";
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const d=document.createElement("div");d.className="ctl";
    d.innerHTML=`<div class="head"><span>${label}</span><b>${S[k]}</b></div><input type="range" min="${mn}" max="${mx}" step="${st}" value="${S[k]}">`;
    d.querySelector("input").addEventListener("input",e=>{S[k]=+e.target.value;d.querySelector("b").textContent=S[k];});
    ctlsEl.appendChild(d);
  });
}

function randomize(){
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    S[k]=Math.round((mn+(mx-mn)*Math.random())/st)*st;
  });
  buildCtls();grow();
}

document.getElementById("regrow").addEventListener("click",grow);
document.getElementById("rnd").addEventListener("click",randomize);
document.getElementById("rst").addEventListener("click",()=>{CONTROLS.forEach(([k,,,,v])=>S[k]=v);buildCtls();grow();});
document.getElementById("png").addEventListener("click",()=>{const a=document.createElement("a");a.download="noixzy_dla_frost.png";a.href=cv.toDataURL();a.click();});
seedEl.addEventListener("change",grow);

window.addEventListener("resize",resize);
buildCtls();
resize();
</script>
</body>
</html>
