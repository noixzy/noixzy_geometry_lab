<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noixzy domain marble — prototype</title>
<style>
:root{color-scheme:dark;--a:#c8b090;--t:#e8e1d4;--m:#8c877d}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#050404;color:var(--t);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;grid-template-columns:minmax(0,1fr) 280px}
main{min-width:0;min-height:0;background:#050404}
canvas{display:block;width:100%;height:100%}
aside{border-left:1px solid #2a2a2a;background:#0e0e0e;padding:14px;overflow-y:auto}
h1{margin:0 0 4px;font-size:13px;font-weight:500;text-transform:lowercase;color:var(--t)}
.sub{color:var(--m);font-size:10px;line-height:1.5;margin-bottom:12px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
button{height:32px;border:1px solid #333;background:#141414;color:var(--t);font:inherit;font-size:10px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:#555;background:#1a1a1a}
.row{display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center;margin-bottom:10px}
.row span{font-size:10px;color:var(--m)}
input[type=text]{width:100%;background:#070707;border:1px solid #2e2e2e;color:var(--t);padding:7px;font:inherit;font-size:10px}
.ctl{border-top:1px solid #1e1e1e;padding:8px 0}
.head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:var(--m)}
.head b{font-weight:400;color:var(--a)}
input[type=range]{width:100%;accent-color:var(--a)}
.note{color:#444;font-size:9px;line-height:1.5;margin-top:12px;border-top:1px solid #1a1a1a;padding-top:8px}
</style>
</head>
<body>
<main><canvas id="cv"></canvas></main>
<aside>
  <h1>noixzy domain marble</h1>
  <p class="sub">layered domain-warp curl noise — liquid metal · marble veins · magma flow · lava surface</p>
  <div class="btns">
    <button id="play">pause</button>
    <button id="rnd">randomize</button>
    <button id="rst">reset</button>
    <button id="png">save png</button>
  </div>
  <div class="row"><span>seed</span><input id="seed" value="domain-marble-001" spellcheck="false"></div>
  <div id="ctls"></div>
  <p class="note">proto — unified shell candidate · 2026-06-27 · not in production<br>domain warp: f(f(x,y)) — each noise layer warps the coordinate space of the next</p>
</aside>
<script>
const CONTROLS = [
  ["warp_layers","warp layers",1,5,1,3],
  ["warp_scale","warp scale",0,100,1,62],
  ["warp_strength","warp strength",0,100,1,58],
  ["octaves","octaves",1,6,1,4],
  ["speed","animate speed",0,100,1,22],
  ["palette","palette",0,4,1,3]
];

const PALETTES = [
  // marble: white/grey/black
  [[240,238,234],[180,174,168],[90,84,78],[30,26,22]],
  // amber/lava: deep orange
  [[240,200,60],[200,100,20],[120,30,8],[18,8,4]],
  // liquid metal: silver
  [[220,222,230],[150,155,162],[70,74,82],[20,22,28]],
  // jade: green veins
  [[200,228,200],[110,168,120],[40,100,60],[10,24,14]],
  // obsidian: purple/black
  [[180,160,210],[90,70,130],[30,20,60],[6,4,14]]
];

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const ctlsEl=document.getElementById("ctls");
const seedEl=document.getElementById("seed");

const S={};
CONTROLS.forEach(([k,,,,v])=>S[k]=v);

let W=1,H=1,dpr=1,frame=0,running=true;
let imgData,pixels;
const GS=2; // grid step

// simple value noise
function vnoise(x,y,seed){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  function r(a,b){let h=(a*1610612741+b*805306457+seed*402653189)>>>0;h^=h>>>13;h=Math.imul(h,0x5208C1B7)>>>0;return(h>>>0)/4294967296;}
  return r(ix,iy)*(1-u)*(1-v)+r(ix+1,iy)*u*(1-v)+r(ix,iy+1)*(1-u)*v+r(ix+1,iy+1)*u*v;
}

function fbm(x,y,seed,octaves){
  let v=0,amp=1,sc=1,tot=0;
  for(let i=0;i<octaves;i++){v+=amp*vnoise(x*sc,y*sc,seed+i*377);tot+=amp;amp*=0.5;sc*=2.1;}
  return v/tot;
}

function domainWarp(px,py,t,seed){
  const scale=S.warp_scale*0.002+0.002;
  const str=S.warp_strength*0.08;
  const oct=Math.floor(S.octaves);
  const layers=Math.floor(S.warp_layers);
  let x=px*scale,y=py*scale;
  for(let l=0;l<layers;l++){
    const qx=fbm(x+t*0.1,y,seed+l*1000,oct);
    const qy=fbm(x+5.2,y+t*0.1+1.3,seed+l*1000+500,oct);
    x+=str*qx;y+=str*qy;
  }
  return fbm(x,y,seed,oct);
}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  const rect=cv.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.scale(dpr,dpr);
  imgData=ctx.createImageData(Math.floor(W/GS),Math.floor(H/GS));
  pixels=imgData.data;
}

function draw(){
  if(!running){requestAnimationFrame(draw);return;}
  const pal=PALETTES[Math.min(Math.floor(S.palette),PALETTES.length-1)];
  const spd=S.speed*0.0003;
  const t=frame*spd;
  const gw=Math.floor(W/GS),gh=Math.floor(H/GS);
  const seed=hash(seedEl.value);
  for(let gy=0;gy<gh;gy++){
    for(let gx=0;gx<gw;gx++){
      const v=domainWarp(gx,gy,t,seed);
      // map to palette
      const ti=Math.max(0,Math.min(0.9999,v));
      const seg=ti*(pal.length-1);
      const lo=Math.floor(seg),hi=Math.min(lo+1,pal.length-1);
      const frac=seg-lo;
      const r=pal[lo][0]*(1-frac)+pal[hi][0]*frac;
      const g=pal[lo][1]*(1-frac)+pal[hi][1]*frac;
      const b=pal[lo][2]*(1-frac)+pal[hi][2]*frac;
      const i=(gy*gw+gx)*4;
      pixels[i]=r;pixels[i+1]=g;pixels[i+2]=b;pixels[i+3]=255;
    }
  }
  // draw upscaled
  const tmpCv=document.createElement("canvas");tmpCv.width=gw;tmpCv.height=gh;
  tmpCv.getContext("2d").putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpCv,0,0,W,H);
  frame++;
  requestAnimationFrame(draw);
}

function buildCtls(){
  ctlsEl.innerHTML="";
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    const d=document.createElement("div");d.className="ctl";
    d.innerHTML=`<div class="head"><span>${label}</span><b>${S[k]}</b></div><input type="range" min="${mn}" max="${mx}" step="${st}" value="${S[k]}">`;
    d.querySelector("input").addEventListener("input",e=>{S[k]=+e.target.value;d.querySelector("b").textContent=S[k];});
    ctlsEl.appendChild(d);
  });
}

function randomize(){
  CONTROLS.forEach(([k,label,mn,mx,st])=>{
    S[k]=Math.round((mn+(mx-mn)*Math.random())/st)*st;
  });
  buildCtls();
}

document.getElementById("play").addEventListener("click",e=>{running=!running;e.target.textContent=running?"pause":"play";});
document.getElementById("rnd").addEventListener("click",randomize);
document.getElementById("rst").addEventListener("click",()=>{CONTROLS.forEach(([k,,,,v])=>S[k]=v);buildCtls();});
document.getElementById("png").addEventListener("click",()=>{const a=document.createElement("a");a.download="noixzy_domain_marble.png";a.href=cv.toDataURL();a.click();});

window.addEventListener("resize",resize);
buildCtls();
resize();
draw();
</script>
</body>
</html>
